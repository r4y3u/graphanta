<!doctype html>
<!-- 単体起動版: CSS・JavaScriptを内包し、通信なしで動作します。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="theme-color" content="#4f46e5"><meta name="description" content="Graphanta - 数学的な思考と表現を支える図・グラフ作成アプリ"><title>Graphanta v0.2.0-alpha.5</title><style>:root {
  font-family: Inter, "Noto Sans JP", "Yu Gothic UI", "Yu Gothic", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  color: #20273b;
  background: #edf0f8;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
  --primary: #5648df;
  --primary-strong: #4034be;
  --primary-soft: #eceaff;
  --accent: #c44ccf;
  --ink: #20273b;
  --muted: #687087;
  --line: #d8ddeb;
  --panel: rgba(255, 255, 255, 0.96);
  --shadow: 0 12px 35px rgba(42, 48, 77, 0.13);
}

* { box-sizing: border-box; }
html, body, #root { width: 100%; height: 100%; margin: 0; overflow: hidden; }
button, input, textarea, select { font: inherit; }
button { color: inherit; }
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
  outline: 3px solid rgba(86, 72, 223, 0.25);
  outline-offset: 1px;
}


.app-shell {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: 64px minmax(0, 1fr);
  background:
    radial-gradient(circle at 15% 0%, rgba(95, 78, 226, 0.12), transparent 28%),
    radial-gradient(circle at 85% 100%, rgba(197, 76, 207, 0.08), transparent 24%),
    #edf0f8;
}

.menu-bar {
  z-index: 20;
  min-width: 0;
  display: grid;
  grid-template-columns: 44px max-content max-content minmax(150px, 1fr) max-content;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: rgba(255, 255, 255, 0.95);
  border-bottom: 1px solid rgba(202, 208, 224, 0.9);
  box-shadow: 0 4px 18px rgba(42, 48, 77, 0.06);
  backdrop-filter: blur(16px);
}

.app-mark {
  display: grid;
  place-items: center;
  width: 40px;
  height: 40px;
  padding: 0;
  border: 0;
  border-radius: 12px;
  color: #fff;
  background: linear-gradient(145deg, #5142d9, #735bfa 56%, #c14bcf);
  box-shadow: 0 7px 18px rgba(81, 66, 217, 0.28);
  cursor: pointer;
}
.app-mark svg { width: 31px; height: 31px; overflow: visible; }
.app-mark path { fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
.app-mark circle { fill: #fff; stroke: rgba(81, 66, 217, .55); stroke-width: 1; }
.app-mark:hover { filter: brightness(1.07); transform: translateY(-1px); }

.wordmark {
  display: grid;
  justify-items: end;
  min-width: 132px;
  padding: 3px 4px;
  border: 0;
  color: #252d43;
  background: transparent;
  cursor: pointer;
  user-select: none;
}
.wordmark strong { font-size: 18px; line-height: 1.05; letter-spacing: .01em; }
.wordmark span { color: var(--muted); font-size: 9px; line-height: 1.2; letter-spacing: .08em; }

.project-title {
  width: 100%;
  min-width: 110px;
  height: 38px;
  padding: 0 12px;
  border: 1px solid transparent;
  border-radius: 9px;
  color: #323a50;
  background: transparent;
  font-weight: 650;
  text-align: right;
  text-overflow: ellipsis;
}
.project-title:hover, .project-title:focus { border-color: var(--line); background: #f8f9fd; }

.menu-actions { display: flex; align-items: center; gap: 4px; min-width: 0; }
.menu-actions button,
.view-control button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 38px;
  padding: 0 9px;
  border: 0;
  border-radius: 9px;
  background: transparent;
  cursor: pointer;
  white-space: nowrap;
  font-size: 12px;
  font-weight: 650;
}
.menu-actions button:hover:not(:disabled), .view-control button:hover { background: #f0f1f8; color: var(--primary-strong); }
.menu-actions button:disabled { opacity: 0.35; cursor: not-allowed; }
.menu-divider { flex: 0 0 auto; width: 1px; height: 24px; margin: 0 2px; background: var(--line); }

.view-control {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 2px;
  border: 1px solid #dce0ec;
  border-radius: 10px;
  background: #fbfcff;
}
.view-control button { min-height: 32px; padding: 0 8px; }
.view-control output {
  min-width: 42px;
  padding-right: 7px;
  color: #4f5870;
  font-size: 12px;
  font-weight: 750;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.workspace {
  --panel-width: clamp(260px, 19vw, 330px);
  min-width: 0;
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(360px, 1fr) 58px var(--panel-width);
  grid-template-areas: "plot tools panels";
  gap: 8px;
  padding: 8px;
  overflow: hidden;
}
.workspace.toolbar-left {
  grid-template-columns: 58px minmax(360px, 1fr) var(--panel-width);
  grid-template-areas: "tools plot panels";
}
.workspace.panels-collapsed {
  grid-template-columns: minmax(360px, 1fr) 58px 44px;
}
.workspace.toolbar-left.panels-collapsed {
  grid-template-columns: 58px minmax(360px, 1fr) 44px;
}

.plot-shell {
  grid-area: plot;
  position: relative;
  min-width: 0;
  min-height: 0;
  display: grid;
  grid-template-rows: minmax(0, 1fr) 28px;
  overflow: hidden;
  border: 1px solid #d8ddea;
  border-radius: 15px;
  background: #fff;
  box-shadow: var(--shadow);
}
.status-bar {
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 12px;
  border-top: 1px solid #e1e5ef;
  color: #687087;
  background: #fbfcff;
  font-size: 11px;
  user-select: none;
}
.status-bar strong { color: #3e465c; }
.status-bar span:last-child { color: #778096; }

.plot-viewport { min-width: 0; min-height: 0; overflow: hidden; overscroll-behavior: contain; background: #cdd3e0; touch-action: none; }
.plot-canvas { display: block; width: 100%; height: 100%; background: #fff; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; touch-action: none; }
.cursor-select { cursor: default; }
.cursor-pan { cursor: grab; }
.cursor-pen, .cursor-line, .cursor-arrow, .cursor-rectangle, .cursor-ellipse, .cursor-polygon, .cursor-array, .cursor-segment { cursor: crosshair; }
.cursor-text, .cursor-math { cursor: text; }
.selection-outline { fill: none !important; stroke: #6455ea; stroke-width: 1.6; stroke-dasharray: 7 5; }
.object-locked { cursor: not-allowed; }

.toolbar {
  grid-area: tools;
  align-self: stretch;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  overflow-x: hidden;
  overflow-y: auto;
  padding: 8px 6px;
  border: 1px solid #d9deeb;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.95);
  box-shadow: 0 8px 25px rgba(42, 48, 77, 0.09);
  scrollbar-width: thin;
}
.tool-button {
  position: relative;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  width: 43px;
  height: 43px;
  padding: 0;
  border: 1px solid transparent;
  border-radius: 11px;
  color: #4a5269;
  background: transparent;
  cursor: pointer;
}
.tool-button:hover:not(:disabled) { color: var(--primary-strong); background: #f1efff; border-color: #ddd8ff; transform: translateY(-1px); }
.tool-button.is-active { color: #fff; background: linear-gradient(145deg, #5749e2, #6b57ef); box-shadow: 0 7px 15px rgba(86,72,223,.27); }
.tool-button:disabled { opacity: .46; cursor: not-allowed; }
.tool-badge { position: absolute; right: -2px; bottom: -2px; padding: 1px 3px; border-radius: 5px; color: white; background: #8c53a8; font-size: 8px; font-weight: 800; }

.side-panels {
  grid-area: panels;
  min-width: 0;
  min-height: 0;
  display: grid;
  grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
  gap: 8px;
  overflow: hidden;
}
.side-panel {
  width: 100%;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  display: grid;
  grid-template-rows: 42px minmax(0,1fr);
  border: 1px solid #d9deeb;
  border-radius: 14px;
  background: var(--panel);
  box-shadow: 0 8px 24px rgba(42, 48, 77, 0.08);
  transition: width .18s ease, box-shadow .18s ease;
}
.side-panel.collapsed {
  width: 44px;
  grid-template-rows: minmax(72px, 1fr);
  justify-self: end;
  align-self: stretch;
}
.panel-heading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  min-width: 0;
  padding: 0 13px;
  border: 0;
  border-bottom: 1px solid #e1e5ef;
  color: #2f3850;
  background: linear-gradient(180deg, #fff, #fafbfe);
  cursor: pointer;
  font-weight: 760;
  letter-spacing: .01em;
}
.panel-short { display: none; }
.collapsed .panel-heading {
  height: 100%;
  flex-direction: column;
  justify-content: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 0;
}
.collapsed .panel-title { display: none; }
.collapsed .panel-short { display: block; color: var(--primary-strong); font-size: 18px; font-weight: 850; }
.collapsed .panel-heading svg { transform: rotate(-90deg); }
.panel-content { min-height: 0; overflow-y: auto; padding: 12px; scrollbar-width: thin; }
.panel-hint, .binding-note { margin: 0 0 13px; color: var(--muted); font-size: 12px; line-height: 1.65; }
.binding-note code { color: var(--primary-strong); font-weight: 750; }

.field { display: grid; grid-template-columns: 84px minmax(0,1fr); align-items: center; gap: 8px; margin: 0 0 10px; font-size: 12px; }
.field > span { color: #626b81; font-weight: 650; }
.field > div { min-width: 0; display: flex; align-items: center; gap: 7px; }
.field input:not([type="range"]):not([type="color"]), .field select, .field textarea {
  width: 100%; min-width: 0; border: 1px solid #d7dce8; border-radius: 7px; padding: 7px 8px; background: white; color: #283047;
}
.field textarea { resize: vertical; min-height: 62px; }
.field input[type="color"] { width: 42px; height: 31px; padding: 2px; border: 1px solid #d7dce8; border-radius: 7px; background: white; }
.field input[type="range"] { min-width: 0; width: 100%; accent-color: var(--primary); }
.field output { min-width: 34px; text-align: right; color: #4c5570; font-variant-numeric: tabular-nums; }
.fill-control { width: 100%; justify-content: space-between; }

.toggle { display: flex; align-items: center; gap: 8px; margin: 10px 0; cursor: pointer; font-size: 12px; color: #505970; }
.toggle input { position: absolute; opacity: 0; pointer-events: none; }
.toggle-track { flex: 0 0 auto; width: 36px; height: 20px; padding: 2px; border-radius: 20px; background: #cbd0dc; transition: .18s; }
.toggle-track > span { display: block; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,.18); transition: .18s; }
.toggle input:checked + .toggle-track { background: var(--primary); }
.toggle input:checked + .toggle-track > span { transform: translateX(16px); }
.toggle em { font-style: normal; font-weight: 600; }
.toggle.disabled { opacity: .48; cursor: not-allowed; }
.toggle.compact { margin: 0; }
.toggle.compact .toggle-track { width: 31px; height: 18px; }
.toggle.compact .toggle-track > span { width: 14px; height: 14px; }
.toggle.compact input:checked + .toggle-track > span { transform: translateX(13px); }

.selected-type { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; padding: 8px 9px; border-radius: 8px; background: var(--primary-soft); color: #4438b8; font-size: 12px; font-weight: 750; }
.selected-type code { color: #726c95; font-size: 10px; }
.inline-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.inline-actions button, .expression-actions button, .subheading button, .settings-footer button {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px; min-height: 32px; border: 1px solid #d9deea; border-radius: 7px; background: #fff; cursor: pointer; font-size: 11px; font-weight: 650;
}
.inline-actions button:hover, .expression-actions button:hover, .subheading button:hover { border-color: #bdb6f3; color: var(--primary-strong); background: #f7f5ff; }
.danger { color: #a63a4c !important; }
.multi-action-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; margin-bottom: 12px; }
.multi-action-grid.two-columns { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.multi-action-grid button { min-height: 31px; padding: 4px 6px; border: 1px solid #d9deea; border-radius: 7px; color: #4a5269; background: #fff; cursor: pointer; font-size: 10px; font-weight: 700; }
.multi-action-grid button:hover:not(:disabled) { border-color: #bdb6f3; color: var(--primary-strong); background: #f7f5ff; }
.multi-action-grid button:disabled { opacity: .38; cursor: not-allowed; }

.subheading { display: flex; align-items: center; justify-content: space-between; margin: 3px 0 9px; color: #343d54; font-size: 12px; font-weight: 800; }
.subheading:not(:first-child) { margin-top: 18px; padding-top: 13px; border-top: 1px solid #e2e5ef; }
.subheading button { min-height: 27px; padding: 0 7px; }
.variable-list, .expression-list { display: grid; gap: 8px; }
.variable-card, .expression-card { padding: 9px; border: 1px solid #dfe3ed; border-radius: 9px; background: #fbfcff; }
.variable-head, .expression-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.variable-name { width: 42px; border: 1px solid #d5dae6; border-radius: 6px; padding: 4px; text-align: center; font-weight: 800; }
.variable-head output { flex: 1; text-align: right; color: #4539bd; font-weight: 850; font-variant-numeric: tabular-nums; }
.mini-delete { display: grid; place-items: center; width: 24px; height: 24px; padding: 0; border: 0; border-radius: 6px; color: #8b5360; background: transparent; cursor: pointer; }
.mini-delete:hover { background: #f7e9ed; }
.variable-card > input[type="range"] { width: 100%; accent-color: var(--primary); }
.variable-range { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; margin-top: 5px; }
.variable-range label { display: grid; gap: 2px; color: #757d90; font-size: 9px; }
.variable-range input { width: 100%; min-width: 0; border: 1px solid #dce0e9; border-radius: 5px; padding: 3px; font-size: 10px; }
.expression-label { min-width: 0; flex: 1; border: 0; background: transparent; font-size: 11px; font-weight: 750; }
.expression-source { width: 100%; border: 1px solid #d5dae6; border-radius: 6px; padding: 6px 7px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 11px; }
.expression-preview { min-height: 35px; display: flex; align-items: center; padding: 5px 2px; overflow-wrap: anywhere; color: #242c43; font-family: Georgia, "Times New Roman", serif; font-style: italic; font-size: 17px; }
.expression-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.expression-actions button:disabled { opacity: .4; cursor: not-allowed; }
.function-placeholder { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding: 9px; border: 1px dashed #bbb6db; border-radius: 8px; color: #78718f; background: #f7f5ff; font-size: 10px; }

.primary-button { border-color: transparent !important; color: #fff !important; background: linear-gradient(145deg, #5547dc, #7159ed) !important; box-shadow: 0 6px 14px rgba(86,72,223,.2); }
.primary-button:hover { filter: brightness(1.04); }
.primary-button:disabled { opacity: .45; box-shadow: none; }
.primary-button.full { width: 100%; min-height: 38px; margin-bottom: 12px; border: 0; border-radius: 8px; cursor: pointer; }

.modal-backdrop { position: fixed; z-index: 100; inset: 0; display: grid; place-items: center; padding: 24px; background: rgba(25, 29, 44, .46); backdrop-filter: blur(5px); }
.modal { width: min(520px, 100%); max-height: min(88vh, 760px); overflow: hidden; display: grid; grid-template-rows: 56px minmax(0,1fr); border: 1px solid rgba(255,255,255,.65); border-radius: 17px; background: #fff; box-shadow: 0 28px 90px rgba(21,25,44,.3); }
.modal-wide { width: min(840px, 100%); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 0 17px; border-bottom: 1px solid #e1e5ef; }
.modal-header h2 { margin: 0; font-size: 17px; }
.icon-button { width: 35px; height: 35px; border: 0; border-radius: 9px; background: transparent; cursor: pointer; font-size: 24px; }
.icon-button:hover { background: #f0f1f7; }
.modal-body { min-height: 0; overflow-y: auto; padding: 18px; }
.large-entry { width: 100%; min-height: 170px; resize: vertical; border: 1px solid #cfd5e2; border-radius: 10px; padding: 12px; line-height: 1.6; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
.modal-actions button { min-width: 95px; min-height: 39px; border: 1px solid #d6dbe7; border-radius: 8px; background: white; cursor: pointer; font-weight: 700; }

.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
.settings-grid h3 { margin: 0 0 13px; color: #303950; font-size: 14px; }
.tool-settings-list { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.tool-setting { display: grid; grid-template-columns: 17px 22px minmax(0,1fr); align-items: center; gap: 6px; padding: 7px; border-radius: 7px; cursor: pointer; font-size: 11px; }
.tool-setting:hover { background: #f3f2fb; }
.tool-setting input { accent-color: var(--primary); }
.settings-footer { grid-column: 1 / -1; display: flex; justify-content: flex-end; gap: 8px; padding-top: 14px; border-top: 1px solid #e1e4ed; }
.settings-footer button { padding: 0 11px; }

.math-editor { display: grid; gap: 12px; }
.math-palette { display: flex; flex-wrap: wrap; gap: 6px; padding: 9px; border: 1px solid #dde1ec; border-radius: 10px; background: #f8f9fd; }
.math-palette button { min-width: 65px; min-height: 34px; border: 1px solid #d4d9e6; border-radius: 7px; background: #fff; cursor: pointer; font-weight: 650; }
.math-palette button:hover { color: var(--primary-strong); border-color: #bbb3f5; background: #f3f0ff; }
.math-workspace { display: grid; grid-template-columns: 1.15fr .85fr; gap: 12px; }
.math-workspace textarea { min-height: 210px; resize: vertical; border: 1px solid #cfd5e2; border-radius: 10px; padding: 13px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; line-height: 1.65; }
.math-live-preview { min-width: 0; display: grid; place-items: center; align-content: center; gap: 12px; min-height: 210px; padding: 15px; overflow-wrap: anywhere; border: 1px solid #d9ddec; border-radius: 10px; background: linear-gradient(160deg, #f8f8ff, #fff8ff); }
.math-live-preview span { color: #7b8295; font-size: 11px; font-family: inherit; font-style: normal; }
.math-live-preview strong { font-family: Georgia, "Times New Roman", serif; font-size: clamp(20px, 3vw, 36px); font-style: italic; font-weight: 500; text-align: center; }
.math-help { margin: 0; color: #6e768b; font-size: 11px; line-height: 1.65; }
.about-box { text-align: center; color: #596176; line-height: 1.7; }
.about-logo { width: 68px; height: 68px; margin: 4px auto 15px; border-radius: 20px; font-size: 38px; }

.exit-presentation { position: fixed; z-index: 200; right: 16px; bottom: 16px; min-height: 42px; padding: 0 14px; border: 1px solid rgba(255,255,255,.6); border-radius: 10px; color: white; background: rgba(34,39,59,.75); backdrop-filter: blur(8px); cursor: pointer; opacity: .25; transition: .18s; }
.exit-presentation:hover { opacity: 1; }
.presentation-mode { grid-template-rows: minmax(0,1fr); background: #fff; }
.presentation-mode .menu-bar, .presentation-mode .toolbar, .presentation-mode .side-panels, .presentation-mode .plot-toolbar, .presentation-mode .status-bar { display: none; }
.presentation-mode .workspace, .presentation-mode .workspace.toolbar-left { display: block; padding: 0; }
.presentation-mode .plot-shell { width: 100%; height: 100%; grid-template-rows: minmax(0,1fr); border: 0; border-radius: 0; box-shadow: none; }

@media (max-width: 1180px) {
  .menu-bar { grid-template-columns: 44px max-content max-content minmax(110px, 1fr) max-content; gap: 6px; }
  .menu-actions button { padding: 0 7px; }
  .menu-actions button span { display: none; }
  .menu-actions button:first-child span { display: inline; }
  .wordmark { min-width: 112px; }
  .wordmark span { display: none; }
  .workspace { --panel-width: clamp(240px, 24vw, 285px); }
}

@media (max-width: 850px), (max-aspect-ratio: 4 / 5) {
  html, body, #root { overflow: hidden; }
  .app-shell { grid-template-rows: 104px minmax(0, 1fr); }
  .menu-bar {
    grid-template-columns: 44px minmax(0, 1fr) max-content;
    grid-template-rows: 44px 42px;
    grid-template-areas:
      "mark actions wordmark"
      "view title title";
    gap: 4px 7px;
    padding: 7px 9px;
  }
  .app-mark { grid-area: mark; }
  .menu-actions { grid-area: actions; overflow-x: auto; scrollbar-width: none; }
  .menu-actions::-webkit-scrollbar { display: none; }
  .view-control { grid-area: view; }
  .project-title { grid-area: title; text-align: left; }
  .wordmark { grid-area: wordmark; min-width: 105px; }

  .workspace,
  .workspace.toolbar-left,
  .workspace.panels-collapsed,
  .workspace.toolbar-left.panels-collapsed {
    grid-template-columns: minmax(0, 1fr) 56px;
    grid-template-rows: minmax(280px, 1fr) minmax(200px, .68fr);
    grid-template-areas:
      "plot tools"
      "panels panels";
  }
  .workspace.toolbar-left,
  .workspace.toolbar-left.panels-collapsed {
    grid-template-columns: 56px minmax(0, 1fr);
    grid-template-areas:
      "tools plot"
      "panels panels";
  }
  .side-panels {
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    grid-template-rows: minmax(0, 1fr);
  }
  .side-panel.collapsed { align-self: stretch; }
  .side-panel.tweak-panel.collapsed { justify-self: start; }
  .side-panel.expression-panel.collapsed { justify-self: end; }
  .toolbar { overflow-y: auto; }
}

@media (max-width: 560px) {
  .app-shell { grid-template-rows: 98px minmax(0, 1fr); }
  .menu-bar { grid-template-columns: 40px minmax(0,1fr) 86px; }
  .app-mark { width: 36px; height: 36px; }
  .wordmark { min-width: 82px; }
  .wordmark strong { font-size: 15px; }
  .menu-actions { gap: 1px; }
  .menu-actions button { min-width: 34px; min-height: 34px; padding: 0 5px; }
  .menu-divider { margin: 0; }
  .view-control button { font-size: 10px; }
  .workspace,
  .workspace.toolbar-left,
  .workspace.panels-collapsed,
  .workspace.toolbar-left.panels-collapsed {
    gap: 5px;
    padding: 5px;
    grid-template-rows: minmax(230px, 1fr) minmax(210px, .85fr);
  }
  .side-panels { gap: 5px; }
  .panel-content { padding: 9px; }
  .field { grid-template-columns: 70px minmax(0,1fr); }
}

/* alpha.4 grouped tools and parameter editors */
.cursor-zoom { cursor: zoom-in; }
.toolbar { overflow: visible; }
.tool-group { position: relative; flex: 0 0 auto; }
.tool-group-main { overflow: visible; }
.group-caret {
  position: absolute;
  right: 2px;
  bottom: 1px;
  font-size: 13px;
  font-weight: 900;
  line-height: 1;
  opacity: .72;
}
.tool-flyout {
  position: absolute;
  z-index: 50;
  top: 0;
  display: grid;
  gap: 4px;
  min-width: 142px;
  padding: 6px;
  border: 1px solid #d7dceb;
  border-radius: 12px;
  background: rgba(255,255,255,.98);
  box-shadow: 0 15px 40px rgba(37,42,72,.22);
  backdrop-filter: blur(14px);
}
.flyout-right { left: calc(100% + 8px); }
.flyout-left { right: calc(100% + 8px); }
.tool-flyout-button {
  display: grid;
  grid-template-columns: 28px minmax(0,1fr);
  align-items: center;
  gap: 8px;
  min-height: 38px;
  padding: 4px 9px;
  border: 1px solid transparent;
  border-radius: 8px;
  color: #424b63;
  background: transparent;
  cursor: pointer;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
}
.tool-flyout-button:hover { color: var(--primary-strong); border-color: #ddd8ff; background: #f3f1ff; }
.tool-flyout-button.is-active { color: #fff; background: linear-gradient(145deg, #5749e2, #6b57ef); }

.display-mode, .measure-mode {
  display: grid;
  grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 6px;
  margin: 0 0 13px;
}
.display-mode button, .measure-mode button {
  min-width: 0;
  min-height: 58px;
  display: grid;
  place-items: center;
  align-content: center;
  gap: 3px;
  padding: 5px 3px;
  border: 1px solid #d9deea;
  border-radius: 9px;
  color: #596176;
  background: #fff;
  cursor: pointer;
  font-size: 10px;
  font-weight: 700;
}
.display-mode button:hover, .measure-mode button:hover { color: var(--primary-strong); border-color: #beb7f3; background: #f7f5ff; }
.display-mode button.is-active, .measure-mode button.is-active { color: #fff; border-color: transparent; background: linear-gradient(145deg, #5749e2, #6b57ef); box-shadow: 0 5px 13px rgba(86,72,223,.2); }

.preset-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: -2px 0 12px;
  padding: 8px 9px;
  border-radius: 8px;
  color: #4438b8;
  background: var(--primary-soft);
}
.preset-header strong { font-size: 12px; }
.preset-header span { color: #777194; font-size: 9px; font-weight: 700; }

.range-number { width: 100%; min-width: 0; display: grid !important; grid-template-columns: minmax(45px,1fr) 58px auto; align-items: center; gap: 5px !important; }
.range-number > input[type="range"] { width: 100%; min-width: 0; }
.range-number > input[type="text"] { min-width: 0; padding: 5px 6px !important; text-align: right; font-variant-numeric: tabular-nums; }
.range-number > span { color: #6c7488; font-size: 10px; }
.range-direct { width: 100%; min-width: 0; display: grid !important; grid-template-columns: minmax(50px,1fr) 62px auto; align-items: center; gap: 5px !important; }
.range-direct > input[type="text"] { min-width: 0; padding: 5px 6px !important; text-align: right; }
.range-direct > span { color: #6c7488; font-size: 9px; }

.point-input { width: 100%; min-width: 0; display: grid !important; grid-template-columns: 1fr 1fr; gap: 5px !important; }
.point-input label { min-width: 0; display: grid; grid-template-columns: 12px minmax(0,1fr); align-items: center; gap: 3px; color: #71788b; font-size: 10px; }
.point-input input { min-width: 0; padding: 6px !important; text-align: right; }

.field input.is-invalid { border-color: #ce3d59 !important; background: #fff5f7 !important; box-shadow: 0 0 0 2px rgba(206,61,89,.08); }
.field-error { margin: -5px 0 10px 92px; color: #bd344d; font-size: 10px; line-height: 1.45; }
.division-heading { display: flex; align-items: center; justify-content: space-between; margin: 13px 0 8px; padding-top: 11px; border-top: 1px solid #e2e5ef; color: #343d54; font-size: 12px; font-weight: 800; }
.division-heading button { width: 28px; height: 27px; border: 1px solid #d9deea; border-radius: 7px; background: white; cursor: pointer; }
.division-heading button:hover { color: var(--primary-strong); border-color: #bdb6f3; background: #f7f5ff; }

@media (max-width: 850px), (max-aspect-ratio: 4 / 5) {
  .tool-flyout { min-width: 132px; }
  .flyout-right { left: calc(100% + 5px); }
  .flyout-left { right: calc(100% + 5px); }
}

/* alpha.5 interaction refinements */
.workspace {
  transition: grid-template-columns .24s cubic-bezier(.2,.75,.25,1);
}
.side-panel {
  transition: width .24s cubic-bezier(.2,.75,.25,1), box-shadow .2s ease, grid-template-rows .24s cubic-bezier(.2,.75,.25,1);
}
.side-panel.collapsed {
  grid-template-rows: minmax(72px, 1fr) 0fr;
}
.panel-content {
  opacity: 1;
  transform: translateX(0);
  transition: opacity .16s ease .05s, transform .22s cubic-bezier(.2,.75,.25,1), padding .2s ease;
}
.side-panel.collapsed .panel-content {
  min-height: 0;
  padding-top: 0;
  padding-bottom: 0;
  opacity: 0;
  transform: translateX(12px);
  visibility: hidden;
  pointer-events: none;
  transition: opacity .08s ease, transform .18s ease, padding .18s ease, visibility 0s linear .18s;
}
.tool-flyout {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transform: translateX(7px) scale(.98);
  transform-origin: right top;
  transition: opacity .12s ease, transform .16s cubic-bezier(.2,.75,.25,1), visibility 0s linear .16s;
}
/* A right-side toolbar opens toward the plot area (left). The mirrored layout opens inward. */
.flyout-right { left: auto; right: calc(100% + 8px); transform-origin: right top; }
.flyout-left { right: auto; left: calc(100% + 8px); transform-origin: left top; transform: translateX(-7px) scale(.98); }
.tool-flyout.is-open {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  transform: translateX(0) scale(1);
  transition-delay: 0s;
}
.tool-flyout::after {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  width: 10px;
}
.flyout-right::after { right: -10px; }
.flyout-left::after { left: -10px; }
.toolbar-right .group-caret { left: 2px; right: auto; }
.toolbar-left .group-caret { right: 2px; left: auto; transform: rotate(180deg); }
.resize-handle {
  cursor: nwse-resize;
  filter: drop-shadow(0 2px 3px rgba(48,40,140,.22));
}
.resize-ne, .resize-sw { cursor: nesw-resize; }
.resize-start, .resize-end { cursor: grab; }
.resize-handle:hover { fill: #ece9ff; stroke-width: 2.3; }
.vertex-handle { cursor: grab; filter: drop-shadow(0 2px 3px rgba(135,79,15,.2)); }
.vertex-handle:hover { fill: #ffe6a8; stroke-width: 2.2; }
.vertex-add-handle { cursor: copy; opacity: .72; }
.vertex-add-handle:hover { opacity: 1; fill: #fff2c9; }
@media (pointer: coarse) {
  .resize-handle, .vertex-handle, .vertex-add-handle { stroke-width: 2.4px; }
  .tool-button { min-width: 45px; min-height: 45px; }
}
.expression-range input[type="text"],
.point-input input[type="text"] {
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
}
.subtle-check {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  margin: -4px 0 10px;
  color: #7a8193;
  font-size: 10px;
  cursor: pointer;
}
.subtle-check input { accent-color: var(--primary); }

/* alpha.2 infinite viewport, contextual tools, array symbols and screenshot modes */
.cursor-ball, .cursor-person, .cursor-bundle { cursor: crosshair; }
.plot-viewport { position: relative; }
.plot-context-tools {
  position: fixed;
  z-index: 120;
  display: flex;
  gap: 5px;
  padding: 6px;
  border: 1px solid #d4d9e8;
  border-radius: 13px;
  background: rgba(255,255,255,.98);
  box-shadow: 0 14px 40px rgba(37,42,72,.24);
  backdrop-filter: blur(14px);
  transform: translate(-6px, -50%);
  animation: context-tools-in .13s ease-out;
}
.plot-context-tools button {
  display: grid;
  place-items: center;
  gap: 2px;
  min-width: 42px;
  min-height: 42px;
  padding: 4px;
  border: 1px solid transparent;
  border-radius: 9px;
  color: #4a5269;
  background: transparent;
  cursor: pointer;
}
.plot-context-tools button span { max-width: 58px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 8px; font-weight: 750; }
.plot-context-tools button:hover { color: var(--primary-strong); border-color: #d9d4ff; background: #f2f0ff; }
.plot-context-tools button.is-active { color: #fff; background: linear-gradient(145deg,#5749e2,#6b57ef); }
@keyframes context-tools-in { from { opacity: 0; transform: translate(-6px,-50%) scale(.92); } to { opacity: 1; transform: translate(-6px,-50%) scale(1); } }

.screenshot-menu-wrap { position: relative; display: flex; align-items: stretch; }
.menu-actions .screenshot-menu-wrap > button { border-radius: 9px; }
.menu-actions .screenshot-menu-wrap > button > span { display: inline-flex; align-items: center; }
.menu-actions .screenshot-menu-wrap > button.is-capturing { color: #fff; background: linear-gradient(145deg,#5749e2,#6b57ef); }
.shot-next-number { display: grid; place-items: center; min-width: 20px; height: 20px; border-radius: 6px; color: #5749e2; background: #fff; font-size: 12px; font-weight: 900; }
.screenshot-dropdown {
  position: absolute;
  z-index: 150;
  top: calc(100% + 7px);
  left: 0;
  width: 230px;
  display: grid;
  gap: 4px;
  padding: 7px;
  border: 1px solid #d5daea;
  border-radius: 12px;
  background: rgba(255,255,255,.99);
  box-shadow: 0 16px 42px rgba(37,42,72,.22);
}
.menu-actions .screenshot-dropdown button { display: grid; grid-template-columns: 28px 1fr; justify-content: stretch; min-height: 48px; padding: 6px 8px; text-align: left; }
.screenshot-dropdown button > span { display: grid; gap: 1px; }
.screenshot-dropdown strong { font-size: 11px; }
.screenshot-dropdown small { color: #7a8193; font-size: 9px; font-weight: 550; }

.rotation-handle { cursor: grab; filter: drop-shadow(0 2px 3px rgba(48,40,140,.22)); }
.rotation-handle:hover { fill: #ece9ff; stroke-width: 2.3; }
.rotation-handle:active { cursor: grabbing; }

/* alpha.4 single-symbol sizing and bundle controls */
.bundle-value-control { display: grid; grid-template-columns: minmax(90px, 1fr) 74px; gap: 3px 8px; align-items: center; width: 100%; }
.bundle-value-control > input[type="range"] { grid-column: 1; grid-row: 1; width: 100%; accent-color: var(--primary); }
.bundle-value-control > input[type="text"] { grid-column: 2; grid-row: 1 / span 2; width: 100%; }
.bundle-value-stops { grid-column: 1; display: flex; justify-content: space-between; color: #7a8193; font-size: 9px; font-weight: 700; line-height: 1; }
