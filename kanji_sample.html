  async function postGooglePayload(url, payload, contentType, signal) {
    const response = await fetch(url, {
      method: "POST",
      mode: "cors",
      credentials: "omit",
      headers: {
        "Content-Type": contentType,
      },
      body: JSON.stringify(payload),
      signal,
    });

    if (!response.ok) {
      throw new Error(`Google handwriting request failed: ${response.status}`);
    }

    return response.json();
  }

  function extractCandidatesFromGoogleResponse(data) {
    if (!Array.isArray(data) || data[0] !== "SUCCESS") {
      return [];
    }

    const candidates = [];

    function walk(value) {
      if (typeof value === "string") {
        const text = value.trim();
        if (text) {
          candidates.push(text);
        }
        return;
      }

      if (Array.isArray(value)) {
        value.forEach(walk);
      }
    }

    walk(data[1]);
    return normalizeCandidates(candidates);
  }

  async function recognizeWithGoogle(strokes = state.strokes) {
    const guide = getCanvasGuide();
    const payload = {
      device: navigator.userAgent,
      options: "enable_pre_space",
      requests: [
        {
          writing_guide: {
            writing_area_width: guide.width,
            writing_area_height: guide.height,
          },
          ink: buildGoogleInk(strokes),
          language: "ja",
        },
      ],
    };

    cancelGoogleRecognition(state);
    const controller = new AbortController();
    state.googleAbortController = controller;

    try {
      for (const transport of getGoogleTransports()) {
        if (controller.signal.aborted) {
          return [];
        }
        try {
          const data = await postGooglePayload(
            transport.url,
            payload,
            transport.contentType,
            controller.signal,
          );
          const candidates = extractCandidatesFromGoogleResponse(data);
          if (candidates.length > 0) {
            preferredGoogleTransport = transport;
            state.googleFailed = false;
            return candidates;
          }
        } catch (error) {
          if (controller.signal.aborted || error?.name === "AbortError") {
            return [];
          }
        }
      }
    } finally {
      if (state.googleAbortController === controller) {
        state.googleAbortController = null;
      }
    }

    state.googleFailed = true;
    return [];
  }

  function normalizeCandidateText(candidate) {
    let text = String(candidate || "").normalize("NFKC").trim();
    if (!text) {
      return "";
    }

    if (isFreeMode() || isReadingResponse()) {
      text = katakanaToHiragana(text);
    }
    if (!isReadingResponse() && getCharacterLength(text) === 1) {
      text = EDUCATIONAL_GLYPH_NORMALIZATION[text] || text;
    }

    return text;
  }

  function normalizeCandidates(candidates) {
    const seen = new Set();
    const normalized = [];

    for (const candidate of candidates) {
      const text = normalizeCandidateText(candidate);
      if (!text || seen.has(text)) {
        continue;
      }

      seen.add(text);
      normalized.push(text);
    }

    return normalized;
  }

  function getCharStrokeCount(char) {
    const count = Number.isFinite(strokeCounts[char])
      ? strokeCounts[char]
      : SUPPLEMENTAL_STROKE_COUNTS[char];

    return Number.isFinite(count) ? count : null;
  }

  function getKanaBaseStrokeCount(char) {
    const normalized = katakanaToHiragana(String(char || "").normalize("NFKC"));
    const educationalCount = EDUCATIONAL_HIRAGANA_STROKE_COUNTS[normalized];
    if (Number.isFinite(educationalCount)) {
      return educationalCount;
    }
    return getCharStrokeCount(char);
  }

  function getKanaStrokeProfile(text) {
    const decomposed = Array.from(String(text || "").normalize("NFD"));
    let baseStrokeCount = 0;
    let baseCharacterCount = 0;
    let diacriticStrokeCount = 0;

    for (const char of decomposed) {
      if (char === COMBINING_DAKUTEN) {
        diacriticStrokeCount += 2;
        continue;
      }
      if (char === COMBINING_HANDAKUTEN) {
        diacriticStrokeCount += 1;
        continue;
      }

      const count = getKanaBaseStrokeCount(char);
      if (!Number.isFinite(count)) {
        return null;
      }
      baseStrokeCount += count;
      baseCharacterCount += 1;
    }

    if (baseCharacterCount === 0 || baseStrokeCount === 0) {
      return null;
    }

    const total = baseStrokeCount + diacriticStrokeCount;
    return {
      min: total,
      softMin: total,
      max: total,
      baseStrokeCount,
      baseCharacterCount,
      diacriticStrokeCount,
      shortfallBudget: 0,
      model: "educational-handwriting",
    };
  }

  function getCandidateStrokeCountRange(text) {
    if (isKanaOnly(text)) {
      return getKanaStrokeProfile(text);
    }

    let total = 0;
    for (const char of Array.from(text)) {
      const count = getCharStrokeCount(char);
      if (!Number.isFinite(count)) {
        return null;
      }
      total += count;
    }

    return total > 0
      ? { min: total, softMin: total, max: total, shortfallBudget: 0, diacriticStrokeCount: 0 }
      : null;
  }

  function getCandidateStrokeCount(text) {
    const range = getCandidateStrokeCountRange(text);
    return range ? range.max : null;
  }

  function isCjkIdeograph(char) {
    return /^\p{Script=Han}$/u.test(String(char || ""));
  }

  function hasUnknownKanjiStrokeCount(text) {
    return Array.from(text).some((char) => {
      return isCjkIdeograph(char) && !Number.isFinite(getCharStrokeCount(char));
    });
  }

  function isKanaOnly(text) {
    return /^[\p{Script=Hiragana}\p{Script=Katakana}ー]+$/u.test(String(text || ""));
  }

  function isJapaneseCandidate(text) {
    const value = String(text || "");
    return (
      /[\p{Script=Hiragana}\p{Script=Katakana}\p{Script=Han}]/u.test(value) &&
      /^[\p{Script=Hiragana}\p{Script=Katakana}\p{Script=Han}々〆〤ヶヵー]+$/u.test(value)
    );
  }

  function getCharacterLength(text) {
    return Array.from(text).length;
  }

  function isAllowedCandidateForCurrentMode(text) {
    if (isFreeMode()) {
      return isHiraganaOnlyText(text);
    }
    if (isReadingResponse()) {
      return getCharacterLength(text) === 1 && isHiraganaOnlyText(text);
    }
    return getCharacterLength(text) === 1;
  }

  function getStrokeTolerance(expectedCount, text) {
    if (isKanaOnly(text)) {
      return 1;
    }

    return 0;
  }

  function getStrokeLength(stroke) {
    let length = 0;

    for (let index = 1; index < stroke.length; index += 1) {
      length += getDistance(stroke[index - 1], stroke[index]);
    }

    return length;
  }

  function getDistance(a, b) {
    return Math.hypot(b.x - a.x, b.y - a.y);
  }

  function getStrokeGeometry(stroke) {
    if (!Array.isArray(stroke) || stroke.length < 2) {
      return null;
    }

    const xs = stroke.map((point) => point.x);
    const ys = stroke.map((point) => point.y);
    const left = Math.min(...xs);
    const right = Math.max(...xs);
    const top = Math.min(...ys);
    const bottom = Math.max(...ys);
    return {
      stroke,
      start: stroke[0],
      end: stroke[stroke.length - 1],
      left,
      right,
      top,
      bottom,
      width: Math.max(1, right - left),
      height: Math.max(1, bottom - top),
      centerX: (left + right) / 2,
      centerY: (top + bottom) / 2,
      length: getStrokeLength(stroke),
    };
  }

  function getStrokeGroupBounds(startIndex, count) {
    const points = state.strokes
      .slice(startIndex, startIndex + count)
      .flat()
      .filter(Boolean);

    if (points.length === 0) {
      return null;
    }

    const xs = points.map((point) => point.x);
    const ys = points.map((point) => point.y);
    const left = Math.min(...xs);
    const right = Math.max(...xs);
    const top = Math.min(...ys);
    const bottom = Math.max(...ys);
    return {
      left,
      right,
      top,
      bottom,
      width: Math.max(1, right - left),
      height: Math.max(1, bottom - top),
    };
  }

  function getPointToSegmentDistance(point, start, end) {
    const dx = end.x - start.x;
    const dy = end.y - start.y;
    const lengthSquared = dx * dx + dy * dy;

    if (lengthSquared <= Number.EPSILON) {
      return getDistance(point, start);
    }

    const ratio = Math.max(0, Math.min(1,
      ((point.x - start.x) * dx + (point.y - start.y) * dy) / lengthSquared,
    ));
    return Math.hypot(
      point.x - (start.x + dx * ratio),
      point.y - (start.y + dy * ratio),
    );
  }

  function getPointToStrokeDistance(point, stroke) {
    if (!point || !Array.isArray(stroke) || stroke.length === 0) {
      return Infinity;
    }

    if (stroke.length === 1) {
      return getDistance(point, stroke[0]);
    }

    let distance = Infinity;
    for (let index = 1; index < stroke.length; index += 1) {
      distance = Math.min(
        distance,
        getPointToSegmentDistance(point, stroke[index - 1], stroke[index]),
      );
    }
    return distance;
  }


  function getStrokeProjection(point, stroke) {
    if (!point || !Array.isArray(stroke) || stroke.length === 0) {
      return { distance: Infinity, position: 0, point: null };
    }
    if (stroke.length === 1) {
      return { distance: getDistance(point, stroke[0]), position: 0, point: stroke[0] };
    }
    const segmentLengths = [];
    let totalLength = 0;
    for (let index = 1; index < stroke.length; index += 1) {
      const length = getDistance(stroke[index - 1], stroke[index]);
      segmentLengths.push(length);
      totalLength += length;
    }
    let elapsed = 0;
    let best = { distance: Infinity, position: 0, point: null };
    for (let index = 1; index < stroke.length; index += 1) {
      const start = stroke[index - 1];
      const end = stroke[index];
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const lengthSquared = dx * dx + dy * dy;
      const ratio = lengthSquared <= Number.EPSILON
        ? 0
        : Math.max(0, Math.min(1,
          ((point.x - start.x) * dx + (point.y - start.y) * dy) / lengthSquared,
        ));
      const projected = { x: start.x + dx * ratio, y: start.y + dy * ratio };
      const distance = getDistance(point, projected);
      if (distance < best.distance) {
        best = {
          distance,
          position: totalLength > 0
            ? (elapsed + segmentLengths[index - 1] * ratio) / totalLength
            : 0,
          point: projected,
        };
      }
      elapsed += segmentLengths[index - 1];
    }
    return best;
  }

  function getLineSegmentIntersection(a, b, c, d) {
    const rx = b.x - a.x;
    const ry = b.y - a.y;
    const sx = d.x - c.x;
    const sy = d.y - c.y;
    const denominator = rx * sy - ry * sx;
    if (Math.abs(denominator) < 1e-7) return null;
    const qpx = c.x - a.x;
    const qpy = c.y - a.y;
    const t = (qpx * sy - qpy * sx) / denominator;
    const u = (qpx * ry - qpy * rx) / denominator;
    if (t < 0 || t > 1 || u < 0 || u > 1) return null;
    return { t, u };
  }

  function getStrokeClosestRelation(strokeA, strokeB) {
    if (!Array.isArray(strokeA) || !Array.isArray(strokeB) ||
        strokeA.length === 0 || strokeB.length === 0) {
      return { distance: Infinity, positionA: 0, positionB: 0 };
    }
    let best = { distance: Infinity, positionA: 0, positionB: 0 };
    const lengthA = Math.max(1, getStrokeLength(strokeA));
    const lengthB = Math.max(1, getStrokeLength(strokeB));
    const prefixA = [0];
    const prefixB = [0];
    for (let index = 1; index < strokeA.length; index += 1) {
      prefixA.push(prefixA[index - 1] + getDistance(strokeA[index - 1], strokeA[index]));
    }
    for (let index = 1; index < strokeB.length; index += 1) {
      prefixB.push(prefixB[index - 1] + getDistance(strokeB[index - 1], strokeB[index]));
    }
    for (let indexA = 1; indexA < strokeA.length; indexA += 1) {
      const segmentLengthA = getDistance(strokeA[indexA - 1], strokeA[indexA]);
      for (let indexB = 1; indexB < strokeB.length; indexB += 1) {
        const intersection = getLineSegmentIntersection(
          strokeA[indexA - 1], strokeA[indexA],
          strokeB[indexB - 1], strokeB[indexB],
        );
        if (!intersection) continue;
        const segmentLengthB = getDistance(strokeB[indexB - 1], strokeB[indexB]);
        return {
          distance: 0,
          positionA: (prefixA[indexA - 1] + segmentLengthA * intersection.t) / lengthA,
          positionB: (prefixB[indexB - 1] + segmentLengthB * intersection.u) / lengthB,
        };
      }
    }
    let elapsedA = 0;
    strokeA.forEach((point, index) => {
      if (index > 0) elapsedA += getDistance(strokeA[index - 1], point);
      const projected = getStrokeProjection(point, strokeB);
      if (projected.distance < best.distance) {
        best = {
          distance: projected.distance,
          positionA: elapsedA / lengthA,
          positionB: projected.position,
        };
      }
    });
    let elapsedB = 0;
    strokeB.forEach((point, index) => {
      if (index > 0) elapsedB += getDistance(strokeB[index - 1], point);
      const projected = getStrokeProjection(point, strokeA);
      if (projected.distance < best.distance) {
        best = {
          distance: projected.distance,
          positionA: projected.position,
          positionB: elapsedB / lengthB,
        };
      }
    });
    return best;
  }

  function getComponentData(startIndex, count) {
    const strokes = state.strokes.slice(startIndex, startIndex + count);
    if (strokes.length < count || strokes.some((stroke) => !Array.isArray(stroke) || stroke.length < 2)) {
      return null;
    }
    const bounds = getStrokeGroupBounds(startIndex, count);
    if (!bounds) {
      return null;
    }
    return {
      startIndex,
      strokes,
      bounds,
      diagonal: Math.hypot(bounds.width, bounds.height),
      geometries: strokes.map(getStrokeGeometry),
    };
  }

  function createContrastiveDecision(status, details = {}, penalty = 0) {
    return {
      status,
      hardReject: status === "competing",
      penalty: status === "ambiguous" ? penalty : 0,
      details,
    };
  }

  function evaluateHorizontalLengthContrast(startIndex, upperOffset, lowerOffset, expected) {
    const data = getComponentData(startIndex, Math.max(upperOffset, lowerOffset) + 1);
    if (!data) {
      return createContrastiveDecision("unavailable");
    }
    const upper = data.geometries[upperOffset];
    const lower = data.geometries[lowerOffset];
    if (!upper || !lower) {
      return createContrastiveDecision("unavailable");
    }
    const upperLength = Math.max(upper.width, upper.length * 0.72);
    const lowerLength = Math.max(lower.width, lower.length * 0.72);
    const ratio = upperLength / Math.max(1, lowerLength);
    const expectedPass = expected === "upper-longer" ? ratio >= 1.08 : ratio <= 0.92;
    const competing = expected === "upper-longer" ? ratio <= 0.88 : ratio >= 1.12;
    if (competing) {
      return createContrastiveDecision("competing", { ratio, expected });
    }
    if (expectedPass) {
      return createContrastiveDecision("expected", { ratio, expected });
    }
    return createContrastiveDecision("ambiguous", { ratio, expected }, 0.34);
  }

  function evaluateUshiAgainstUmaComponent(startIndex, count) {
    const data = getComponentData(startIndex, count);
    if (!data) {
      return createContrastiveDecision("unavailable");
    }
    const verticalCandidates = data.geometries
      .map((geometry, index) => ({ geometry, index }))
      .filter(({ geometry }) => geometry && geometry.height >= geometry.width * 1.45)
      .sort((a, b) => b.geometry.height - a.geometry.height);
    const horizontalCandidates = data.geometries
      .map((geometry, index) => ({ geometry, index }))
      .filter(({ geometry }) => geometry && geometry.width >= geometry.height * 1.45)
      .sort((a, b) => a.geometry.centerY - b.geometry.centerY);
    const vertical = verticalCandidates[0];
    const upper = horizontalCandidates[0];
    if (!vertical || !upper) {
      return createContrastiveDecision("unavailable");
    }
    const relation = getStrokeClosestRelation(
      data.strokes[upper.index],
      data.strokes[vertical.index],
    );
    const tolerance = Math.max(5, data.diagonal * 0.045);
    const protrusionRatio = (upper.geometry.centerY - vertical.geometry.top) /
      Math.max(1, data.bounds.height);
    const touches = relation.distance <= tolerance;
    const verticalContactPosition = relation.positionB;
    const umaLike = touches
      ? verticalContactPosition <= 0.075
      : protrusionRatio <= 0.015;
    const ushiLike = touches
      ? verticalContactPosition >= 0.12
      : protrusionRatio >= 0.07;
    const details = {
      distance: relation.distance,
      verticalContactPosition,
      protrusionRatio,
    };
    if (umaLike) return createContrastiveDecision("competing", details);
    if (ushiLike) return createContrastiveDecision("expected", details);
    return createContrastiveDecision("ambiguous", details, 0.38);
  }

  function evaluateYuuAgainstShinComponent(startIndex, count) {
    const data = getComponentData(startIndex, count);
    if (!data) {
      return createContrastiveDecision("unavailable");
    }
    const verticals = data.geometries
      .map((geometry, index) => ({ geometry, index }))
      .filter(({ geometry }) => geometry && geometry.height >= geometry.width * 1.45)
      .sort((a, b) => b.geometry.height - a.geometry.height);
    const central = verticals.find(({ geometry }) =>
      geometry.centerX >= data.bounds.left + data.bounds.width * 0.28 &&
      geometry.centerX <= data.bounds.left + data.bounds.width * 0.72
    ) || verticals[0];
    if (!central) {
      return createContrastiveDecision("unavailable");
    }
    const otherGeometries = data.geometries.filter((_, index) => index !== central.index).filter(Boolean);
    if (otherGeometries.length === 0) {
      return createContrastiveDecision("unavailable");
    }
    const boxBottom = Math.max(...otherGeometries.map((geometry) => geometry.bottom));
    const belowRatio = (central.geometry.bottom - boxBottom) / Math.max(1, data.bounds.height);
    if (belowRatio >= 0.075) {
      return createContrastiveDecision("competing", { belowRatio });
    }
    if (belowRatio <= 0.025) {
      return createContrastiveDecision("expected", { belowRatio });
    }
    return createContrastiveDecision("ambiguous", { belowRatio }, 0.32);
  }

  function isStartAttachedToStroke(stroke, target, tolerance, minPosition = 0.1, maxPosition = 0.9) {
    if (!stroke?.[0]) return { pass: false, distance: Infinity, position: 0 };
    const projection = getStrokeProjection(stroke[0], target);
    return {
      pass: projection.distance <= tolerance &&
        projection.position >= minPosition && projection.position <= maxPosition,
      distance: projection.distance,
      position: projection.position,
    };
  }

  function evaluateSakuComponentTopology(startIndex, count) {
    const data = getComponentData(startIndex, count);
    if (!data || data.strokes.length < 5) {
      return createContrastiveDecision("unavailable");
    }
    const tolerance = Math.max(5, data.diagonal * 0.055);
    const upperHorizontal = data.strokes[1];
    const vertical = data.strokes[2];
    const lowerA = data.strokes[3];
    const lowerB = data.strokes[4];
    const verticalFromUpper = isStartAttachedToStroke(vertical, upperHorizontal, tolerance, 0.12, 0.92);
    const lowerAFromVertical = isStartAttachedToStroke(lowerA, vertical, tolerance, 0.12, 0.92);
    const lowerBFromVertical = isStartAttachedToStroke(lowerB, vertical, tolerance, 0.12, 0.96);
    const upperFromVertical = isStartAttachedToStroke(upperHorizontal, vertical, tolerance, 0.1, 0.9);
    const details = {
      verticalFromUpper,
      lowerAFromVertical,
      lowerBFromVertical,
      upperFromVertical,
    };
    if (upperFromVertical.pass && !verticalFromUpper.pass) {
      return createContrastiveDecision("competing", details);
    }
    if (!lowerAFromVertical.pass || !lowerBFromVertical.pass) {
      return createContrastiveDecision("competing", details);
    }
    if (verticalFromUpper.pass) {
      return createContrastiveDecision("expected", details);
    }
    return createContrastiveDecision("ambiguous", details, 0.42);
  }

  function evaluateBunComponentTopology(startIndex, count) {
    const data = getComponentData(startIndex, count);
    if (!data || data.strokes.length < 4) {
      return createContrastiveDecision("unavailable");
    }
    const third = data.strokes[2];
    const fourth = data.strokes[3];
    const relation = getStrokeClosestRelation(third, fourth);
    const tolerance = Math.max(5, data.diagonal * 0.045);
    const interior = relation.positionA >= 0.13 && relation.positionA <= 0.9 &&
      relation.positionB >= 0.13 && relation.positionB <= 0.9;
    const startStartOnly = relation.positionA <= 0.1 && relation.positionB <= 0.1;
    const details = { ...relation, tolerance, interior, startStartOnly };
    if (relation.distance <= tolerance && interior) {
      return createContrastiveDecision("expected", details);
    }
    if (startStartOnly || relation.distance > tolerance * 1.45) {
      return createContrastiveDecision("competing", details);
    }
    return createContrastiveDecision("ambiguous", details, 0.45);
  }

  function evaluateDirectionalStrokeSignature(startIndex, count, descriptors) {
    const data = getComponentData(startIndex, count);
    const rules = Array.isArray(descriptors) ? descriptors : [];
    if (!data || rules.length === 0) {
      return createContrastiveDecision("unavailable", { reason: "missing-direction-component" });
    }

    const requiredDrop = Math.max(7, data.bounds.height * 0.065);
    const requiredSide = Math.max(5, data.bounds.width * 0.045);
    const observations = [];
    let expectedCount = 0;
    let competingCount = 0;

    for (const descriptor of rules) {
      const stroke = data.strokes[descriptor.offset];
      if (!Array.isArray(stroke) || stroke.length < 2) {
        observations.push({
          offset: descriptor.offset,
          direction: descriptor.direction,
          status: "unavailable",
        });
        continue;
      }
      const start = stroke[0];
      const end = stroke[stroke.length - 1];
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const expectsLeft = descriptor.direction === "down-left";
      const expectsRight = descriptor.direction === "down-right";
      const clearlyDown = dy >= requiredDrop;
      const clearlyUp = dy <= -requiredDrop;
      const clearlyLeft = dx <= -requiredSide;
      const clearlyRight = dx >= requiredSide;
      const sideExpected = !expectsLeft && !expectsRight ||
        (expectsLeft && clearlyLeft) || (expectsRight && clearlyRight);
      const sideCompeting = (expectsLeft && clearlyRight) || (expectsRight && clearlyLeft);
      let status = "ambiguous";

      // 同じ線分を逆向きになぞると形は同一でも始終点が反転する。
      // 上向きが明確な場合は、字形比較とは独立して運筆方向の競合と判定する。
      if (clearlyUp || (clearlyDown && sideCompeting)) {
        status = "competing";
        competingCount += 1;
      } else if (clearlyDown && sideExpected) {
        status = "expected";
        expectedCount += 1;
      }

      observations.push({
        offset: descriptor.offset,
        direction: descriptor.direction,
        dx,
        dy,
        dxRatio: dx / Math.max(1, data.bounds.width),
        dyRatio: dy / Math.max(1, data.bounds.height),
        status,
      });
    }

    const details = { requiredDrop, requiredSide, observations };
    if (competingCount > 0) {
      return createContrastiveDecision("competing", details);
    }
    if (expectedCount === rules.length) {
      return createContrastiveDecision("expected", details);
    }
    return createContrastiveDecision("ambiguous", details, 0.18 + (rules.length - expectedCount) * 0.08);
  }

  // 旧診断JSON・外部デバッグ呼出しとの互換用。新規規則は署名評価器を直接利用する。
  function evaluateDescendingStrokePair(startIndex, offsets) {
    return evaluateDirectionalStrokeSignature(
      startIndex,
      Math.max(...offsets) + 1,
      offsets.map((offset) => ({ offset, direction: "down" })),
    );
  }

  function evaluateEnnyouAgainstShinnyou() {
    const source = state.strokes.filter((stroke) => Array.isArray(stroke) && stroke.length > 1);
    if (source.length < 2) {
      return createContrastiveDecision("unavailable");
    }
    const tail = source.slice(-3);
    const points = tail.flat();
    const xs = points.map((point) => point.x);
    const ys = points.map((point) => point.y);
    const bounds = {
      left: Math.min(...xs), right: Math.max(...xs),
      top: Math.min(...ys), bottom: Math.max(...ys),
    };
    bounds.width = Math.max(1, bounds.right - bounds.left);
    bounds.height = Math.max(1, bounds.bottom - bounds.top);
    const diagonal = Math.hypot(bounds.width, bounds.height);
    const features = tail.map((stroke, index) => ({
      index,
      stroke,
      geometry: getStrokeGeometry(stroke),
    })).filter((item) => item.geometry);
    const final = features[features.length - 1];
    if (!final) return createContrastiveDecision("unavailable");
    const longBottomSweep = final.geometry.width >= bounds.width * 0.42 &&
      final.geometry.bottom >= bounds.top + bounds.height * 0.72;
    const compactDot = features.slice(0, -1).find(({ geometry }) =>
      geometry.length <= diagonal * 0.18 &&
      geometry.width <= bounds.width * 0.2 &&
      geometry.height <= bounds.height * 0.22 &&
      geometry.centerY <= final.geometry.centerY &&
      geometry.centerX <= final.geometry.centerX
    );
    const finalHasVerticalDescent = final.geometry.height >= bounds.height * 0.56;
    const details = {
      compactDot: Boolean(compactDot),
      longBottomSweep,
      finalHasVerticalDescent,
      finalWidthRatio: final.geometry.width / bounds.width,
      finalHeightRatio: final.geometry.height / bounds.height,
    };
    if (compactDot && longBottomSweep) {
      return createContrastiveDecision("competing", details);
    }
    if (longBottomSweep && finalHasVerticalDescent) {
      return createContrastiveDecision("expected", details);
    }
    return createContrastiveDecision("ambiguous", details, 0.4);
  }

  function evaluateContrastiveCandidateStructure(text) {
    const failedRuleIds = [];
    const ambiguousRuleIds = [];
    const details = [];
    let penalty = 0;
    for (const rule of CONTRASTIVE_COMPONENT_RULES) {
      if (!rule.applies(text)) continue;
      const decision = rule.test();
      details.push({ id: rule.id, ...decision });
      if (decision?.hardReject) failedRuleIds.push(rule.id);
      if (decision?.status === "ambiguous") ambiguousRuleIds.push(rule.id);
      penalty += Number(decision?.penalty) || 0;
    }
    return {
      pass: failedRuleIds.length === 0,
      failedRuleIds,
      ambiguousRuleIds,
      penalty: Math.round(penalty * 1000) / 1000,
      details,
    };
  }

  function hasValidShitsuComponent(startIndex) {
    const strokes = state.strokes.slice(startIndex, startIndex + 5);
    if (strokes.length < 5 || strokes.some((stroke) => stroke.length < 2)) {
      return false;
    }

    const bounds = getStrokeGroupBounds(startIndex, 5);
    const upperHorizontal = getStrokeGeometry(strokes[1]);
    const lowerHorizontal = getStrokeGeometry(strokes[2]);
    const centralSweep = getStrokeGeometry(strokes[3]);
    const finalSweep = getStrokeGeometry(strokes[4]);

    if (!bounds || !upperHorizontal || !lowerHorizontal || !centralSweep || !finalSweep) {
      return false;
    }

    // 「失」は第4画が上の横画より明確に突き出す。「矢」型はここで除外する。
    const protrudesAbove =
      centralSweep.start.y <= upperHorizontal.centerY - bounds.height * 0.07;

    // 最終画は、第2画ではなく第3画と第4画の交点付近から始まる。
    const finalStart = finalSweep.start;
    const threshold = Math.max(14, Math.min(bounds.width, bounds.height) * 0.105);
    const distanceToLower = getPointToStrokeDistance(finalStart, strokes[2]);
    const distanceToCentral = getPointToStrokeDistance(finalStart, strokes[3]);
    const distanceToUpper = getPointToStrokeDistance(finalStart, strokes[1]);
    const startsAtLowerIntersection =
      distanceToLower <= threshold &&
      distanceToCentral <= threshold &&
      distanceToLower + bounds.height * 0.055 < distanceToUpper;

    return protrudesAbove && startsAtLowerIntersection;
  }

  function hasValidBenLayout() {
    const thirdStroke = getStrokeGeometry(state.strokes[2]);
    const eighthStroke = getStrokeGeometry(state.strokes[7]);
    const bounds = getStrokeGroupBounds(2, 7);

    if (!thirdStroke || !eighthStroke || !bounds) {
      return false;
    }

    // 第8画の始部が第3画を大きく上へ突き抜ける形を除外する。
    return eighthStroke.start.y >= thirdStroke.centerY - bounds.height * 0.085;

    const bounds = getStrokeGroupBounds(4, 7);

    if (!ninthStroke || !eleventhStroke || !bounds) {
      return false;

    // 「械」の第11画は第9画の始部より右側に置かれる。
    return eleventhStroke.start.x >= ninthStroke.start.x + bounds.width * 0.035;

  function hasValidJuComponent(startIndex = 0) {

    if (!componentBounds || !seventhComponentStroke) {
      return false;
    }

    // 「重」の第7画は「目」の一辺ではなく、上下を貫く中央の縦画。
    const isLongCentralVertical =
      seventhComponentStroke.height >= componentBounds.height * 0.57 &&
      seventhComponentStroke.centerX >= componentBounds.left + componentBounds.width * 0.3 &&
      seventhComponentStroke.centerX <= componentBounds.left + componentBounds.width * 0.7 &&
      seventhComponentStroke.top <= componentBounds.top + componentBounds.height * 0.23 &&
      seventhComponentStroke.bottom >= componentBounds.bottom - componentBounds.height * 0.16;

    const firstRightStroke = getStrokeGeometry(state.strokes[startIndex]);

    if (!bounds || !firstRightStroke) {
      return false;

    // 「攵」の第1画は左下へ払う。「文」の点・右下方向の線は認めない。

      firstRightStroke.end.y >= firstRightStroke.start.y + bounds.height * 0.18

  function isFreeCandidateProgressPlausible(text, strokeStats) {
    if (state.isRecognitionReplay || !isFreeMode()) {
      return true;
    }

    const record = getActiveInputRecord();
    const previousText = String(record.acceptedText || "");
    const previousRawCount = Math.max(0, Number(record.acceptedRawCount) || 0);

    if (!previousText || strokeStats.rawCount < previousRawCount) {
      return true;
    }

    const addedStrokes = strokeStats.rawCount - previousRawCount;
    const addedCharacters = getCharacterLength(text) - getCharacterLength(previousText);

    // 一画で新たに確定できる文字は最大一字。既存部分の読み替えは許容する。
    return addedCharacters <= Math.max(0, addedStrokes);

  function getInkBounds() {
    const points = state.strokes.flat().filter(Boolean);

    if (points.length === 0) {
      return null;
    }

    const bounds = points.reduce(
      (acc, point) => ({
        left: Math.min(acc.left, point.x),
        right: Math.max(acc.right, point.x),
        top: Math.min(acc.top, point.y),
        bottom: Math.max(acc.bottom, point.y),
      }),
      {
        left: Infinity,
        right: -Infinity,
        top: Infinity,
        bottom: -Infinity,
      },
    );

    return {
      ...bounds,
      width: Math.max(1, bounds.right - bounds.left),
      height: Math.max(1, bounds.bottom - bounds.top),
    };
  }

  function clusterNumericBands(values, minGap) {
    const sorted = values
      .filter((value) => Number.isFinite(value))
      .sort((a, b) => a - b);
    const clusters = [];

    sorted.forEach((value) => {
      const cluster = clusters[clusters.length - 1];

      if (!cluster || value - cluster.center > minGap) {
        clusters.push({ center: value, count: 1 });
        return;
      }

      cluster.center = (cluster.center * cluster.count + value) / (cluster.count + 1);
      cluster.count += 1;
    });

    return clusters;
  }

  function getStrokeFeatures() {
    return state.strokes
      .map((stroke, strokeIndex) => ({ stroke, strokeIndex }))
      .filter((item) => item.stroke.length > 1)
      .map(({ stroke, strokeIndex }) => {
        const xs = stroke.map((point) => point.x);
        const ys = stroke.map((point) => point.y);
        const left = Math.min(...xs);
        const right = Math.max(...xs);
        const top = Math.min(...ys);
        const bottom = Math.max(...ys);

        return {
          left,
          right,
          top,
          bottom,
          width: Math.max(1, right - left),
          height: Math.max(1, bottom - top),
          centerX: (left + right) / 2,
          centerY: (top + bottom) / 2,
          strokeIndex,
          length: getStrokeLength(stroke),
          start: stroke[0],
          end: stroke[stroke.length - 1],
        };
      });
  }

  function getSegmentFeatures(bounds = getInkBounds()) {
    if (!bounds) {
      return [];
    }

    const guide = getCanvasGuide();
    const diagonal = Math.hypot(guide.width, guide.height);
    const minPointDistance = Math.max(5, diagonal * 0.008);
    const minSegmentLength = Math.max(7, diagonal * 0.012);
    const segments = [];

    state.strokes.forEach((stroke) => {
      const simplified = simplifyStroke(stroke, minPointDistance);

      for (let index = 1; index < simplified.length; index += 1) {
        const start = simplified[index - 1];
        const end = simplified[index];
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        const length = Math.hypot(dx, dy);

        if (length < minSegmentLength) {
          continue;
        }

        const left = Math.min(start.x, end.x);
        const right = Math.max(start.x, end.x);
        const top = Math.min(start.y, end.y);
        const bottom = Math.max(start.y, end.y);

        segments.push({
          start,
          end,
          dx,
          dy,
          length,
          left,
          right,
          top,
          bottom,
          centerX: (start.x + end.x) / 2,
          centerY: (start.y + end.y) / 2,
          isHorizontal: Math.abs(dx) >= Math.max(Math.abs(dy) * 1.45, bounds.width * 0.035),
          isVertical: Math.abs(dy) >= Math.max(Math.abs(dx) * 1.35, bounds.height * 0.05),
        });
      }
    });

    return segments;
  }

    const leftRegionHardRight = bounds.left + bounds.width * 0.54;

    const horizontalBands = clusterNumericBands(

        .filter((segment) => {
          return (
            segment.isHorizontal &&
            segment.length >= Math.max(10, bounds.width * 0.07) &&
            segment.centerX <= leftRegionRight &&
            segment.right <= leftRegionHardRight &&
            segment.centerY >= bounds.top + bounds.height * 0.08 &&
            segment.centerY <= bounds.bottom - bounds.height * 0.05
          );
        })
        .map((segment) => segment.centerY),
      Math.max(8, bounds.height * 0.085),
    );

      return (
        segment.isVertical &&
        segment.centerX <= leftRegionHardRight &&
        segment.length >= Math.max(12, bounds.height * 0.18)
      );

        feature.centerY >= lowerLimit &&
        feature.length >= 5 &&
        feature.length <= Math.max(42, bounds.height * 0.24) &&

        feature.height <= bounds.height * 0.22

  function getHorizontalBands(bounds = getInkBounds()) {
    if (!bounds) {

    const segments = getSegmentFeatures(bounds)
      .filter((segment) => segment.isHorizontal && segment.length >= bounds.width * 0.12)
      .map((segment) => ({
        y: segment.centerY,
        left: segment.left,
        right: segment.right,
        length: segment.length,
        centerX: segment.centerX,
      }))
      .sort((a, b) => a.y - b.y);

    const bands = [];
    const gap = Math.max(8, bounds.height * 0.065);

    segments.forEach((segment) => {
      const band = bands[bands.length - 1];

      if (!band || segment.y - band.y > gap) {
        bands.push({ ...segment, count: 1 });
        return;
      }

      band.y = (band.y * band.count + segment.y) / (band.count + 1);
      band.left = Math.min(band.left, segment.left);
      band.right = Math.max(band.right, segment.right);
      band.length = Math.max(band.length, segment.length);
      band.centerX = (band.left + band.right) / 2;
      band.count += 1;

    return bands;

  function hasLikelyYouStructure() {

    const upper = bands[0];
    const lower = bands[1];
    const upperStroke = getStrokeFeatures()
      .filter((feature) => feature.centerY <= bounds.top + bounds.height * 0.3)
      .sort((a, b) => b.length - a.length)[0];
    const upperSlantsDown = upperStroke
      ? Math.abs(upperStroke.end.y - upperStroke.start.y) > Math.abs(upperStroke.end.x - upperStroke.start.x) * 0.18
      : false;

  function getUpperBoxAndHorizontalRelation() {
    const bounds = getInkBounds();

    if (!bounds) {
      return null;
    }

    const segments = getSegmentFeatures(bounds);
    const upperLimit = bounds.top + bounds.height * 0.7;
    const shortHorizontals = segments.filter((segment) => {
      return (
        segment.isHorizontal &&
        segment.centerY <= upperLimit &&
        segment.length >= bounds.width * 0.12 &&
        segment.length <= bounds.width * 0.48
      );
    });
    const verticals = segments.filter((segment) => {
      return (
        segment.isVertical &&
        segment.centerY <= upperLimit &&
        segment.length >= bounds.height * 0.1 &&
        segment.length <= bounds.height * 0.4
      );
    });

    let boxCenterY = null;
    for (const horizontal of shortHorizontals) {
      const leftVertical = verticals.find((vertical) => {
        return Math.abs(vertical.centerX - horizontal.left) <= bounds.width * 0.12;
      });
      const rightVertical = verticals.find((vertical) => {
        return Math.abs(vertical.centerX - horizontal.right) <= bounds.width * 0.12;
      });

      if (leftVertical || rightVertical) {
        const related = [horizontal, leftVertical, rightVertical].filter(Boolean);
        boxCenterY = related.reduce((sum, item) => sum + item.centerY, 0) / related.length;
        break;
      }
    }

    if (!Number.isFinite(boxCenterY)) {
      return null;
    }

    const longHorizontal = segments
      .filter((segment) => {
        return (
          segment.isHorizontal &&
          segment.centerY <= upperLimit &&
          segment.length >= bounds.width * 0.42
        );
      })
      .sort((a, b) => Math.abs(a.centerY - boxCenterY) - Math.abs(b.centerY - boxCenterY))[0];

    if (!longHorizontal) {
      return null;
    }

    return longHorizontal.centerY < boxCenterY ? "horizontal-above" : "horizontal-below";

  function countCredibleJoinedCorners() {
    const bounds = getInkBounds();

    if (!bounds) {
      return 0;
    }

    const guide = getCanvasGuide();
    const minDistance = Math.max(8, Math.hypot(guide.width, guide.height) * 0.014);
    const minLeg = Math.max(18, Math.min(bounds.width, bounds.height) * 0.1);
    let count = 0;

    state.strokes.forEach((stroke) => {
      const points = simplifyStroke(stroke, minDistance);

      for (let index = 1; index < points.length - 1; index += 1) {
        const a = points[index - 1];
        const b = points[index];
        const c = points[index + 1];
        const lenA = getDistance(a, b);
        const lenB = getDistance(b, c);

        if (lenA < minLeg || lenB < minLeg) {
          continue;
        }

        const dot = (b.x - a.x) * (c.x - b.x) + (b.y - a.y) * (c.y - b.y);
        const angle = Math.acos(Math.max(-1, Math.min(1, dot / (lenA * lenB))));

        if (angle >= Math.PI * 0.32 && angle <= Math.PI * 0.72) {
          count += 1;
        }
      }
    });

    return count;

  function evaluateRequiredCandidateStructure(text) {
    const failedRuleIds = [];

    for (const rule of STRUCTURAL_COMPONENT_RULES) {
      if (!rule.applies(text)) {
        continue;
      }
      if (!rule.test()) {
        failedRuleIds.push(rule.id);
      }
    }

    return {
      pass: failedRuleIds.length === 0,
      failedRuleIds,
    };
  }

  function hasRequiredCandidateStructure(text) {
    return evaluateRequiredCandidateStructure(text).pass;
  }

  function simplifyStroke(stroke, minDistance) {
    if (stroke.length <= 2) {
      return stroke.slice();
    }

    const simplified = [stroke[0]];
    let last = stroke[0];

    for (let index = 1; index < stroke.length - 1; index += 1) {
      const point = stroke[index];

      if (getDistance(last, point) >= minDistance) {
        simplified.push(point);
        last = point;
      }
    }

    simplified.push(stroke[stroke.length - 1]);
    return simplified;
  }

  function estimateSegmentsInStroke(stroke, guide) {
    if (stroke.length < 2) {
      return 0;
    }

    const diagonal = Math.hypot(guide.width, guide.height);
    const minPointDistance = Math.max(7, diagonal * 0.012);
    const minSectionLength = Math.max(24, diagonal * 0.04);
    const simplified = simplifyStroke(stroke, minPointDistance);

    if (simplified.length < 3) {
      return 1;
    }

    let segments = 1;
    let distanceSinceBreak = 0;
    let remainingLength = 0;
    const lengths = [];

    for (let index = 1; index < simplified.length; index += 1) {
      const length = getDistance(simplified[index - 1], simplified[index]);
      lengths.push(length);
      remainingLength += length;
    }

    for (let index = 1; index < simplified.length - 1; index += 1) {
      const before = simplified[index - 1];
      const current = simplified[index];
      const after = simplified[index + 1];
      const lenA = getDistance(before, current);
      const lenB = getDistance(current, after);

      distanceSinceBreak += lengths[index - 1] || 0;
      remainingLength -= lengths[index - 1] || 0;

      if (lenA < minPointDistance || lenB < minPointDistance) {
        continue;
      }

      const dot =
        (current.x - before.x) * (after.x - current.x) +
        (current.y - before.y) * (after.y - current.y);
      const ratio = Math.max(-1, Math.min(1, dot / (lenA * lenB)));
      const turn = Math.acos(ratio);

      if (
        turn > Math.PI * 0.58 &&
        distanceSinceBreak >= minSectionLength &&
        remainingLength >= minSectionLength
      ) {
        segments += 1;
        distanceSinceBreak = 0;
      }
    }

    return Math.max(1, segments);
  }

  function estimateStrokeStats(strokes, guide = getCanvasGuide()) {
    const source = Array.isArray(strokes) ? strokes : [];
    const rawCount = source.filter((stroke) => stroke.length > 1).length;
    const virtualCount = source.reduce((total, stroke) => {
      return total + estimateSegmentsInStroke(stroke, guide);
    }, 0);

    return {
      rawCount,
      virtualCount: Math.max(rawCount, virtualCount),
    };
  }

  function estimateInputStrokeStats() {
    return estimateStrokeStats(state.strokes, getCanvasGuide());
  }

  function hasShinnyouChar(text) {

  function hasCompletedShinnyouSweep() {
    const bounds = getInkBounds();

    if (!bounds || bounds.width < 1 || bounds.height < 1) {
      return false;

    const guide = getCanvasGuide();
    const diagonal = Math.hypot(guide.width, guide.height);
    const minPointDistance = Math.max(7, diagonal * 0.012);
    const bottomBandTop = bounds.top + bounds.height * 0.68;
    const minSweepDx = Math.max(bounds.width * 0.5, guide.width * 0.15);

    for (const stroke of state.strokes) {
      const simplified = simplifyStroke(stroke, minPointDistance);
      let runDx = 0;
      let runStartX = null;
      let runEndX = null;

      for (let index = 1; index < simplified.length; index += 1) {
        const before = simplified[index - 1];
        const after = simplified[index];
        const dx = after.x - before.x;
        const dy = after.y - before.y;
        const midY = (before.y + after.y) / 2;
        const isBottom = midY >= bottomBandTop;
        const isRightward = dx > 0;
        const isMostlyHorizontal =
          Math.abs(dy) <= Math.max(Math.abs(dx) * 0.5, bounds.height * 0.08);

        if (isBottom && isRightward && isMostlyHorizontal) {
          runStartX = runStartX ?? before.x;
          runEndX = after.x;
          runDx += dx;

          if (
            runDx >= minSweepDx &&
            runStartX <= bounds.left + bounds.width * 0.38 &&
            runEndX >= bounds.left + bounds.width * 0.72
          ) {
            return true;
          }
        } else {
          runDx = 0;
          runStartX = null;
          runEndX = null;
        }
      }
    }

    return false;
  }

  function hasCompletedSanzui() {

    if (!bounds || bounds.width < 1 || bounds.height < 1) {
      return false;
    }

    const leftLimit = bounds.left + bounds.width * 0.42;
    const marks = state.strokes
      .filter((stroke) => stroke.length > 1)
      .map((stroke) => {

        const end = stroke[stroke.length - 1];
        const xs = stroke.map((point) => point.x);
        const ys = stroke.map((point) => point.y);
        const left = Math.min(...xs);

  function getAllowedRawShortfall() {
    // 一文字枠では標準的な筆の上げ下げを学習対象にする。

    return 0;

  function evaluateStrokeCompatibility(text, strokeStats) {
    const expectedRange = getCandidateStrokeCountRange(text);
    const result = {
      pass: true,
      reasons: [],
      warnings: [],
      expectedRange,
      scorePenalty: 0,
      unknownStrokeCount: false,
      structure: evaluateRequiredCandidateStructure(text),
      contrastiveStructure: evaluateContrastiveCandidateStructure(text),
    };

    if (!expectedRange) {
      const isSingleHan = !isFreeMode() &&
        getCharacterLength(text) === 1 &&
        isCjkIdeograph(text);
      result.pass = Boolean(
        isSingleHan &&
        strokeStats.rawCount >= 1 &&
        strokeStats.virtualCount >= 1 &&
        result.structure.pass &&
        result.contrastiveStructure.pass
      );
      result.scorePenalty += result.contrastiveStructure.penalty;
      if (!result.contrastiveStructure.pass) {
        result.reasons.push(...result.contrastiveStructure.failedRuleIds.map(
          (id) => `contrastive:${id}`,
        ));
      }
      result.unknownStrokeCount = isSingleHan;
      if (result.pass) {
        result.warnings.push("unknown-stroke-count");
        result.scorePenalty += UNKNOWN_HAN_STROKE_PENALTY;
      } else {

      return result;
    }

    if (!result.structure.pass) {
      result.pass = false;
      result.reasons.push(...result.structure.failedRuleIds.map((id) => `structure:${id}`));
    }

    result.scorePenalty += result.contrastiveStructure.penalty;
    if (!result.contrastiveStructure.pass) {
      result.pass = false;
      result.reasons.push(...result.contrastiveStructure.failedRuleIds.map(
        (id) => `contrastive:${id}`,
      ));
    }
    if (result.contrastiveStructure.ambiguousRuleIds.length > 0) {
      result.warnings.push(...result.contrastiveStructure.ambiguousRuleIds.map(
        (id) => `contrastive-ambiguous:${id}`,
      ));
    }

    if (hasShinnyouChar(text) && !hasCompletedShinnyouSweep()) {
      result.pass = false;
      result.reasons.push("incomplete-shinnyou");
    }

    if (hasSanzuiChar(text) && !hasCompletedSanzui()) {
      result.pass = false;
      result.reasons.push("incomplete-sanzui");
    }

    if (hasKusakanmuriChar(text) && !hasCompletedKusakanmuriTop()) {
      result.pass = false;
      result.reasons.push("incomplete-kusakanmuri");
    }

    if (!isFreeCandidateProgressPlausible(text, strokeStats)) {
      result.pass = false;
      result.reasons.push("implausible-character-growth");
    }

    if (isFreeMode() && isKanaOnly(text)) {
      result.diacritic = evaluateKanaDiacriticEvidence(text);
      if (!result.diacritic.pass) {
        result.pass = false;
        result.reasons.push("missing-diacritic-marks");
      }
      if (strokeStats.rawCount > expectedRange.max) {
        result.pass = false;
        result.reasons.push("too-many-physical-strokes");
      }
      if (strokeStats.rawCount < expectedRange.softMin) {
        result.pass = false;
        result.reasons.push("too-few-physical-strokes");
      }
      if (strokeStats.virtualCount < expectedRange.softMin) {
        result.pass = false;
        result.reasons.push("too-few-virtual-strokes");
      }

      result.scorePenalty += Math.max(0, expectedRange.min - strokeStats.rawCount) * 1.35;
      result.scorePenalty += Math.max(0, strokeStats.rawCount - expectedRange.min) * 0.06;
      return result;
    }

    const expectedCount = expectedRange.max;
    const tolerance = getStrokeTolerance(expectedCount, text);
    const allowedRawShortfall = getAllowedRawShortfall(expectedCount, text);
    const allowedRawOverage = getAllowedRawOverage(text);

    if (strokeStats.virtualCount + tolerance < expectedCount) {
      result.pass = false;
      result.reasons.push("too-few-virtual-strokes");
    }
    if (strokeStats.rawCount < expectedCount - allowedRawShortfall) {
      result.pass = false;
      result.reasons.push("too-few-physical-strokes");
    }
    if (strokeStats.rawCount > expectedCount + allowedRawOverage) {
      result.pass = false;
      result.reasons.push("too-many-physical-strokes");
    }

    // 画数・基本部品を通過した候補だけ字形比較へ進める。
    // 入力途中の候補を毎回描画比較しないことで、処理量と消費電力も抑える。
    if (result.pass) {
      result.glyphShape = evaluateCandidateGlyphShape(text);
      if (result.glyphShape.available) {
        result.scorePenalty += result.glyphShape.penalty;
        if (result.glyphShape.hardReject) {
          result.pass = false;
          result.reasons.push("glyph-shape-mismatch");
        }
      }
    }

    return result;
  }

  function isStrokeCompatible(text, strokeStats) {
    return evaluateStrokeCompatibility(text, strokeStats).pass;
  }

  function canUseStructuralAlternative(rule, strokeStats) {
    if (typeof rule.test !== "function" || !rule.test(strokeStats)) {
      return false;
    }

    return isStrokeCompatible(rule.target, strokeStats);
  }

  function expandStructuralAlternatives(candidates, strokeStats) {
    const expanded = [];
    const seen = new Set();

    function push(text) {
      if (!seen.has(text)) {
        seen.add(text);
        expanded.push(text);
      }
    }

    candidates.forEach((candidate) => {
      STRUCTURAL_ALTERNATIVE_RULES.forEach((rule) => {
        if (candidate === rule.source && canUseStructuralAlternative(rule, strokeStats)) {
          push(rule.target);
        }
      });

      push(candidate);
    });

    return expanded;
  }

  function getMedianNumber(values) {
    const sorted = values
      .filter((value) => Number.isFinite(value))
      .sort((a, b) => a - b);
    if (sorted.length === 0) {
      return 0;
    }
    const middle = Math.floor(sorted.length / 2);
    return sorted.length % 2 === 0
      ? (sorted[middle - 1] + sorted[middle]) / 2
      : sorted[middle];
  }

  function getFreeInkSpatialProfile() {
    const bounds = getInkBounds();
    const features = getStrokeFeatures();
    if (!bounds || features.length === 0) {
      return null;
    }

    const horizontal = bounds.width >= bounds.height * 0.82;
    const axisStart = horizontal ? bounds.left : bounds.top;
    const axisEnd = horizontal ? bounds.right : bounds.bottom;
    const axisSpan = Math.max(1, axisEnd - axisStart);
    const extents = features.map((feature) => horizontal ? feature.width : feature.height);
    const mergePadding = Math.max(4, axisSpan * 0.012, getMedianNumber(extents) * 0.2);
    const intervals = features
      .map((feature) => ({
        start: (horizontal ? feature.left : feature.top) - mergePadding,
        end: (horizontal ? feature.right : feature.bottom) + mergePadding,
      }))
      .sort((a, b) => a.start - b.start);
    const merged = [];

    intervals.forEach((interval) => {
      const current = merged[merged.length - 1];
      if (!current || interval.start > current.end) {
        merged.push({ ...interval });
      } else {
        current.end = Math.max(current.end, interval.end);
      }
    });

    return {
      horizontal,
      axisStart,
      axisEnd,
      axisSpan,
      crossStart: horizontal ? bounds.top : bounds.left,
      crossEnd: horizontal ? bounds.bottom : bounds.right,
      crossSpan: horizontal ? bounds.height : bounds.width,
      clusterCount: merged.length,
      clusters: merged.map((cluster) => ({
        start: cluster.start,
        end: cluster.end,
        center: (cluster.start + cluster.end) / 2,
        span: Math.max(1, cluster.end - cluster.start),
      })),
      features,
      totalLength: features.reduce((sum, feature) => sum + feature.length, 0),
    };
  }

  function mergeAxisClustersToCount(clusters, targetCount) {
    const output = (Array.isArray(clusters) ? clusters : [])
      .map((cluster) => ({ ...cluster }))
      .sort((a, b) => a.start - b.start);

    while (output.length > targetCount && output.length > 1) {
      let bestIndex = 0;
      let bestGap = Infinity;
      for (let index = 0; index < output.length - 1; index += 1) {
        const gap = Math.max(0, output[index + 1].start - output[index].end);
        if (gap < bestGap) {
          bestGap = gap;
          bestIndex = index;
        }
      }
      const left = output[bestIndex];
      const right = output[bestIndex + 1];
      const merged = {
        start: Math.min(left.start, right.start),
        end: Math.max(left.end, right.end),
      };
      merged.center = (merged.start + merged.end) / 2;
      merged.span = Math.max(1, merged.end - merged.start);
      output.splice(bestIndex, 2, merged);
    }

    return output;
  }

  function getCandidateAxisCells(text, profile = getFreeInkSpatialProfile()) {
    const count = Math.max(1, getCharacterLength(text));
    if (!profile) {
      return [];
    }

    const equalCells = Array.from({ length: count }, (_, index) => ({
      start: profile.axisStart + profile.axisSpan * index / count,
      end: profile.axisStart + profile.axisSpan * (index + 1) / count,
      source: "equal",
    }));
    const rawClusters = Array.isArray(profile.clusters) ? profile.clusters : [];
    if (rawClusters.length < count || rawClusters.length > count + 3) {
      return equalCells;
    }

    const clusters = mergeAxisClustersToCount(rawClusters, count);
    if (clusters.length !== count) {
      return equalCells;
    }

    return clusters.map((cluster, index) => {
      const previous = clusters[index - 1];
      const next = clusters[index + 1];
      const start = previous
        ? (previous.end + cluster.start) / 2
        : profile.axisStart;
      const end = next
        ? (cluster.end + next.start) / 2
        : profile.axisEnd;
      return {
        start: Math.min(start, end),
        end: Math.max(start, end),
        source: "cluster",
      };
    });
  }

  function getKanaDiacriticRequirements(text) {
    return Array.from(text).map((char, index) => {
      const decomposed = Array.from(char.normalize("NFD"));
      const mark = decomposed.find((part) =>
        part === COMBINING_DAKUTEN || part === COMBINING_HANDAKUTEN
      );
      return mark
        ? { index, requiredStrokes: mark === COMBINING_DAKUTEN ? 2 : 1, mark }
        : null;
    }).filter(Boolean);
  }

  function evaluateKanaDiacriticEvidence(text, profile = getFreeInkSpatialProfile()) {
    const requirements = getKanaDiacriticRequirements(text);
    if (requirements.length === 0) {
      return { pass: true, requirements: [], matched: [], orientation: "none" };
    }
    if (!profile) {
      return { pass: false, requirements, matched: [], orientation: "unknown" };
    }

    const cells = getCandidateAxisCells(text, profile);
    const usedStrokeIndexes = new Set();
    const matched = requirements.map((requirement) => {
      const cell = cells[requirement.index] || {
        start: profile.axisStart,
        end: profile.axisEnd,
      };
      const cellSpan = Math.max(1, cell.end - cell.start);
      const localDiagonal = Math.hypot(cellSpan, profile.crossSpan);
      const candidates = profile.features
        .map((feature) => {
          const axisCenter = profile.horizontal ? feature.centerX : feature.centerY;
          const crossCenter = profile.horizontal ? feature.centerY : feature.centerX;
          const axisRatio = (axisCenter - cell.start) / cellSpan;
          const crossRatio = (crossCenter - profile.crossStart) / Math.max(1, profile.crossSpan);
          const axisExtent = profile.horizontal ? feature.width : feature.height;
          const crossExtent = profile.horizontal ? feature.height : feature.width;
          const maxLength = localDiagonal * (requirement.requiredStrokes === 1 ? 0.56 : 0.38);
          const compact =
            feature.length <= maxLength &&
            axisExtent <= cellSpan * 0.48 &&
            crossExtent <= profile.crossSpan * 0.56;
          const inExpectedZone = profile.horizontal
            ? (
              axisRatio >= 0.42 &&
              axisRatio <= 1.22 &&
              crossRatio >= -0.12 &&
              crossRatio <= 0.58
            )
            : (
              axisRatio >= -0.15 &&
              axisRatio <= 0.62 &&
              crossRatio >= 0.42 &&
              crossRatio <= 1.18
            );
          const zoneDistance = profile.horizontal
            ? Math.abs(axisRatio - 0.82) + Math.abs(crossRatio - 0.16)
            : Math.abs(axisRatio - 0.20) + Math.abs(crossRatio - 0.82);
          return {
            feature,
            axisRatio,
            crossRatio,
            zoneDistance,
            pass: compact && inExpectedZone,
          };
        })
        .filter((item) => item.pass && !usedStrokeIndexes.has(item.feature.strokeIndex))
        .sort((a, b) => a.zoneDistance - b.zoneDistance || a.feature.length - b.feature.length);

      const selected = candidates.slice(0, requirement.requiredStrokes);
      let pairGeometryPass = true;
      let pairDistance = null;
      let pairAngle = null;
      if (requirement.requiredStrokes === 2 && selected.length === 2) {
        const first = selected[0].feature;
        const second = selected[1].feature;
        pairDistance = Math.hypot(
          first.centerX - second.centerX,
          first.centerY - second.centerY,
        );
        pairAngle = getVectorAngle(
          { x: first.end.x - first.start.x, y: first.end.y - first.start.y },
          { x: second.end.x - second.start.x, y: second.end.y - second.start.y },
        );
        const lengthRatio = Math.min(first.length, second.length) /
          Math.max(1, Math.max(first.length, second.length));
        pairGeometryPass =
          pairDistance <= localDiagonal * 0.3 &&
          pairAngle <= Math.PI * 0.38 &&
          lengthRatio >= 0.28;
      }
      const pass =
        selected.length >= requirement.requiredStrokes &&
        pairGeometryPass;
      if (pass) {
        selected.forEach((item) => usedStrokeIndexes.add(item.feature.strokeIndex));
      }
      return {
        ...requirement,
        cellSource: cell.source || "fallback",
        foundStrokes: selected.length,
        pairGeometryPass,
        pairDistance: Number.isFinite(pairDistance) ? Math.round(pairDistance * 10) / 10 : null,
        pairAngle: Number.isFinite(pairAngle) ? Math.round(pairAngle * 1000) / 1000 : null,
        pass,
        evidence: selected.map((item) => ({
          strokeIndex: item.feature.strokeIndex,
          axisRatio: Math.round(item.axisRatio * 1000) / 1000,
          crossRatio: Math.round(item.crossRatio * 1000) / 1000,
          length: Math.round(item.feature.length * 10) / 10,
        })),
      };
    });

    return {
      pass: matched.every((item) => item.pass),
      requirements,
      matched,
      orientation: profile.horizontal ? "horizontal" : "vertical",
    };
  }

  function getCandidateSpatialFit(text, profile = getFreeInkSpatialProfile()) {
    const chars = Array.from(text);
    if (!isFreeMode() || chars.length <= 1 || !profile) {
      return {
        penalty: 0,
        hardReject: false,
        weakCells: 0,
        clusterCount: profile?.clusterCount || 0,
        cellModel: "none",
      };
    }

    const cells = getCandidateAxisCells(text, profile);
    const inkByCell = Array(chars.length).fill(0);
    profile.features.forEach((feature) => {
      const center = profile.horizontal ? feature.centerX : feature.centerY;
      let index = cells.findIndex((cell) => center >= cell.start && center <= cell.end);
      if (index < 0) {
        index = center < cells[0].start ? 0 : cells.length - 1;
      }
      inkByCell[index] += feature.length;
    });

    const averageInk = profile.totalLength / chars.length;
    let weakCells = 0;
    let unsupportedSmallKana = 0;
    inkByCell.forEach((ink, index) => {
      const smallKana = SMALL_KANA_PATTERN.test(chars[index]);
      const threshold = averageInk * (smallKana ? 0.07 : 0.13);
      if (ink < threshold) {
        weakCells += 1;
        if (smallKana && ink < averageInk * 0.025) {
          unsupportedSmallKana += 1;
        }
      }
    });

    const clusterShortfall = Math.max(0, chars.length - profile.clusterCount - 1);
    const penalty = weakCells * 1.05 + unsupportedSmallKana * 1.9 + clusterShortfall * 2.35;
    const extremeCollapse =
      chars.length >= 4 &&
      profile.clusterCount <= 1 &&
      weakCells >= Math.ceil(chars.length / 2);

    return {
      penalty,
      hardReject: extremeCollapse || unsupportedSmallKana >= 2,
      weakCells,
      unsupportedSmallKana,
      clusterCount: profile.clusterCount,
      cellModel: cells[0]?.source || "equal",
      inkByCell: inkByCell.map((value) => Math.round(value * 10) / 10),
    };
  }

  function getCandidateStrokeRank(text, strokeStats, originalIndex) {
    const expectedRange = getCandidateStrokeCountRange(text);

    if (!expectedRange) {
      return originalIndex * 0.12;
    }

    const nearestVirtual = Math.min(
      Math.max(strokeStats.virtualCount, expectedRange.min),
      expectedRange.max,
    );
    const nearestRaw = Math.min(
      Math.max(strokeStats.rawCount, expectedRange.min),
      expectedRange.max,
    );
    const virtualDistance = Math.abs(strokeStats.virtualCount - nearestVirtual);
    const rawDistance = Math.abs(strokeStats.rawCount - nearestRaw);
    const overagePenalty = Math.max(0, strokeStats.rawCount - expectedRange.max) * 0.8;

    return (
      virtualDistance * 2.5 +
      rawDistance * 0.65 +
      overagePenalty +
      originalIndex * 0.12
    );
  }

  function normalizeCandidateSourceGroups(sourceGroups) {
    return (Array.isArray(sourceGroups) ? sourceGroups : [])
      .map((group, groupIndex) => ({
        source: String(group?.source || `source-${groupIndex}`),
        variant: String(group?.variant || "raw"),
        penalty: Number.isFinite(group?.penalty) ? group.penalty : 0,
        strokeStats: group?.strokeStats &&
          Number.isFinite(group.strokeStats.rawCount) &&
          Number.isFinite(group.strokeStats.virtualCount)
          ? {
              rawCount: group.strokeStats.rawCount,
              virtualCount: group.strokeStats.virtualCount,
            }
          : null,
        transform: group?.transform || null,
        candidates: normalizeCandidates(group?.candidates || []),
      }))
      .filter((group) => group.candidates.length > 0);
  }

  function buildCandidateEvidence(sourceGroups, strokeStats) {
    const evidence = new Map();

    function add(text, membership) {
      if (!evidence.has(text)) {
        evidence.set(text, []);
      }
      evidence.get(text).push(membership);
    }

    normalizeCandidateSourceGroups(sourceGroups).forEach((group) => {
      const effectiveStrokeStats = group.strokeStats || strokeStats;
      group.candidates.forEach((candidate, rank) => {
        STRUCTURAL_ALTERNATIVE_RULES.forEach((rule) => {
          if (candidate === rule.source && canUseStructuralAlternative(rule, effectiveStrokeStats)) {
            add(rule.target, {
              source: group.source,
              variant: group.variant,
              rank,
              penalty: group.penalty + 0.22,
              alternativeOf: candidate,
              strokeStats: effectiveStrokeStats,
              transform: group.transform,
            });
          }
        });

        add(candidate, {
          source: group.source,
          variant: group.variant,
          rank,
          penalty: group.penalty,
          alternativeOf: "",
          strokeStats: effectiveStrokeStats,
          transform: group.transform,
        });
      });
    });

    return evidence;
  }

  function evaluateCandidateEnsemble(sourceGroups, strokeStats = estimateInputStrokeStats()) {
    const normalizedGroups = normalizeCandidateSourceGroups(sourceGroups);
    const evidence = buildCandidateEvidence(normalizedGroups, strokeStats);
    const spatialProfile = getFreeInkSpatialProfile();
    const evaluations = Array.from(evidence.entries()).map(([text, memberships], index) => {
      const reasons = [];
      if (!isJapaneseCandidate(text)) {
        reasons.push("not-japanese-candidate");
      }
      if (!isAllowedCandidateForCurrentMode(text)) {
        reasons.push("mode-mismatch");
      }

      const membershipCompatibility = reasons.length === 0
        ? memberships.map((membership) => {
            const effectiveStrokeStats = membership.strokeStats || strokeStats;
            const compatibility = evaluateStrokeCompatibility(text, effectiveStrokeStats);
            return {
              membership,
              strokeStats: effectiveStrokeStats,
              compatibility,
              cost: getCandidateStrokeRank(text, effectiveStrokeStats, 0) +
                compatibility.scorePenalty +
                membership.penalty +
                membership.rank * RECOGNITION_SOURCE_RANK_WEIGHT,
            };
          })
        : [];
      const passingCompatibility = membershipCompatibility
        .filter((item) => item.compatibility.pass)
        .sort((a, b) => a.cost - b.cost);
      const selectedMembershipCompatibility = passingCompatibility[0] ||
        membershipCompatibility.sort((a, b) =>
          a.compatibility.reasons.length - b.compatibility.reasons.length ||
          a.cost - b.cost
        )[0] || null;
      const compatibility = selectedMembershipCompatibility?.compatibility || {
        pass: false,
        reasons: [],
        warnings: [],
        scorePenalty: 0,
        expectedRange: null,
        structure: null,
        glyphShape: null,
        unknownStrokeCount: false,
      };

      if (passingCompatibility.length === 0) {
        const compatibilityReasons = new Set();
        membershipCompatibility.forEach((item) =>
          item.compatibility.reasons.forEach((reason) => compatibilityReasons.add(reason))
        );
        reasons.push(...compatibilityReasons);
      }

      const spatial = reasons.length === 0
        ? getCandidateSpatialFit(text, spatialProfile)
        : { penalty: 0, hardReject: false };
      if (spatial.hardReject) {
        reasons.push("spatial-support-insufficient");
      }

      const scoringMemberships = passingCompatibility.length > 0
        ? passingCompatibility.map((item) => item.membership)
        : memberships;
      const engines = new Set(scoringMemberships.map((item) => item.source));
      const variants = new Set(scoringMemberships.map((item) => `${item.source}:${item.variant}`));
      const crossEngineConsensus = engines.has("native") && engines.has("google");
      const bestSourceRank = Math.min(...scoringMemberships.map((item) => item.rank));
      const sourceRankPenalty = Math.min(
        ...scoringMemberships.map((item) =>
          item.rank * RECOGNITION_SOURCE_RANK_WEIGHT + item.penalty
        ),
      );
      const consensusBonus = crossEngineConsensus
        ? RECOGNITION_CROSS_ENGINE_BONUS
        : variants.size >= 2
          ? RECOGNITION_MULTI_VARIANT_BONUS
          : 0;

      if (
        compatibility.unknownStrokeCount &&
        !crossEngineConsensus &&
        bestSourceRank > 2
      ) {
        reasons.push("unknown-stroke-count-low-confidence");
      }

      const pass = reasons.length === 0 && Boolean(selectedMembershipCompatibility);
      const effectiveStrokeStats = selectedMembershipCompatibility?.strokeStats || strokeStats;
      const score = pass
        ? getCandidateStrokeRank(text, effectiveStrokeStats, 0) +
          compatibility.scorePenalty +
          spatial.penalty +
          sourceRankPenalty -
          consensusBonus
        : Number.POSITIVE_INFINITY;
      const repairMemberships = scoringMemberships.filter((item) =>
        String(item.variant || "").startsWith("repair-")
      );
      const nonRepairMemberships = scoringMemberships.filter((item) =>
        !String(item.variant || "").startsWith("repair-")
      );

      return {
        text,
        sourceIndex: index,
        bestSourceRank,
        pass,
        score: Number.isFinite(score) ? Math.round(score * 1000) / 1000 : null,
        reasons,
        warnings: compatibility.warnings || [],
        expectedRange: compatibility.expectedRange,
        structure: compatibility.structure,
        glyphShape: compatibility.glyphShape || null,
        unknownStrokeCount: Boolean(compatibility.unknownStrokeCount),
        spatial,
        memberships,
        effectiveStrokeStats,
        crossEngineConsensus,
        variantCount: variants.size,
        repairSupported: repairMemberships.length > 0,
        repairRequired: repairMemberships.length > 0 && nonRepairMemberships.length === 0,
        selectedVariant: selectedMembershipCompatibility?.membership?.variant || "",
        repairVariants: Array.from(new Set(repairMemberships.map((item) => item.variant))),
      };
    });

    const accepted = evaluations
      .filter((evaluation) => evaluation.pass)
      .sort((a, b) =>
        a.score - b.score ||
        a.bestSourceRank - b.bestSourceRank ||
        a.sourceIndex - b.sourceIndex
      );
    const topScore = accepted[0]?.score;
    const secondScore = accepted[1]?.score;
    const margin = Number.isFinite(topScore) && Number.isFinite(secondScore)
      ? Math.round((secondScore - topScore) * 1000) / 1000
      : null;

    return {
      text: accepted[0]?.text || "",
      evaluations,
      accepted,
      margin,
      sourceGroups: normalizedGroups,
      spatialProfile: spatialProfile
        ? {
            horizontal: spatialProfile.horizontal,
            clusterCount: spatialProfile.clusterCount,
            axisSpan: Math.round(spatialProfile.axisSpan * 10) / 10,
          }
        : null,
    };
  }

  function isCandidateEvaluationDecisive(evaluation) {
    const top = evaluation?.accepted?.[0];
    if (!top) {
      return false;
    }

    if (top.unknownStrokeCount) {
      return (
        top.crossEngineConsensus ||
        (
          top.bestSourceRank === 0 &&
          (evaluation.accepted.length === 1 || evaluation.margin >= DECISIVE_MARGIN)
        )
      );
    }

    const scoreLimit = isFreeMode()
      ? DECISIVE_SCORE_FREE
      : DECISIVE_SCORE_CHARACTER;
    return (
      top.score <= scoreLimit &&
      (evaluation.accepted.length === 1 || evaluation.margin >= DECISIVE_MARGIN)
    );
  }

  function evaluateDisplayCandidates(candidates, strokeStats = estimateInputStrokeStats()) {
    return evaluateCandidateEnsemble(
      [{ source: "legacy", variant: "raw", candidates }],
      strokeStats,
    );
  }

  function selectDisplayCandidate(candidates, strokeStats = estimateInputStrokeStats()) {
    return evaluateDisplayCandidates(candidates, strokeStats).text;
  }

  function isPointerInputActive() {
    return (
      state.pendingPointerId !== null ||
      state.activePointerId !== null ||
      Boolean(state.activeStrokePoints)
    );
  }

  function resetCandidateStability() {
    state.candidateStability.text = "";
    state.candidateStability.signature = "";
    state.candidateStability.firstSeenAt = 0;
    state.candidateStability.confirmations = 0;
    state.nextRecognitionDelay = RECOGNITION_RETRY_DELAY_MS;
  }

  function getInkSignature(strokeStats = estimateInputStrokeStats()) {
    const bounds = getInkBounds();

    if (!bounds) {
      return "empty";
    }

    return [
      strokeStats.rawCount,
      strokeStats.virtualCount,
      Math.round(getTotalInkLength() / 8),
      Math.round(bounds.left / 8),
      Math.round(bounds.top / 8),
      Math.round(bounds.width / 8),
      Math.round(bounds.height / 8),
    ].join(":");
  }

  function requiresCandidateStability(text, strokeStats) {
    const expectedCount = getCandidateStrokeCount(text);

    return (
      isFreeMode() ||
      hasShinnyouChar(text) ||
      hasSanzuiChar(text) ||
      hasKusakanmuriChar(text) ||
      hasUnknownKanjiStrokeCount(text) ||
      (Number.isFinite(expectedCount) &&
        expectedCount >= COMPLEX_STROKE_STABILITY_THRESHOLD) ||
      strokeStats.rawCount >= COMPLEX_STROKE_STABILITY_THRESHOLD
    );
  }

  function getStableCandidateDecision(text, strokeStats) {
    if (!text) {
      resetCandidateStability();
      return { text: "", pending: false };
    }

    if (!requiresCandidateStability(text, strokeStats)) {
      resetCandidateStability();
      return { text, pending: false };
    }

    const signature = getInkSignature(strokeStats);
    const now = performance.now();
    const stability = state.candidateStability;

    if (stability.text !== text || stability.signature !== signature) {
      stability.text = text;
      stability.signature = signature;
      stability.firstSeenAt = now;
      stability.confirmations = 1;
    } else {
      stability.confirmations += 1;
    }

    if (
      !isPointerInputActive() &&
      stability.confirmations >= STABILITY_MIN_CONFIRMATIONS &&
      now - stability.firstSeenAt >= STABILITY_CONFIRM_DELAY_MS * 0.5
    ) {
      return { text, pending: false };
    }

    return {
      text: "",
      pending: true,
      delay: STABILITY_CONFIRM_DELAY_MS,
    };
  }

  function getDragStartDistance(pointerType) {
    return pointerType === "touch"
      ? DRAG_START_DISTANCE_TOUCH
      : DRAG_START_DISTANCE_MOUSE;
  }

  function prepareStroke(event) {
    window.clearTimeout(state.recognitionTimer);
    cancelGoogleRecognition(state);
    resetCandidateStability();
    state.pendingPointerId = event.pointerId;
    state.pendingStartPoint = getCanvasCoordinates(event);
    state.pendingStartTime = performance.now();
    state.pendingPointerType = event.pointerType || "";
    state.lastPointerType = state.pendingPointerType;

    if (typeof canvas.setPointerCapture === "function") {
      canvas.setPointerCapture(event.pointerId);
    }
  }

  function startStroke(event) {
    if (!state.pendingStartPoint) {
      return;
    }

    canvas.dataset.lastPointerType = state.pendingPointerType;
    state.recognitionSerial += 1;
    state.strokeStartTime = state.pendingStartTime;
    state.activePointerId = event.pointerId;
    state.activeStrokePoints = [];
    state.lastPoint = null;
    state.strokes.push(state.activeStrokePoints);
    resetCandidateStability();
    clearActiveRecognition({ resetHistory: false });
    updateActionButtons();

    addPreparedPoint(state.pendingStartPoint);
    addPoint(event);
    state.pendingPointerId = null;
    state.pendingStartPoint = null;
    state.pendingPointerType = "";
    setBusy(true);
  }

  function addPreparedPoint(point) {
    if (!state.activeStrokePoints) {
      return;
    }

    const preparedPoint = {
      ...point,
      t: 0,
    };

    state.activeStrokePoints.push(preparedPoint);
    drawPoint(preparedPoint, state.lastPoint);
    state.lastPoint = preparedPoint;
  }

  function addPoint(event) {
    if (!state.activeStrokePoints) {
      return;
    }

    const point = getCanvasPoint(event);
    state.activeStrokePoints.push(point);
    drawPoint(point, state.lastPoint);
    state.lastPoint = point;
  }

  function continueStroke(event) {
    if (
      event.pointerId === state.pendingPointerId &&
      state.pendingStartPoint &&
      !state.activeStrokePoints
    ) {
      event.preventDefault();
      const currentPoint = getCanvasCoordinates(event);
      const distance = getDistance(state.pendingStartPoint, currentPoint);

      if (distance >= getDragStartDistance(state.pendingPointerType)) {
        startStroke(event);
      }

      return;
    }

    if (event.pointerId !== state.activePointerId || !state.activeStrokePoints) {
      return;
    }

    event.preventDefault();

    const events =
      typeof event.getCoalescedEvents === "function"
        ? event.getCoalescedEvents()
        : [event];

    events.forEach(addPoint);
  }

  function finishStroke(event) {
    if (
      event.pointerId === state.pendingPointerId &&
      state.pendingStartPoint &&
      !state.activeStrokePoints
    ) {
      event.preventDefault();

      if (
        typeof canvas.hasPointerCapture === "function" &&
        canvas.hasPointerCapture(event.pointerId)
      ) {
        canvas.releasePointerCapture(event.pointerId);
      }

      state.pendingPointerId = null;
      state.pendingStartPoint = null;
      state.pendingPointerType = "";
      return;
    }

    if (event.pointerId !== state.activePointerId || !state.activeStrokePoints) {
      return;
    }

    event.preventDefault();

    if (
      typeof canvas.hasPointerCapture === "function" &&
      canvas.hasPointerCapture(event.pointerId)
    ) {
      canvas.releasePointerCapture(event.pointerId);
    }

    state.activePointerId = null;
    state.activeStrokePoints = null;
    state.lastPoint = null;
    scheduleRecognition(RECOGNITION_FINISH_DELAY_MS);
  }

  function scheduleRecognition(delay) {
    if (!hasMeaningfulInk()) {
      if (hasInk()) {
        setResult(messages.noCandidate, "message");
      }

      setBusy(false);
      return;
    }

    setBusy(true);
    window.clearTimeout(state.recognitionTimer);
    state.recognitionTimer = window.setTimeout(runRecognition, delay);
  }

  async function runRecognition() {
    if (!hasMeaningfulInk()) {
      if (hasInk()) {
        setResult(messages.noCandidate, "message");
      }

      setBusy(false);
      return;
    }

    if (state.isRecognizing) {
      state.needsRecognition = true;
      return;
    }

    state.isRecognizing = true;
    const serial = ++state.recognitionSerial;

    try {
      state.nextRecognitionDelay = RECOGNITION_RETRY_DELAY_MS;
      const strokeStats = estimateInputStrokeStats();
      const fingerprint = `${isFreeMode() ? "free" : "character"}:${getStrokesFingerprint(state.strokes)}`;
      let text = "";
      let nativeCandidates = [];
      let googleRawCandidates = [];
      let googleNormalizedCandidates = [];
      let repairCandidateGroups = [];
      let nativeEvaluation = null;
      let ensembleEvaluation = null;
      let recognitionPath = "cache";
      const sourceGroups = [];

      if (state.recognitionCache.fingerprint === fingerprint) {
        text = state.recognitionCache.text;
      } else {
        recognitionPath = "native";
        nativeCandidates = await recognizeWithNative();
        if (nativeCandidates.length > 0) {
          sourceGroups.push({
            source: "native",
            variant: "raw",
            candidates: nativeCandidates,
          });
        }
        nativeEvaluation = evaluateCandidateEnsemble(sourceGroups, strokeStats);
        ensembleEvaluation = nativeEvaluation;

        const shouldConsultGoogle =
          !isCandidateEvaluationDecisive(nativeEvaluation);

        if (shouldConsultGoogle) {
          recognitionPath = nativeCandidates.length > 0
            ? "native+google-raw"
            : "google-raw";
          googleRawCandidates = await recognizeWithGoogle(state.strokes);
          if (googleRawCandidates.length > 0) {
