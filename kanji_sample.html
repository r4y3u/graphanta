    resultsCommitted: false,
    resultTimers: [],
    explanationIndex: -1,
    trace: {
      itemIndex: -1,
      answer: "",
      strokes: [],
      activePointerId: null,
      activeStroke: null,
      lastPoint: null,
      strokeStartTime: 0,
      recognitionTimer: 0,
      recognitionSerial: 0,
      isRecognizing: false,
      needsRecognition: false,
      nativeDrawing: null,
      googleFailed: false,
      recognizedText: "",
      recognitionCache: { fingerprint: "", text: "" },
      googleAbortController: null,
      pointerType: "",
      canvasCssSize: { width: 0, height: 0 },
    },
  };

  const messages = {
    loading: "準備中...",
    empty: "手書きしてください",
    noCandidate: "候補なし",
    networkUnavailable: "描画はできますが、認識に接続できません",
  };

  state.strokes = state.slots[0].strokes;

  function katakanaToHiragana(text) {
    return Array.from(String(text || "").normalize("NFKC"))
      .map((char) => {
        const code = char.codePointAt(0);
        return code >= 0x30a1 && code <= 0x30f6
          ? String.fromCodePoint(code - 0x60)
          : char;
      })
      .join("");
  }

  function isHiraganaOnlyText(text) {
    return /^[\p{Script=Hiragana}ゝゞー]+$/u.test(
      String(text || "").normalize("NFKC"),
    );
  }

  function isFreeMode() {
    if (state.recognitionModeOverride) {
      return state.recognitionModeOverride === "free";
    }
    return state.session[state.currentQuestionIndex]?.inputMode === "free";
  }

  function getCurrentResponseKind() {
    if (state.recognitionResponseKindOverride) {
      return state.recognitionResponseKindOverride;
    }
    const item = state.session[state.currentQuestionIndex];
    if (item?.question?.responseKind) {
      return item.question.responseKind;
    }
    return isHiraganaOnlyText(item?.question?.answer || "") ? "reading" : "writing";
  }

  function isReadingResponse() {
    return !isFreeMode() && getCurrentResponseKind() === "reading";
  }

  function getVisibleSlotCount() {
    return Math.max(1, state.slots.length);
  }

  function getActiveInputRecord() {
    return state.slots[state.activeSlotIndex] || state.slots[0];
  }

  function forEachInputRecord(callback) {
    if (state.session.length > 0) {
      state.session.forEach((item) => item.slots.forEach(callback));
      return;
    }
    state.slots.forEach(callback);
  }

  function refreshActiveStrokesReference() {
    state.strokes = getActiveInputRecord().strokes;
  }

  function getLiveResultText() {
    const chars = state.slots.map((record) => record.text || "□").join("");
    return chars || messages.empty;
  }

  function renderResultArea() {
    resultBox.replaceChildren();
    resultBox.dataset.mode = isFreeMode() ? "free" : "slots";
    resultBox.dataset.state = "slots";
    const count = getVisibleSlotCount();
    const grid = document.createElement("span");
    grid.className = "slot-grid";
    grid.style.setProperty("--slot-count", String(count));

    for (let index = 0; index < count; index += 1) {
      const record = state.slots[index];
      const slot = document.createElement("span");
      slot.className = "character-slot";
      slot.dataset.index = String(index);
      slot.setAttribute("role", "button");
      slot.setAttribute("tabindex", index === state.activeSlotIndex ? "0" : "-1");
      slot.setAttribute("aria-label", `${index + 1}文字目${record.text ? `、${record.text}` : "、未入力"}`);

      if (isFreeMode()) {
        slot.classList.add("is-free-slot");
      }

      if (index === state.activeSlotIndex) {
        slot.classList.add("is-active");
        slot.setAttribute("aria-current", "true");
      }

      if (record.text) {
        slot.textContent = record.text;
      } else if (index === state.activeSlotIndex && record.message && record.message !== messages.empty) {
        const message = document.createElement("span");
        message.className = "slot-message";
        message.textContent = record.message;
        slot.append(message);
      }

      grid.append(slot);
    }

    resultBox.append(grid);
    resultBox.setAttribute("aria-label", `10文字の認識欄。現在は${state.activeSlotIndex + 1}文字目。`);
    updateBusyIndicator();
  }

  function scrollActiveSlotIntoView({ behavior = "smooth" } = {}) {
    const activeSlot = resultBox.querySelector(`.character-slot[data-index="${state.activeSlotIndex}"]`);
    if (!activeSlot) {
      return;
    }
    activeSlot.scrollIntoView({
      behavior,
      block: "nearest",
      inline: "nearest",
    });
  }

  function setResult(text, stateName = "result") {
    const record = getActiveInputRecord();

    if (stateName === "result") {
      record.text = isFreeMode()
        ? String(text || "").normalize("NFKC")
        : Array.from(String(text || ""))[0] || "";
      record.message = "";
      record.state = "result";
      record.acceptedText = record.text;
      record.acceptedRawCount = state.strokes.filter((stroke) => stroke.length > 1).length;
    } else {
      record.message = text;
      record.state = "message";
      if (text !== messages.empty && text !== messages.loading) {
        record.text = "";
      }
    }

    renderResultArea();
    updateReviewMenu();
  }

  function clearActiveRecognition({ resetHistory = true } = {}) {
    const record = getActiveInputRecord();
    record.text = "";
    record.message = "";
    record.state = "message";
    if (resetHistory) {
      record.acceptedText = "";
      record.acceptedRawCount = 0;
    }
    renderResultArea();
  }

  function updateBusyIndicator() {
    const isBusy = Boolean(state.isBusyIndicatorVisible);
    resultBox.querySelectorAll(".character-slot").forEach((slot) => {
      const index = Number(slot.dataset.index);
      slot.dataset.busy = isBusy && index === state.activeSlotIndex ? "true" : "false";
    });
  }

  function setBusy(isBusy) {
    state.isBusyIndicatorVisible = Boolean(isBusy);
    updateBusyIndicator();
  }
  function isVerticalLayout() {
    return state.settings.layout !== "horizontal";
  }

  function isPortableLayout() {
    return state.settings.layout === "vertical-portable";
  }

  function isPortableRotationActive() {
    return app.dataset.portableRotated === "true";
  }

  function getPortableRotation() {
    return isPortableRotationActive() ? "clockwise" : "none";
  }

  let layoutFitFrame = 0;

  function fitScreenLayout() {
    layoutFitFrame = 0;
    const shellRect = screenShell.getBoundingClientRect();
    const shouldRotatePortable =
      isPortableLayout() && shellRect.height > shellRect.width && shellRect.width > 0;

    app.dataset.portableRotated = shouldRotatePortable ? "true" : "false";

    [learningScreen, resultScreen].forEach((screen) => {
      if (shouldRotatePortable) {
        screen.style.width = `${shellRect.height}px`;
        screen.style.height = `${shellRect.width}px`;
      } else {
        screen.style.removeProperty("width");
        screen.style.removeProperty("height");
      }
    });

    padStage.style.removeProperty("width");
    padStage.style.removeProperty("height");
    padStage.style.removeProperty("place-self");

    if (state.settings.layout === "horizontal" && !learningScreen.hidden) {
      padStage.style.width = "100%";
      padStage.style.height = "100%";
      padStage.style.placeSelf = "stretch";
      const available = padStage.getBoundingClientRect();
      const side = Math.max(1, Math.min(available.width, available.height));
      padStage.style.width = `${side}px`;
      padStage.style.height = `${side}px`;
      padStage.style.placeSelf = "center";
    }

    syncExplanationLayout();
    fitQuestionText();
    resizeCanvas();
    if (!resultScreen.hidden) {
      scheduleResultFit();
    }
  }

  function scheduleLayoutFit() {
    if (layoutFitFrame) {
      window.cancelAnimationFrame(layoutFitFrame);
    }
    layoutFitFrame = window.requestAnimationFrame(fitScreenLayout);
  }

  function syncExplanationLayout() {
    explanationOverlay.dataset.layout = state.settings.layout;
    explanationOverlay.dataset.handedness = state.settings.handedness;
    explanationOverlay.dataset.portableRotated = isPortableRotationActive() ? "true" : "false";
  }

  let resultFitFrame = 0;

  function fitResultRows() {
    resultFitFrame = 0;
    if (resultScreen.hidden) {
      return;
    }

    const rows = Array.from(resultList.querySelectorAll(".result-row"));
    const vertical = isVerticalLayout();

    rows.forEach((row) => {
      row.style.removeProperty("min-height");
      row.style.removeProperty("--result-row-basis");
      const sentence = row.querySelector(".result-sentence");
      sentence?.style.removeProperty("font-size");
    });

    if (!vertical) {
      rows.forEach((row) => {
        const sentence = row.querySelector(".result-sentence");
        if (!sentence) {
          return;
        }
        const style = getComputedStyle(row);
        const padding = (Number.parseFloat(style.paddingTop) || 0) + (Number.parseFloat(style.paddingBottom) || 0);
        const needed = Math.ceil(sentence.scrollHeight + padding + 4);
        row.style.minHeight = `${Math.max(50, needed)}px`;
      });
      return;
    }

    rows.forEach((row) => {
      const sentence = row.querySelector(".result-sentence");
      if (!sentence) {
        return;
      }

      let basis = Math.max(92, Math.ceil(row.getBoundingClientRect().width || 92));
      let attempts = 0;
      while (
        attempts < 9 &&
        (sentence.scrollWidth > sentence.clientWidth + 1 || sentence.scrollHeight > sentence.clientHeight + 1) &&
        basis < 250
      ) {
        basis += 18;
        row.style.setProperty("--result-row-basis", `${basis}px`);
        void row.offsetWidth;
        attempts += 1;
      }

      let fontSize = Number.parseFloat(getComputedStyle(sentence).fontSize) || 16;
      let fontAttempts = 0;
      while (
        fontAttempts < 6 &&
        (sentence.scrollWidth > sentence.clientWidth + 1 || sentence.scrollHeight > sentence.clientHeight + 1) &&
        fontSize > 11
      ) {
        fontSize -= 1;
        sentence.style.fontSize = `${fontSize}px`;
        fontAttempts += 1;
      }
    });
  }

  function scheduleResultFit() {
    if (resultFitFrame) {
      window.cancelAnimationFrame(resultFitFrame);
    }
    resultFitFrame = window.requestAnimationFrame(fitResultRows);
  }

  function getLogicalCanvasSize() {
    return {
      width: Math.max(1, canvas.clientWidth),
      height: Math.max(1, canvas.clientHeight),
    };
  }

  function resizeCanvas() {
    const logicalSize = getLogicalCanvasSize();
    const ratio = window.devicePixelRatio || 1;
    const previousSize = state.canvasCssSize;
    const sizeChanged =
      Math.abs(previousSize.width - logicalSize.width) > 0.5 ||
      Math.abs(previousSize.height - logicalSize.height) > 0.5;

    if (sizeChanged && previousSize.width > 0 && previousSize.height > 0) {
      scaleStoredInk(previousSize, logicalSize);
      resetNativeDrawing();
      resetCandidateStability();
    }

    state.canvasCssSize = logicalSize;
    canvas.width = Math.max(1, Math.round(logicalSize.width * ratio));
    canvas.height = Math.max(1, Math.round(logicalSize.height * ratio));

    context.setTransform(ratio, 0, 0, ratio, 0, 0);
    drawAllStrokes();
  }

  function scaleStoredInk(fromSize, toSize) {
    const scaleX = toSize.width / fromSize.width;
    const scaleY = toSize.height / fromSize.height;

    if (Math.abs(scaleX - 1) < 0.005 && Math.abs(scaleY - 1) < 0.005) {
      return;
    }

    forEachInputRecord((record) => {
      record.strokes.forEach((stroke) => {
        stroke.forEach((point) => {
          point.x *= scaleX;
          point.y *= scaleY;
        });
      });
    });

    if (state.pendingStartPoint) {
      state.pendingStartPoint.x *= scaleX;
      state.pendingStartPoint.y *= scaleY;
    }
  }

  function getLineWidth() {
    const shorterSide = Math.min(canvas.clientWidth || 0, canvas.clientHeight || 0);

    return Math.max(
      MIN_LINE_WIDTH,
      Math.min(MAX_LINE_WIDTH, shorterSide * LINE_WIDTH_RATIO),
    );
  }

  function clearCanvas() {
    context.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
  }

  function drawAllStrokes() {
    clearCanvas();
    state.strokes.forEach((stroke) => {
      stroke.forEach((point, index) => {
        drawPoint(point, index === 0 ? null : stroke[index - 1]);
      });
    });
  }

  function drawPoint(point, previousPoint) {
    context.lineCap = "round";
    context.lineJoin = "round";
    context.strokeStyle = INK_COLOR;
    context.fillStyle = INK_COLOR;
    const lineWidth = getLineWidth();

    context.lineWidth = lineWidth;

    if (!previousPoint) {
      context.beginPath();
      context.arc(point.x, point.y, lineWidth / 2, 0, Math.PI * 2);
      context.fill();
      return;
    }

    context.beginPath();
    context.moveTo(previousPoint.x, previousPoint.y);
    context.lineTo(point.x, point.y);
    context.stroke();
  }

  function getCanvasPoint(event) {
    const point = getCanvasCoordinates(event);

    return {
      ...point,
      t: Math.round(performance.now() - state.strokeStartTime),
    };
  }

  function clampUnit(value) {
    return Math.min(1, Math.max(0, value));
  }

  function mapViewportPointToCanvas(targetCanvas, event, rotatedClockwise = false) {
    const rect = targetCanvas.getBoundingClientRect();
    const localWidth = Math.max(1, targetCanvas.clientWidth);
    const localHeight = Math.max(1, targetCanvas.clientHeight);
    const rectWidth = Math.max(1, rect.width);
    const rectHeight = Math.max(1, rect.height);

    // clientX/clientY and DOMRect are both viewport-relative. Normalizing them
    // first avoids browser-dependent offsetX/offsetY behavior on transformed
    // ancestors, which is especially inconsistent in some iOS browsers.
    const normalizedX = clampUnit((Number(event.clientX) - rect.left) / rectWidth);
    const normalizedY = clampUnit((Number(event.clientY) - rect.top) / rectHeight);

    if (rotatedClockwise) {
      return {
        x: normalizedY * localWidth,
        y: (1 - normalizedX) * localHeight,
      };
    }

    return {
      x: normalizedX * localWidth,
      y: normalizedY * localHeight,
    };
  }

  function getCanvasCoordinates(event) {
    return mapViewportPointToCanvas(
      canvas,
      event,
      getPortableRotation() === "clockwise",
    );
  }

  function getStrokesFingerprint(strokes) {
    return strokes
      .filter((stroke) => stroke.length > 0)
      .map((stroke) => {
        const first = stroke[0] || { x: 0, y: 0 };
        const last = stroke[stroke.length - 1] || first;
        return [
          stroke.length,
          Math.round(first.x),
          Math.round(first.y),
          Math.round(last.x),
          Math.round(last.y),
        ].join(":");
      })
      .join("|");
  }

  function hasInk() {
    return state.strokes.some((stroke) => stroke.length > 1);
  }

  function getTotalInkLength() {
    return state.strokes.reduce((total, stroke) => total + getStrokeLength(stroke), 0);
  }

  function hasMeaningfulInk() {
    const bounds = getInkBounds();

    if (!bounds) {
      return false;
    }

    return (
      hasInk() &&
      getTotalInkLength() >= MIN_RECOGNITION_INK_LENGTH &&
      Math.max(bounds.width, bounds.height) >= MIN_RECOGNITION_INK_LENGTH * 0.55
    );
  }

  function getCanvasGuide() {
    const logicalSize = getLogicalCanvasSize();
    return {
      width: Math.max(1, Math.round(logicalSize.width)),
      height: Math.max(1, Math.round(logicalSize.height)),
    };
  }

  function compressStrokeForRecognition(stroke) {
    if (!Array.isArray(stroke) || stroke.length <= 2) {
      return Array.isArray(stroke) ? stroke : [];
    }

    const compressed = [stroke[0]];
    let last = stroke[0];
    for (let index = 1; index < stroke.length - 1; index += 1) {
      const point = stroke[index];
      if (getDistance(last, point) >= RECOGNITION_POINT_DISTANCE) {
        compressed.push(point);
        last = point;
      }
    }
    compressed.push(stroke[stroke.length - 1]);

    if (compressed.length <= RECOGNITION_MAX_POINTS_PER_STROKE) {
      return compressed;
    }

    const sampled = [];
    const lastIndex = compressed.length - 1;
    for (let index = 0; index < RECOGNITION_MAX_POINTS_PER_STROKE; index += 1) {
      const sourceIndex = Math.round((lastIndex * index) / (RECOGNITION_MAX_POINTS_PER_STROKE - 1));
      sampled.push(compressed[sourceIndex]);
    }
    return sampled;
  }

  let preferredGoogleTransport = null;

  function getGoogleTransports() {
    const transports = [];
    const contentTypes = ["text/plain;charset=UTF-8", "application/json"];
    GOOGLE_HANDWRITING_URLS.forEach((url) => {
      contentTypes.forEach((contentType) => transports.push({ url, contentType }));
    });
    if (!preferredGoogleTransport) {
      return transports;
    }
    return [
      preferredGoogleTransport,
      ...transports.filter((item) =>
        item.url !== preferredGoogleTransport.url || item.contentType !== preferredGoogleTransport.contentType
      ),
    ];
  }

  function cancelGoogleRecognition(scope = state) {
    scope.googleAbortController?.abort?.();
    scope.googleAbortController = null;
  }

  async function queryNativeSupport(constraint) {
    const query =
      navigator.queryHandwritingRecognizer ||
      navigator.queryHandwritingRecognizerSupport;

    if (typeof query !== "function") {
      return true;
    }

    try {
      return Boolean(await query.call(navigator, constraint));
    } catch {
      return true;
    }
  }

  async function createNativeRecognizer() {
    if (
      !window.isSecureContext ||
      typeof navigator.createHandwritingRecognizer !== "function" ||
      typeof window.HandwritingStroke !== "function"
    ) {
      return null;
    }

    for (const constraint of LANGUAGE_CANDIDATES) {
      try {
        if (await queryNativeSupport(constraint)) {
          return await navigator.createHandwritingRecognizer(constraint);
        }
      } catch {
        // Try the next language tag, then fall back to Google Input Tools.
      }
    }

    return null;
  }

  function getInputType() {
    const pointerType = canvas.dataset.lastPointerType;
    return SUPPORTED_POINTER_TYPES.has(pointerType) ? pointerType : undefined;
  }

  function ensureNativeDrawing() {
    if (!state.nativeRecognizer || state.nativeFailed) {
      return null;
    }

    if (!state.nativeDrawing) {
      const hints = {
        recognitionType: isFreeMode() ? "text" : "per-character",
        inputType: getInputType(),
        alternatives: 8,
      };

      Object.keys(hints).forEach((key) => {
        if (hints[key] === undefined) {
          delete hints[key];
        }
      });

      try {
        state.nativeDrawing = state.nativeRecognizer.startDrawing(hints);
      } catch {
        state.nativeDrawing = state.nativeRecognizer.startDrawing({
          recognitionType: "text",
          alternatives: 8,
        });
      }
    }

    state.nativeDrawing.clear();

    for (const stroke of state.strokes) {
      const recognitionStroke = compressStrokeForRecognition(stroke);
      if (recognitionStroke.length === 0) {
        continue;
      }

      const nativeStroke = new HandwritingStroke();
      recognitionStroke.forEach((point) => {
        nativeStroke.addPoint({
          x: point.x,
          y: point.y,
          t: point.t,
        });
      });
      state.nativeDrawing.addStroke(nativeStroke);
    }

    return state.nativeDrawing;
  }

  async function recognizeWithNative() {
    const drawing = ensureNativeDrawing();

    if (!drawing) {
      return [];
    }

    try {
      const predictions = await drawing.getPrediction();
      return normalizeCandidates(
        predictions?.map((prediction) => prediction?.text) || [],
      );
    } catch {
      state.nativeFailed = true;
      state.nativeDrawing = null;
      return [];
    }
  }

  function getStrokesBounds(strokes) {
    const points = (Array.isArray(strokes) ? strokes : []).flat().filter(Boolean);
    if (points.length === 0) {
      return null;
    }

    const bounds = points.reduce(
      (result, point) => ({
        left: Math.min(result.left, point.x),
        right: Math.max(result.right, point.x),
        top: Math.min(result.top, point.y),
        bottom: Math.max(result.bottom, point.y),
      }),
      { left: Infinity, right: -Infinity, top: Infinity, bottom: -Infinity },
    );

    return {
      ...bounds,
      width: Math.max(1, bounds.right - bounds.left),
      height: Math.max(1, bounds.bottom - bounds.top),
    };
  }

  function normalizeStrokesToGuide(
    strokes,
    guide,
    paddingRatio = GOOGLE_NORMALIZATION_PADDING_RATIO,
  ) {
    const bounds = getStrokesBounds(strokes);
    if (!bounds) {
      return [];
    }

    const width = Math.max(1, Number(guide?.width) || 1);
    const height = Math.max(1, Number(guide?.height) || 1);
    const paddingX = width * paddingRatio;
    const paddingY = height * paddingRatio;
    const availableWidth = Math.max(1, width - paddingX * 2);
    const availableHeight = Math.max(1, height - paddingY * 2);
    const scale = Math.min(availableWidth / bounds.width, availableHeight / bounds.height);
    const scaledWidth = bounds.width * scale;
    const scaledHeight = bounds.height * scale;
    const offsetX = (width - scaledWidth) / 2 - bounds.left * scale;
    const offsetY = (height - scaledHeight) / 2 - bounds.top * scale;

    return strokes.map((stroke) => stroke.map((point) => ({
      x: point.x * scale + offsetX,
      y: point.y * scale + offsetY,
      t: point.t || 0,
    })));
  }

  function isNormalizedVariantUseful(strokes, guide) {
    const bounds = getStrokesBounds(strokes);
    if (!bounds) {
      return false;
    }

    const width = Math.max(1, Number(guide?.width) || 1);
    const height = Math.max(1, Number(guide?.height) || 1);
    const coverage = Math.max(bounds.width / width, bounds.height / height);
    const centerX = bounds.left + bounds.width / 2;
    const centerY = bounds.top + bounds.height / 2;
    const centerOffset = Math.hypot(
      (centerX - width / 2) / width,
      (centerY - height / 2) / height,
    );

    return coverage < 0.58 || coverage > 0.94 || centerOffset > 0.13;
  }

  function buildGoogleInk(strokes = state.strokes) {
    return strokes
      .map(compressStrokeForRecognition)
      .filter((stroke) => stroke.length > 0)
      .map((stroke) => [
        stroke.map((point) => Math.round(point.x)),
        stroke.map((point) => Math.round(point.y)),
        stroke.map((point) => Math.round(point.t || 0)),
      ]);
  }

  function cloneRecognitionStrokes(strokes) {
    return (Array.isArray(strokes) ? strokes : []).map((stroke) =>
      (Array.isArray(stroke) ? stroke : []).map((point) => ({
        x: Number(point?.x) || 0,
        y: Number(point?.y) || 0,
        t: Number(point?.t) || 0,
      })),
    );
  }

  function getStrokePointSpan(stroke) {
    const bounds = getStrokesBounds([stroke]);
    return bounds ? Math.max(bounds.width, bounds.height) : 0;
  }

  function getStrokeDirectionNearEndpoint(stroke, fromStart, travelDistance) {
    if (!Array.isArray(stroke) || stroke.length < 2) {
      return null;
    }

    if (fromStart) {
      const origin = stroke[0];
      for (let index = 1; index < stroke.length; index += 1) {
        const point = stroke[index];
        if (getDistance(origin, point) >= travelDistance || index === stroke.length - 1) {
          return { x: point.x - origin.x, y: point.y - origin.y };
        }
      }
      return null;
    }

    const origin = stroke[stroke.length - 1];
    for (let index = stroke.length - 2; index >= 0; index -= 1) {
      const point = stroke[index];
      if (getDistance(origin, point) >= travelDistance || index === 0) {
        return { x: origin.x - point.x, y: origin.y - point.y };
      }
    }
    return null;
  }

  function getVectorAngle(vectorA, vectorB) {
    if (!vectorA || !vectorB) {
      return Math.PI;
    }
    const lengthA = Math.hypot(vectorA.x, vectorA.y);
    const lengthB = Math.hypot(vectorB.x, vectorB.y);
    if (lengthA < 0.001 || lengthB < 0.001) {
      return Math.PI;
    }
    const ratio = Math.max(-1, Math.min(1,
      (vectorA.x * vectorB.x + vectorA.y * vectorB.y) / (lengthA * lengthB)
    ));
    return Math.acos(ratio);
  }

  function getStrokePrefixLengths(stroke) {
    const prefix = [0];
    for (let index = 1; index < stroke.length; index += 1) {
      prefix.push(prefix[index - 1] + getDistance(stroke[index - 1], stroke[index]));
    }
    return prefix;
  }

  function findCredibleStrokeSplitIndexes(stroke, guide) {
    const points = compressStrokeForRecognition(stroke);
    if (points.length < 5) {
      return [];
    }

    const diagonal = Math.hypot(Number(guide?.width) || 1, Number(guide?.height) || 1);
    const directionWindow = Math.max(9, diagonal * 0.018);
    const minLegLength = Math.max(18, diagonal * 0.034);
    const prefix = getStrokePrefixLengths(points);
    const totalLength = prefix[prefix.length - 1];
    const candidates = [];

    for (let index = 2; index < points.length - 2; index += 1) {
      const current = points[index];
      let beforeIndex = index - 1;
      while (
        beforeIndex > 0 &&
        getDistance(points[beforeIndex], current) < directionWindow
      ) {
        beforeIndex -= 1;
      }
      let afterIndex = index + 1;
      while (
        afterIndex < points.length - 1 &&
        getDistance(points[afterIndex], current) < directionWindow
      ) {
        afterIndex += 1;
      }

      const before = points[beforeIndex];
      const after = points[afterIndex];
      const incoming = { x: current.x - before.x, y: current.y - before.y };
      const outgoing = { x: after.x - current.x, y: after.y - current.y };
      const turn = getVectorAngle(incoming, outgoing);
      const lengthBefore = prefix[index];
      const lengthAfter = totalLength - prefix[index];

      if (
        turn >= Math.PI * 0.34 &&
        turn <= Math.PI * 0.82 &&
        lengthBefore >= minLegLength &&
        lengthAfter >= minLegLength
      ) {
        candidates.push({ index, turn, lengthBefore, lengthAfter });
      }
    }

    const selected = [];
    candidates
      .sort((a, b) => b.turn - a.turn)
      .forEach((candidate) => {
        if (selected.length >= 2) {
          return;
        }
        const separated = selected.every((item) =>
          Math.abs(prefix[item.index] - prefix[candidate.index]) >= minLegLength
        );
        if (separated) {
          selected.push(candidate);
        }
      });

    return selected.map((item) => item.index).sort((a, b) => a - b);
  }

  function splitStrokesAtCredibleCorners(strokes, guide) {
    const output = [];
    let splitCount = 0;

    (Array.isArray(strokes) ? strokes : []).forEach((stroke) => {
      const points = compressStrokeForRecognition(stroke);
      const splitIndexes = findCredibleStrokeSplitIndexes(points, guide);
      if (splitIndexes.length === 0) {
        output.push(cloneRecognitionStrokes([stroke])[0]);
        return;
      }

      let startIndex = 0;
      splitIndexes.forEach((splitIndex) => {
        const section = points.slice(startIndex, splitIndex + 1);
        if (section.length >= 2) {
          output.push(cloneRecognitionStrokes([section])[0]);
        }
        startIndex = splitIndex;
        splitCount += 1;
      });
      const finalSection = points.slice(startIndex);
      if (finalSection.length >= 2) {
        output.push(cloneRecognitionStrokes([finalSection])[0]);
      }
    });

    return splitCount > 0 ? { strokes: output, splitCount } : null;
  }

  function mergeCrediblyContinuousStrokes(strokes, guide) {
    const source = cloneRecognitionStrokes(strokes);
    if (source.length < 2) {
      return null;
    }

    const diagonal = Math.hypot(Number(guide?.width) || 1, Number(guide?.height) || 1);
    const maxGap = Math.max(10, diagonal * 0.028);
    const directionTravel = Math.max(8, diagonal * 0.016);
    const maxDirectionChange = Math.PI * 0.22;
    const output = [];
    let mergeCount = 0;

    for (let index = 0; index < source.length; index += 1) {
      const current = source[index];
      const next = source[index + 1];
      if (!next || current.length < 2 || next.length < 2 || mergeCount >= 2) {
        output.push(current);
        continue;
      }

      const currentEnd = current[current.length - 1];
      const nextStart = next[0];
      const gap = getDistance(currentEnd, nextStart);
      const tailDirection = getStrokeDirectionNearEndpoint(current, false, directionTravel);
      const headDirection = getStrokeDirectionNearEndpoint(next, true, directionTravel);
      const directionChange = getVectorAngle(tailDirection, headDirection);
      const currentLength = getStrokeLength(current);
      const nextLength = getStrokeLength(next);

      if (
        gap <= maxGap &&
        directionChange <= maxDirectionChange &&
        currentLength >= directionTravel &&
        nextLength >= directionTravel
      ) {
        const bridgeTime = Math.max(
          Number(currentEnd.t) || 0,
          (Number(nextStart.t) || 0) - 1,
        );
        const merged = [
          ...current,
          { x: nextStart.x, y: nextStart.y, t: bridgeTime },
          ...next.slice(1),
        ];
        output.push(merged);
        mergeCount += 1;
        index += 1;
      } else {
        output.push(current);
      }
    }

    return mergeCount > 0 ? { strokes: output, mergeCount } : null;
  }

  function filterAccidentalTapStrokes(strokes, guide, freeMode) {
    if (freeMode) {
      return null;
    }

    const source = cloneRecognitionStrokes(strokes);
    if (source.length < 2) {
      return null;
    }

    const diagonal = Math.hypot(Number(guide?.width) || 1, Number(guide?.height) || 1);
    const maxTapLength = Math.max(2.6, diagonal * 0.0045);
    const removable = source
      .map((stroke, index) => ({
        index,
        length: getStrokeLength(stroke),
        span: getStrokePointSpan(stroke),
      }))
      .filter((item) => item.length <= maxTapLength && item.span <= maxTapLength)
      .sort((a, b) => a.length - b.length);

    if (removable.length !== 1) {
      return null;
    }

    const removedIndex = removable[0].index;
    return {
      strokes: source.filter((_, index) => index !== removedIndex),
      removedCount: 1,
    };
  }

  function getStrokesFingerprintForVariant(strokes) {
    return (Array.isArray(strokes) ? strokes : [])
      .map((stroke) => {
        const first = stroke?.[0] || { x: 0, y: 0 };
        const last = stroke?.[stroke.length - 1] || first;
        return [
          stroke?.length || 0,
          Math.round(first.x),
          Math.round(first.y),
          Math.round(last.x),
          Math.round(last.y),
        ].join(":");
      })
      .join("|");
  }

  function createRecognitionRepairVariants(strokes, guide, { freeMode = isFreeMode() } = {}) {
    const variants = [];
    const seen = new Set([getStrokesFingerprintForVariant(strokes)]);

    function add(variant, result, penalty, transform) {
      if (!result?.strokes || result.strokes.length === 0) {
        return;
      }
      const fingerprint = getStrokesFingerprintForVariant(result.strokes);
      if (!fingerprint || seen.has(fingerprint)) {
        return;
      }
      seen.add(fingerprint);
      variants.push({
        variant,
        strokes: result.strokes,
        penalty,
        transform: { type: transform, ...result, strokes: undefined },
        strokeStats: estimateStrokeStats(result.strokes, guide),
      });
    }

    // 一文字回答では、曲がりを別画として数えると「一画不足」を補完してしまう。
    // 分割補正は従来の文字列フリーモードだけに限定し、学習用の一文字枠では
    // 実際に筆を離した画数を優先する。
    if (freeMode) {
      add(
        "repair-split",
        splitStrokesAtCredibleCorners(strokes, guide),
        RECOGNITION_REPAIR_SPLIT_PENALTY,
        "split-credible-corners",
      );
    }
    add(
      "repair-merge",
      mergeCrediblyContinuousStrokes(strokes, guide),
      RECOGNITION_REPAIR_MERGE_PENALTY,
      "merge-continuous-endpoints",
    );
    add(
      "repair-tap-filter",
      filterAccidentalTapStrokes(strokes, guide, freeMode),
      RECOGNITION_REPAIR_TAP_PENALTY,
      "remove-single-zero-length-tap",
    );

    return variants.slice(0, MAX_RECOGNITION_REPAIR_VARIANTS);
  }

  function persistRecognitionCorpus() {
    const trimmed = state.recognitionCorpus.slice(-MAX_RECOGNITION_CORPUS_RECORDS);
    state.recognitionCorpus = trimmed;
    safeStorageSet(STORAGE_KEYS.recognitionCorpus, JSON.stringify(trimmed));
    updateRecognitionDiagnosticsUi();
  }

  function updateRecognitionDiagnosticsUi() {
    if (recognitionDiagnosticsGroup) {
      recognitionDiagnosticsGroup.hidden = !RECOGNITION_DIAGNOSTICS_ENABLED;
    }
    if (recognitionDiagnosticsCount) {
      recognitionDiagnosticsCount.textContent = `（${state.recognitionCorpus.length}件）`;
    }
  }

  function getRecognitionQuestionContext() {
    const item = state.session[state.currentQuestionIndex];
    if (!item) {
      return null;
    }
    return {
      index: state.currentQuestionIndex,
      front: item.question?.front || "",
      prompt: item.question?.prompt || "",
      back: item.question?.back || "",
      expectedAnswer: item.question?.answer || "",
      inputMode: item.inputMode || (isFreeMode() ? "free" : "character"),
      responseKind: item.question?.responseKind || getCurrentResponseKind(),
      activeSlotIndex: state.activeSlotIndex,
    };
  }

  function getExpectedRecognitionText(question) {
    if (!question?.expectedAnswer) {
      return "";
    }
    if (question.inputMode === "free") {
      return question.expectedAnswer;
    }
    const chars = Array.from(question.expectedAnswer);
    return chars[question.activeSlotIndex] || chars[0] || "";
  }

  function detectLocalFontAvailability(name) {
    const context = document.createElement("canvas").getContext("2d");
    if (!context) {
      return null;
    }
    const sample = "漢字かなカナAaWmw019";
    return ["monospace", "serif"].some((fallback) => {
      context.font = `32px ${fallback}`;
      const baseline = context.measureText(sample).width;
      context.font = `32px "${name}", ${fallback}`;
      const measured = context.measureText(sample).width;
      return Math.abs(measured - baseline) > 0.2;
    });
  }

  let resolvedEducationalFontName = "";

  function getEducationalFontDiagnostics() {
    const fontSet = document.fonts;
    const availability = EDUCATIONAL_FONT_CANDIDATES.map((name) => {
      let fontFaceSetCheck = null;
      try {
        fontFaceSetCheck = fontSet?.check ? fontSet.check(`16px "${name}"`) : null;
      } catch {
        fontFaceSetCheck = null;
      }
      const canvasDetected = detectLocalFontAvailability(name);
      return {
        name,
        available: canvasDetected === true,
        canvasDetected,
        fontFaceSetCheck,
      };
    });
    const firstAvailable = availability.find((item) => item.available)?.name || "";
    return {
      cssStack: getComputedStyle(questionText).fontFamily,
      availability,
      firstAvailable: firstAvailable || "system-fallback",
      selected: resolvedEducationalFontName || firstAvailable || "system-fallback",
      policy: "kaisho-then-gothic-no-mincho",
    };
  }

  function applyEducationalFontChoice() {
    const diagnostics = getEducationalFontDiagnostics();
    resolvedEducationalFontName = diagnostics.firstAvailable === "system-fallback"
      ? ""
      : diagnostics.firstAvailable;
    const ordered = [
      resolvedEducationalFontName,
      ...EDUCATIONAL_FONT_CANDIDATES,
      ...EDUCATIONAL_FONT_FALLBACKS,
    ].filter(Boolean);
    const unique = Array.from(new Set(ordered));
    const stack = unique
      .map((name) => name === "sans-serif" ? name : `"${name}"`)
      .join(", ");
    document.documentElement.style.setProperty("--educational-font", stack);
    return diagnostics;
  }

  function getEducationalCanvasFont(fontSize, weight = 400) {
    const primary = resolvedEducationalFontName || EDUCATIONAL_FONT_CANDIDATES[0];
    const fallbacks = Array.from(new Set([
      ...EDUCATIONAL_FONT_CANDIDATES,
      ...EDUCATIONAL_FONT_FALLBACKS,
    ]))
      .filter((name) => name !== primary)
      .map((name) => name === "sans-serif" ? name : `"${name}"`)
      .join(", ");
    return `${weight} ${fontSize}px "${primary}", ${fallbacks}`;
  }

  const glyphShapeModelCache = new Map();
  let glyphInkShapeCache = { fingerprint: "", model: null };

  function getMaskBounds(mask, width, height) {
    let left = width;
    let right = -1;
    let top = height;
    let bottom = -1;
    for (let y = 0; y < height; y += 1) {
      for (let x = 0; x < width; x += 1) {
        if (!mask[y * width + x]) {
          continue;
        }
        left = Math.min(left, x);
        right = Math.max(right, x);
        top = Math.min(top, y);
        bottom = Math.max(bottom, y);
      }
    }
    return right >= left && bottom >= top
      ? { left, right, top, bottom, width: right - left + 1, height: bottom - top + 1 }
      : null;
  }

  function canvasAlphaToMask(sourceCanvas, size = GLYPH_SHAPE_GRID_SIZE) {
    const sourceContext = sourceCanvas.getContext("2d", { willReadFrequently: true });
    if (!sourceContext) {
      return null;
    }
    const sourceData = sourceContext.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height).data;
    const sourceMask = new Uint8Array(sourceCanvas.width * sourceCanvas.height);
    for (let index = 0; index < sourceMask.length; index += 1) {
      sourceMask[index] = sourceData[index * 4 + 3] >= 24 ? 1 : 0;
    }
    const bounds = getMaskBounds(sourceMask, sourceCanvas.width, sourceCanvas.height);
    if (!bounds) {
      return null;
    }

    const targetCanvas = document.createElement("canvas");
    targetCanvas.width = size;
    targetCanvas.height = size;
    const targetContext = targetCanvas.getContext("2d", { willReadFrequently: true });
    if (!targetContext) {
      return null;
    }
    targetContext.clearRect(0, 0, size, size);
    targetContext.imageSmoothingEnabled = true;
    const available = size - GLYPH_SHAPE_PADDING * 2;
    const scale = Math.min(available / bounds.width, available / bounds.height);
    const targetWidth = Math.max(1, bounds.width * scale);
    const targetHeight = Math.max(1, bounds.height * scale);
    const targetX = (size - targetWidth) / 2;
    const targetY = (size - targetHeight) / 2;
    targetContext.drawImage(
      sourceCanvas,
      bounds.left,
      bounds.top,
      bounds.width,
      bounds.height,
      targetX,
      targetY,
      targetWidth,
      targetHeight,
    );
    const data = targetContext.getImageData(0, 0, size, size).data;
    const mask = new Uint8Array(size * size);
    for (let index = 0; index < mask.length; index += 1) {
      mask[index] = data[index * 4 + 3] >= 28 ? 1 : 0;
    }
    return mask;
  }

  function thinBinaryMask(input, width, height) {
    const mask = new Uint8Array(input);
    const marked = new Uint8Array(mask.length);
    let changed = true;
    let iterations = 0;
    while (changed && iterations < 40) {
      changed = false;
      iterations += 1;
      for (let phase = 0; phase < 2; phase += 1) {
        marked.fill(0);
        for (let y = 1; y < height - 1; y += 1) {
          for (let x = 1; x < width - 1; x += 1) {
            const index = y * width + x;
            if (!mask[index]) {
              continue;
            }
            const p2 = mask[index - width];
            const p3 = mask[index - width + 1];
            const p4 = mask[index + 1];
            const p5 = mask[index + width + 1];
            const p6 = mask[index + width];
            const p7 = mask[index + width - 1];
            const p8 = mask[index - 1];
            const p9 = mask[index - width - 1];
            const neighbors = [p2, p3, p4, p5, p6, p7, p8, p9];
            const count = neighbors.reduce((sum, value) => sum + value, 0);
            if (count < 2 || count > 6) {
              continue;
            }
            let transitions = 0;
            for (let neighborIndex = 0; neighborIndex < neighbors.length; neighborIndex += 1) {
              if (!neighbors[neighborIndex] && neighbors[(neighborIndex + 1) % neighbors.length]) {
                transitions += 1;
              }
            }
            if (transitions !== 1) {
              continue;
            }
            const phasePass = phase === 0
              ? p2 * p4 * p6 === 0 && p4 * p6 * p8 === 0
              : p2 * p4 * p8 === 0 && p2 * p6 * p8 === 0;
            if (phasePass) {
              marked[index] = 1;
            }
          }
        }
        for (let index = 0; index < mask.length; index += 1) {
          if (marked[index]) {
            mask[index] = 0;
            changed = true;
          }
        }
      }
    }
    return mask;
  }

  function dilateBinaryMask(mask, width, height) {
    const output = new Uint8Array(mask.length);
    for (let y = 0; y < height; y += 1) {
      for (let x = 0; x < width; x += 1) {
        const index = y * width + x;
        if (!mask[index]) {
          continue;
        }
        for (let dy = -1; dy <= 1; dy += 1) {
          for (let dx = -1; dx <= 1; dx += 1) {
            const nx = x + dx;
            const ny = y + dy;
            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
              output[ny * width + nx] = 1;
            }
          }
        }
      }
    }
    return output;
  }

  function createChamferDistance(mask, width, height) {
    const diagonal = Math.SQRT2;
    const distance = new Float32Array(mask.length);
    for (let index = 0; index < mask.length; index += 1) {
      distance[index] = mask[index] ? 0 : 1e4;
    }
    for (let y = 0; y < height; y += 1) {
      for (let x = 0; x < width; x += 1) {
        const index = y * width + x;
        let value = distance[index];
        if (x > 0) value = Math.min(value, distance[index - 1] + 1);
        if (y > 0) value = Math.min(value, distance[index - width] + 1);
        if (x > 0 && y > 0) value = Math.min(value, distance[index - width - 1] + diagonal);
        if (x + 1 < width && y > 0) value = Math.min(value, distance[index - width + 1] + diagonal);
        distance[index] = value;
      }
    }
    for (let y = height - 1; y >= 0; y -= 1) {
      for (let x = width - 1; x >= 0; x -= 1) {
        const index = y * width + x;
        let value = distance[index];
        if (x + 1 < width) value = Math.min(value, distance[index + 1] + 1);
        if (y + 1 < height) value = Math.min(value, distance[index + width] + 1);
        if (x + 1 < width && y + 1 < height) value = Math.min(value, distance[index + width + 1] + diagonal);
        if (x > 0 && y + 1 < height) value = Math.min(value, distance[index + width - 1] + diagonal);
        distance[index] = value;
      }
    }
    return distance;
  }

  function buildGlyphShapeModel(mask, width = GLYPH_SHAPE_GRID_SIZE, height = GLYPH_SHAPE_GRID_SIZE) {
    if (!mask) {
      return null;
    }
    const skeleton = thinBinaryMask(mask, width, height);
    let skeletonCount = 0;
    skeleton.forEach((value) => { skeletonCount += value; });
    if (skeletonCount < 8) {
      return null;
    }
    const dilated = dilateBinaryMask(skeleton, width, height);
    const rowProjection = new Float32Array(height);
    const columnProjection = new Float32Array(width);
    for (let y = 0; y < height; y += 1) {
      for (let x = 0; x < width; x += 1) {
        if (!skeleton[y * width + x]) {
          continue;
        }
        rowProjection[y] += 1 / width;
        columnProjection[x] += 1 / height;
      }
    }
    const coarseSize = 6;
    const coarse = new Float32Array(coarseSize * coarseSize);
    for (let cellY = 0; cellY < coarseSize; cellY += 1) {
      for (let cellX = 0; cellX < coarseSize; cellX += 1) {
        const startX = Math.floor(cellX * width / coarseSize);
        const endX = Math.floor((cellX + 1) * width / coarseSize);
        const startY = Math.floor(cellY * height / coarseSize);
        const endY = Math.floor((cellY + 1) * height / coarseSize);
        let filled = 0;
        let total = 0;
        for (let y = startY; y < endY; y += 1) {
          for (let x = startX; x < endX; x += 1) {
            filled += dilated[y * width + x];
            total += 1;
          }
        }
        coarse[cellY * coarseSize + cellX] = total ? filled / total : 0;
      }
    }
    return {
      width,
      height,
      skeleton,
      skeletonCount,
      distance: createChamferDistance(skeleton, width, height),
      rowProjection,
      columnProjection,
      coarse,
    };
  }

  function compareGlyphShapeModels(ink, glyph) {
    if (!ink || !glyph || ink.width !== glyph.width || ink.height !== glyph.height) {
      return null;
    }
    const size = ink.width;
    let inkDistance = 0;
    let glyphDistance = 0;
    let inkCovered = 0;
    let glyphCovered = 0;
    for (let index = 0; index < ink.skeleton.length; index += 1) {
      if (ink.skeleton[index]) {
        const distance = glyph.distance[index];
        inkDistance += distance;
        if (distance <= GLYPH_SHAPE_COVERAGE_RADIUS) inkCovered += 1;
      }
      if (glyph.skeleton[index]) {
        const distance = ink.distance[index];
        glyphDistance += distance;
        if (distance <= GLYPH_SHAPE_COVERAGE_RADIUS) glyphCovered += 1;
      }
    }
    let coarseDifference = 0;
    for (let index = 0; index < ink.coarse.length; index += 1) {
      coarseDifference += Math.abs(ink.coarse[index] - glyph.coarse[index]);
    }
    coarseDifference /= Math.max(1, ink.coarse.length);
    let projectionDifference = 0;
    for (let index = 0; index < ink.rowProjection.length; index += 1) {
      projectionDifference += Math.abs(ink.rowProjection[index] - glyph.rowProjection[index]);
    }
    for (let index = 0; index < ink.columnProjection.length; index += 1) {
      projectionDifference += Math.abs(ink.columnProjection[index] - glyph.columnProjection[index]);
    }
    projectionDifference /= Math.max(1, ink.rowProjection.length + ink.columnProjection.length);
    const inkToGlyph = inkDistance / Math.max(1, ink.skeletonCount) / size;
    const glyphToInk = glyphDistance / Math.max(1, glyph.skeletonCount) / size;
    const inkCoverage = inkCovered / Math.max(1, ink.skeletonCount);
    const glyphCoverage = glyphCovered / Math.max(1, glyph.skeletonCount);
    const score =
      inkToGlyph * 0.45 +
      glyphToInk * 0.55 +
      coarseDifference * 0.35 +
      projectionDifference * 0.2;
    return {
      score,
      inkToGlyph,
      glyphToInk,
      inkCoverage,
      glyphCoverage,
      coarseDifference,
      projectionDifference,
    };
  }

  function getGlyphInkFingerprint(strokes) {
    return (Array.isArray(strokes) ? strokes : []).map((stroke) => {
      const first = stroke?.[0] || { x: 0, y: 0 };
      const middle = stroke?.[Math.floor((stroke?.length || 1) / 2)] || first;
      const last = stroke?.[(stroke?.length || 1) - 1] || first;
      return [
        stroke?.length || 0,
        Math.round(first.x), Math.round(first.y),
        Math.round(middle.x), Math.round(middle.y),
        Math.round(last.x), Math.round(last.y),
      ].join(":");
    }).join("|");
  }

  function getCurrentInkGlyphShapeModel(strokes = state.strokes) {
    const source = (Array.isArray(strokes) ? strokes : []).filter((stroke) => stroke?.length > 1);
    const pointCount = source.reduce((sum, stroke) => sum + stroke.length, 0);
    if (pointCount < GLYPH_SHAPE_MIN_POINTS) {
      return null;
    }
    const fingerprint = getGlyphInkFingerprint(source);
    if (glyphInkShapeCache.fingerprint === fingerprint) {
      return glyphInkShapeCache.model;
    }
    const allPoints = source.flat();
    const xs = allPoints.map((point) => point.x);
    const ys = allPoints.map((point) => point.y);
    const left = Math.min(...xs);
    const right = Math.max(...xs);
    const top = Math.min(...ys);
    const bottom = Math.max(...ys);
    const width = Math.max(1, right - left);
    const height = Math.max(1, bottom - top);
    if (width < 8 || height < 8) {
      return null;
    }
    const size = GLYPH_SHAPE_GRID_SIZE;
    const available = size - GLYPH_SHAPE_PADDING * 2;
    const scale = Math.min(available / width, available / height);
    const offsetX = (size - width * scale) / 2 - left * scale;
    const offsetY = (size - height * scale) / 2 - top * scale;
    const shapeCanvas = document.createElement("canvas");
    shapeCanvas.width = size;
    shapeCanvas.height = size;
    const context = shapeCanvas.getContext("2d", { willReadFrequently: true });
    if (!context) {
      return null;
    }
    context.clearRect(0, 0, size, size);
    context.strokeStyle = "#fff";
    context.fillStyle = "#fff";
    context.lineCap = "round";
    context.lineJoin = "round";
    context.lineWidth = 2.2;
    source.forEach((stroke) => {
      context.beginPath();
      stroke.forEach((point, index) => {
        const x = point.x * scale + offsetX;
        const y = point.y * scale + offsetY;
        if (index === 0) context.moveTo(x, y);
        else context.lineTo(x, y);
      });
      context.stroke();
    });
    const mask = canvasAlphaToMask(shapeCanvas, size);
    const model = buildGlyphShapeModel(mask, size, size);
    glyphInkShapeCache = { fingerprint, model };
    return model;
  }

  function getCandidateGlyphShapeModel(text) {
    const fontKey = resolvedEducationalFontName || EDUCATIONAL_FONT_CANDIDATES[0] || "fallback";
    const cacheKey = `${fontKey}:${text}`;
    if (glyphShapeModelCache.has(cacheKey)) {
      return glyphShapeModelCache.get(cacheKey);
    }
    const sourceSize = 160;
    const sourceCanvas = document.createElement("canvas");
    sourceCanvas.width = sourceSize;
    sourceCanvas.height = sourceSize;
    const context = sourceCanvas.getContext("2d", { willReadFrequently: true });
    if (!context) {
      return null;
    }
    context.clearRect(0, 0, sourceSize, sourceSize);
    context.fillStyle = "#fff";
    context.textAlign = "center";
    context.textBaseline = "middle";
    context.font = getEducationalCanvasFont(126, 400);
    context.fillText(text, sourceSize / 2, sourceSize / 2 + 3);
    const model = buildGlyphShapeModel(canvasAlphaToMask(sourceCanvas));
    glyphShapeModelCache.set(cacheKey, model);
    if (glyphShapeModelCache.size > GLYPH_SHAPE_CACHE_LIMIT) {
      const oldest = glyphShapeModelCache.keys().next().value;
      glyphShapeModelCache.delete(oldest);
    }
    return model;
  }

  function getStrokeSupportAgainstGlyph(stroke, glyph, alignmentBounds) {
    if (!stroke?.length || !glyph || !alignmentBounds) {
      return null;
    }
    const size = glyph.width;
    const available = size - GLYPH_SHAPE_PADDING * 2;
    const scale = Math.min(
      available / Math.max(1, alignmentBounds.width),
      available / Math.max(1, alignmentBounds.height),
    );
    const offsetX = (size - alignmentBounds.width * scale) / 2 - alignmentBounds.left * scale;
    const offsetY = (size - alignmentBounds.height * scale) / 2 - alignmentBounds.top * scale;
    const sampled = compressStrokeForRecognition(stroke);
    let distanceTotal = 0;
    let covered = 0;
    let outside = 0;
    sampled.forEach((point) => {
      const x = Math.round(point.x * scale + offsetX);
      const y = Math.round(point.y * scale + offsetY);
      if (x < 0 || x >= size || y < 0 || y >= size) {
        outside += 1;
        distanceTotal += size;
        return;
      }
      const distance = glyph.distance[y * size + x];
      distanceTotal += distance;
      if (distance <= GLYPH_SHAPE_COVERAGE_RADIUS + 0.9) {
        covered += 1;
      }
    });
    const count = Math.max(1, sampled.length);
    return {
      coverage: covered / count,
      outsideRatio: outside / count,
      meanDistance: distanceTotal / count / size,
    };
  }

  function evaluateDisplacedStrokeEvidence(strokes, glyph, baselineComparison) {
    const source = (Array.isArray(strokes) ? strokes : [])
      .filter((stroke) => Array.isArray(stroke) && stroke.length > 1);
    if (source.length < 4 || !glyph || !baselineComparison) {
      return { available: false, hardReject: false, penalty: 0, suspects: [] };
    }

    const lengths = source.map(getStrokeLength);
    const totalLength = lengths.reduce((sum, value) => sum + value, 0);
    const minimumLength = Math.max(16, totalLength * 0.035);
    const suspects = [];

    source.forEach((stroke, index) => {
      const length = lengths[index];
      if (length < minimumLength) {
        return;
      }
      const remaining = source.filter((_, strokeIndex) => strokeIndex !== index);
      const alignmentBounds = getStrokesBounds(remaining);
      const omittedInk = getCurrentInkGlyphShapeModel(remaining);
      const omittedComparison = compareGlyphShapeModels(omittedInk, glyph);
      const support = getStrokeSupportAgainstGlyph(stroke, glyph, alignmentBounds);
      if (!support || !omittedComparison) {
        return;
      }
      const lengthRatio = length / Math.max(1, totalLength);
      const improvement = baselineComparison.score - omittedComparison.score;
      const severity =
        Math.max(0, 0.48 - support.coverage) * 2.2 +
        Math.max(0, support.meanDistance - 0.065) * 6 +
        Math.max(0, support.outsideRatio - 0.08) * 1.8 +
        Math.max(0, improvement - 0.006) * 12;
      if (severity > 0.18) {
        suspects.push({ index, lengthRatio, improvement, severity, ...support });
      }
    });

    suspects.sort((a, b) => b.severity - a.severity);
    const strongest = suspects[0] || null;
    const hardReject = Boolean(
      strongest &&
      strongest.lengthRatio >= 0.045 &&
      strongest.coverage < 0.24 &&
      strongest.meanDistance > 0.085 &&
      (strongest.improvement > 0.01 || strongest.outsideRatio > 0.22)
    );
    const penalty = strongest
      ? Math.min(1.9, strongest.severity * Math.min(1.4, strongest.lengthRatio * 8))
      : 0;
    const roundedSuspects = suspects.slice(0, 3).map((item) => Object.fromEntries(
      Object.entries(item).map(([key, value]) => [
        key,
        Number.isFinite(value) ? Math.round(value * 1000) / 1000 : value,
      ]),
    ));
    return {
      available: true,
      hardReject,
      penalty: Math.round(penalty * 1000) / 1000,
      suspects: roundedSuspects,
    };
  }

  function evaluateCandidateGlyphShape(text, strokes = state.strokes) {
    if (
      isFreeMode() ||
      getCharacterLength(text) !== 1 ||
      !isCjkIdeograph(text)
    ) {
      return { available: false, hardReject: false, penalty: 0 };
    }
    const ink = getCurrentInkGlyphShapeModel(strokes);
    const glyph = getCandidateGlyphShapeModel(text);
    const comparison = compareGlyphShapeModels(ink, glyph);
    if (!comparison) {
      return { available: false, hardReject: false, penalty: 0 };
    }
    const expectedCount = getCandidateStrokeCount(text) || 8;
    const complexityAllowance = Math.min(0.028, Math.max(0, expectedCount - 8) * 0.0024);
    const hardScore = GLYPH_SHAPE_HARD_SCORE + complexityAllowance;
    const weakScore = GLYPH_SHAPE_WEAK_SCORE + complexityAllowance * 0.55;
    const minInkCoverage = GLYPH_SHAPE_MIN_INK_COVERAGE - Math.min(0.06, complexityAllowance * 1.6);
    const minGlyphCoverage = GLYPH_SHAPE_MIN_GLYPH_COVERAGE - Math.min(0.08, complexityAllowance * 2.1);
    // フォントと手書きの局所的な接触・突出差は、ここでは順位調整にとどめる。
    // 字体の弁別に関わる接続・長短・交差は contrastive structure 側で判定する。
    const hardReject =
      (
        comparison.score >= hardScore + 0.045 &&
        comparison.inkCoverage < minInkCoverage - 0.11 &&
        comparison.glyphCoverage < minGlyphCoverage - 0.11
      ) ||
      comparison.inkCoverage < 0.34 ||
      comparison.glyphCoverage < 0.3;
    const displacedStroke = evaluateDisplacedStrokeEvidence(strokes, glyph, comparison);
    const penalty = Math.min(
      3.4,
      Math.max(0, comparison.score - GLYPH_SHAPE_SCORE_FLOOR) * 10 +
      Math.max(0, 0.78 - comparison.inkCoverage) * 0.9 +
      Math.max(0, 0.70 - comparison.glyphCoverage) * 1.0 +
      displacedStroke.penalty,
    );
    const rounded = Object.fromEntries(
      Object.entries(comparison).map(([key, value]) => [key, Math.round(value * 1000) / 1000]),
    );
    return {
      available: true,
      hardReject: hardReject || displacedStroke.hardReject,
      penalty: Math.round(penalty * 1000) / 1000,
      displacedStroke,
      thresholds: {
        hardScore: Math.round(hardScore * 1000) / 1000,
        weakScore: Math.round(weakScore * 1000) / 1000,
        minInkCoverage: Math.round(minInkCoverage * 1000) / 1000,
        minGlyphCoverage: Math.round(minGlyphCoverage * 1000) / 1000,
      },
      ...rounded,
    };
  }

  function getSerializableInkBounds() {
    const bounds = getInkBounds();
    if (!bounds) {
      return null;
    }
    return Object.fromEntries(
      Object.entries(bounds).map(([key, value]) => [key, Math.round(value * 10) / 10]),
    );
  }

  function recordRecognitionAttempt({
    fingerprint,
    strokeStats,
    nativeCandidates,
    googleRawCandidates,
    googleNormalizedCandidates,
    repairCandidateGroups,
    nativeEvaluation,
    ensembleEvaluation,
    recognitionPath,
    selectedText,
  }) {
    if (!RECOGNITION_DIAGNOSTICS_ENABLED || !fingerprint) {
      return;
    }
    if (state.lastLoggedRecognitionFingerprint === fingerprint) {
      return;
    }
    state.lastLoggedRecognitionFingerprint = fingerprint;

    const question = getRecognitionQuestionContext();
    const expectedText = getExpectedRecognitionText(question);
    const record = {
      schemaVersion: 3,
      appVersion: document.querySelector('meta[name="application-version"]')?.content || "",
      recordedAt: new Date().toISOString(),
      quizId,
      question,
      expectedText,
      selectedMatchesExpected: Boolean(
        selectedText && expectedText &&
        normalizeComparableText(selectedText) === normalizeComparableText(expectedText)
      ),
      layout: state.settings.layout,
      handedness: state.settings.handedness,
      pointerType: state.lastPointerType || getInputType() || "unknown",
      viewport: {
        width: window.innerWidth,
        height: window.innerHeight,
        devicePixelRatio: window.devicePixelRatio || 1,
      },
      userAgent: navigator.userAgent,
      educationalFont: getEducationalFontDiagnostics(),
      fingerprint,
      strokeStats,
      inkBounds: getSerializableInkBounds(),
      ink: buildGoogleInk(state.strokes),
      candidates: {
        native: nativeCandidates,
        googleRaw: googleRawCandidates,
        googleNormalized: googleNormalizedCandidates,
        repairs: (repairCandidateGroups || []).map((group) => ({
          variant: group.variant,
          penalty: group.penalty,
          strokeStats: group.strokeStats,
          transform: group.transform,
          candidates: group.candidates,
        })),
      },
      evaluations: {
        native: nativeEvaluation,
        ensemble: ensembleEvaluation,
      },
      recognitionPath,
      selectedText,
    };

    state.recognitionCorpus.push(record);
    persistRecognitionCorpus();
  }

  function downloadRecognitionCorpus() {
    const payload = {
      schemaVersion: 3,
      exportedAt: new Date().toISOString(),
      quizId,
      records: state.recognitionCorpus,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    const stamp = new Date().toISOString().replace(/[:.]/g, "-");
    link.href = url;
    link.download = `digicanji-recognition-corpus-${stamp}.json`;
    document.body.append(link);
    link.click();
    link.remove();
    window.setTimeout(() => URL.revokeObjectURL(url), 0);
  }

  function clearRecognitionCorpus() {
    state.recognitionCorpus = [];
    state.lastLoggedRecognitionFingerprint = "";
    safeStorageRemove(STORAGE_KEYS.recognitionCorpus);
    updateRecognitionDiagnosticsUi();
  }

  function setRecognitionReplayStatus(message = "") {
    if (recognitionReplayStatus) {
      recognitionReplayStatus.textContent = message;
    }
  }

  function extractRecognitionCorpusRecords(payload) {
    if (Array.isArray(payload)) {
      return payload;
    }
    if (Array.isArray(payload?.records)) {
      return payload.records;
    }
    return [];
  }

  function googleInkToStrokes(ink) {
    return (Array.isArray(ink) ? ink : []).map((stroke) => {
      const xs = Array.isArray(stroke?.[0]) ? stroke[0] : [];
      const ys = Array.isArray(stroke?.[1]) ? stroke[1] : [];
      const ts = Array.isArray(stroke?.[2]) ? stroke[2] : [];
      const length = Math.min(xs.length, ys.length);
      return Array.from({ length }, (_, index) => ({
        x: Number(xs[index]) || 0,
        y: Number(ys[index]) || 0,
        t: Number(ts[index]) || index,
      }));
    }).filter((stroke) => stroke.length > 0);
  }

  function getReplaySourceGroups(record) {
    const candidates = record?.candidates || {};
    const groups = [];
    if (Array.isArray(candidates.native) && candidates.native.length > 0) {
      groups.push({ source: "native", variant: "raw", candidates: candidates.native });
    }
    const googleRaw = Array.isArray(candidates.googleRaw)
      ? candidates.googleRaw
      : Array.isArray(candidates.google)
        ? candidates.google
        : [];
    if (googleRaw.length > 0) {
      groups.push({ source: "google", variant: "raw", candidates: googleRaw });
    }
    if (Array.isArray(candidates.googleNormalized) && candidates.googleNormalized.length > 0) {
      groups.push({
        source: "google",
        variant: "normalized",
        penalty: RECOGNITION_NORMALIZED_VARIANT_PENALTY,
        candidates: candidates.googleNormalized,
      });
    }
    if (Array.isArray(candidates.repairs)) {
      candidates.repairs.forEach((repair) => {
        if (!Array.isArray(repair?.candidates) || repair.candidates.length === 0) {
          return;
        }
        groups.push({
          source: "google",
          variant: String(repair.variant || "repair-legacy"),
          penalty: Number.isFinite(repair.penalty) ? repair.penalty : RECOGNITION_REPAIR_SPLIT_PENALTY,
          strokeStats: repair.strokeStats || null,
          transform: repair.transform || null,
          candidates: repair.candidates,
        });
      });
    }
    return groups;
  }

  function getReplayExpectedText(record) {
    if (record?.expectedText) {
      return record.expectedText;
    }
    return getExpectedRecognitionText(record?.question || null);
  }

  function replayRecognitionCorpus(payload) {
    const records = extractRecognitionCorpusRecords(payload);
    const previousStrokes = state.strokes;
    const previousModeOverride = state.recognitionModeOverride;
    const previousResponseKindOverride = state.recognitionResponseKindOverride;
    const previousReplayState = state.isRecognitionReplay;
    const results = [];

    try {
      state.isRecognitionReplay = true;
      records.forEach((record, index) => {
        state.strokes = googleInkToStrokes(record?.ink);
        state.recognitionModeOverride = record?.question?.inputMode === "free"
          ? "free"
          : "character";
        state.recognitionResponseKindOverride = record?.question?.responseKind || (
          isHiraganaOnlyText(getReplayExpectedText(record)) ? "reading" : "writing"
        );
        const sourceGroups = getReplaySourceGroups(record);
        const strokeStats = record?.strokeStats &&
          Number.isFinite(record.strokeStats.rawCount) &&
          Number.isFinite(record.strokeStats.virtualCount)
          ? record.strokeStats
          : estimateInputStrokeStats();
        const evaluation = evaluateCandidateEnsemble(sourceGroups, strokeStats);
        const expectedText = getReplayExpectedText(record);
        const normalizedExpected = normalizeComparableText(expectedText);
        const replaySelected = evaluation.text;
        const expectedEvaluation = evaluation.evaluations.find((item) =>
          normalizeComparableText(item.text) === normalizedExpected
        );
        const matchesExpected = Boolean(
          normalizedExpected &&
          normalizeComparableText(replaySelected) === normalizedExpected
        );
        const repairRescued = Boolean(
          matchesExpected && expectedEvaluation?.repairRequired
        );
        const failureClass = matchesExpected
          ? repairRescued ? "repair-rescued" : "correct"
          : !expectedEvaluation
            ? "missing-from-candidates"
            : !expectedEvaluation.pass
              ? "expected-candidate-rejected"
              : "ranking-error";

        results.push({
          index,
          recordedAt: record?.recordedAt || "",
          question: record?.question || null,
          expectedText,
          originalSelected: record?.selectedText || "",
          replaySelected,
          changedSelection: (record?.selectedText || "") !== replaySelected,
          matchesExpected,
          failureClass,
          repairRescued,
          expectedWasCandidate: Boolean(expectedEvaluation),
          expectedCandidatePassed: Boolean(expectedEvaluation?.pass),
          expectedCandidateReasons: expectedEvaluation?.reasons || [],
          recognitionPath: record?.recognitionPath || "legacy",
          evaluation,
        });
      });
    } finally {
      state.strokes = previousStrokes;
      state.recognitionModeOverride = previousModeOverride;
      state.recognitionResponseKindOverride = previousResponseKindOverride;
      state.isRecognitionReplay = previousReplayState;
    }

    const expectedResults = results.filter((item) => item.expectedText);
    const report = {
      schemaVersion: 1,
      appVersion: document.querySelector('meta[name="application-version"]')?.content || "",
      replayedAt: new Date().toISOString(),
      summary: {
        total: results.length,
        withExpectedAnswer: expectedResults.length,
        correct: expectedResults.filter((item) => item.matchesExpected).length,
        noCandidate: results.filter((item) => !item.replaySelected).length,
        changedSelection: results.filter((item) => item.changedSelection).length,
        expectedCandidateRejected: expectedResults.filter((item) =>
          item.failureClass === "expected-candidate-rejected"
        ).length,
        missingFromCandidates: expectedResults.filter((item) =>
          item.failureClass === "missing-from-candidates"
        ).length,
        rankingError: expectedResults.filter((item) =>
          item.failureClass === "ranking-error"
        ).length,
        repairRescued: expectedResults.filter((item) => item.repairRescued).length,
      },
      results,
    };
    state.lastRecognitionReplayReport = report;
    return report;
  }

  function downloadJsonFile(payload, filename) {
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = filename;
    document.body.append(link);
    link.click();
    link.remove();
    window.setTimeout(() => URL.revokeObjectURL(url), 0);
  }

  async function importRecognitionCorpusFile(file) {
    if (!file) {
      return;
    }
    try {
      const payload = JSON.parse(await file.text());
      const records = extractRecognitionCorpusRecords(payload);
      if (records.length === 0) {
        throw new Error("認識記録がありません");
      }
      state.importedRecognitionCorpus = records;
      replayRecognitionCorpusButton.disabled = false;
      setRecognitionReplayStatus(`${records.length}件を読み込みました。`);
    } catch (error) {
      state.importedRecognitionCorpus = [];
      replayRecognitionCorpusButton.disabled = true;
      setRecognitionReplayStatus(`読み込みに失敗しました：${error?.message || "形式を確認してください"}`);
    } finally {
      if (recognitionCorpusFileInput) {
        recognitionCorpusFileInput.value = "";
      }
    }
  }

  function replayImportedRecognitionCorpus() {
    if (state.importedRecognitionCorpus.length === 0) {
      setRecognitionReplayStatus("先に診断JSONを読み込んでください。");
      return;
    }
    const report = replayRecognitionCorpus({ records: state.importedRecognitionCorpus });
    const stamp = new Date().toISOString().replace(/[:.]/g, "-");
    downloadJsonFile(report, `digicanji-recognition-replay-${stamp}.json`);
    setRecognitionReplayStatus(
      `${report.summary.total}件を再評価：正答${report.summary.correct}/${report.summary.withExpectedAnswer}件、候補なし${report.summary.noCandidate}件。`,
    );
  }

  function runRecognitionSelfTests() {
    const cases = [];
    const add = (name, pass, details = null) => {
      cases.push({ name, pass: Boolean(pass), details });
    };
    const containsStrokeCount = (text, count) => {
      const range = getCandidateStrokeCountRange(text);
      return {
        range,
        pass: Boolean(range && count >= range.softMin && count <= range.max),
      };
    };

    const kyoryoku = containsStrokeCount("きょうりょく", 13);
    add("educational-kana-count-kyoryoku", kyoryoku.pass, kyoryoku.range);
    const aratameru = containsStrokeCount("あらためる", 12);
    add("educational-kana-count-aratameru", aratameru.pass, aratameru.range);
    const commonKanaCounts = { "る": 1, "お": 3, "な": 4, "み": 2, "め": 2 };
    add(
      "educational-single-kana-counts",
      Object.entries(commonKanaCounts).every(([char, count]) => {
        const profile = getKanaStrokeProfile(char);
        return profile?.min === count && profile?.max === count;
      }),
      Object.fromEntries(Object.keys(commonKanaCounts).map((char) => [char, getKanaStrokeProfile(char)])),
    );

    const shi = getKanaStrokeProfile("し");
    const ji = getKanaStrokeProfile("じ");
    add(
      "dakuten-requires-two-strokes",
      Boolean(shi && ji && ji.min >= shi.min + 2 && ji.max >= shi.max + 2),
      { shi, ji },
    );

    const previousMode = state.recognitionModeOverride;
    const previousResponseKind = state.recognitionResponseKindOverride;
    const previousStrokes = state.strokes;
    const previousReplay = state.isRecognitionReplay;
    try {
      state.recognitionResponseKindOverride = "writing";
      state.recognitionModeOverride = "free";
      add(
        "katakana-candidates-normalize-to-hiragana",
        normalizeCandidateText("キョウリョク") === "きょうりょく",
        normalizeCandidateText("キョウリョク"),
      );

      state.recognitionModeOverride = "character";
      state.recognitionResponseKindOverride = "reading";
      const readingItem = createSessionItem({ answer: "かりる", responseKind: "reading" });
      add(
        "reading-uses-ten-character-slots",
        readingItem.inputMode === "slots" && readingItem.slots.length === ANSWER_SLOT_COUNT,
        { inputMode: readingItem.inputMode, slotCount: readingItem.slots.length },
      );
      readingItem.slots[1].text = "め";
      add(
        "answer-compacts-leading-empty-slots",
        getItemAnswer(readingItem) === "め",
        getItemAnswer(readingItem, true),
      );
      add(
        "kanji-katakana-two-are-grading-equivalent",
        areAnswersEquivalent("ニ階", "二階") && !areAnswersEquivalent("ニ階", "三階"),
      );
      add(
        "cross-script-lookalikes-are-grading-equivalent",
        areAnswersEquivalent("ハ", "八") &&
          areAnswersEquivalent("カ", "力") &&
          areAnswersEquivalent("ロ", "口") &&
          !areAnswersEquivalent("タ", "夕"),
        {
          eight: evaluateCrossScriptVisualEquivalence("八", "ハ"),
          power: evaluateCrossScriptVisualEquivalence("力", "カ"),
          mouth: evaluateCrossScriptVisualEquivalence("口", "ロ"),
        },
      );
      add(
        "reading-candidate-is-single-hiragana",
        normalizeCandidateText("カ") === "か" &&
          isAllowedCandidateForCurrentMode("か") &&
          !isAllowedCandidateForCurrentMode("借"),
        { normalized: normalizeCandidateText("カ") },
      );
      state.recognitionResponseKindOverride = "writing";
      state.isRecognitionReplay = true;
      state.strokes = [[{ x: 10, y: 10, t: 0 }, { x: 90, y: 10, t: 100 }]];
      add("cjk-extension-b-supported", isCjkIdeograph("𠮷"));
      const unknownCompatibility = evaluateStrokeCompatibility(
        "𠀀",
        { rawCount: 6, virtualCount: 6 },
      );
      add(
        "unknown-han-stroke-count-soft-accept",
        unknownCompatibility.pass && unknownCompatibility.unknownStrokeCount,
        unknownCompatibility,
      );
      const ambiguousUnknown = evaluateCandidateEnsemble(
        [{ source: "native", variant: "raw", candidates: ["𠀀", "共"] }],
        { rawCount: 6, virtualCount: 6 },
      );
      add(
        "unknown-han-ambiguity-requests-second-engine",
        ambiguousUnknown.text === "𠀀" && !isCandidateEvaluationDecisive(ambiguousUnknown),
        { text: ambiguousUnknown.text, margin: ambiguousUnknown.margin },
      );

      const ensemble = evaluateCandidateEnsemble(
        [
          { source: "native", variant: "raw", candidates: ["乙", "一"] },
          { source: "google", variant: "raw", candidates: ["一"] },
        ],
        { rawCount: 1, virtualCount: 1 },
      );
      add(
        "cross-engine-consensus-ranking",
        ensemble.text === "一" && ensemble.accepted[0]?.crossEngineConsensus,
        { text: ensemble.text, accepted: ensemble.accepted.slice(0, 2) },
      );

      const variantAgreement = evaluateCandidateEnsemble(
        [
