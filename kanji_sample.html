            sourceGroups.push({
              source: "google",
              variant: "raw",
              candidates: googleRawCandidates,
            });
          }
          ensembleEvaluation = evaluateCandidateEnsemble(sourceGroups, strokeStats);
        }

        const guide = getCanvasGuide();
        const shouldTryNormalizedGoogle =
          !ensembleEvaluation?.text ||
          (
            !isCandidateEvaluationDecisive(ensembleEvaluation) &&
            isNormalizedVariantUseful(state.strokes, guide)
          );

        if (shouldTryNormalizedGoogle) {
          recognitionPath += "+google-normalized";
          const normalizedStrokes = normalizeStrokesToGuide(state.strokes, guide);
          googleNormalizedCandidates = await recognizeWithGoogle(normalizedStrokes);
          if (googleNormalizedCandidates.length > 0) {
            sourceGroups.push({
              source: "google",
              variant: "normalized",
              penalty: RECOGNITION_NORMALIZED_VARIANT_PENALTY,
              candidates: googleNormalizedCandidates,
            });
          }
          ensembleEvaluation = evaluateCandidateEnsemble(sourceGroups, strokeStats);
        }

        const shouldTryRepairVariants =
          !ensembleEvaluation?.text ||
          !isCandidateEvaluationDecisive(ensembleEvaluation);
        if (shouldTryRepairVariants) {
          const repairVariants = createRecognitionRepairVariants(
            state.strokes,
            guide,
            { freeMode: isFreeMode() },
          );
          for (const repair of repairVariants) {
            recognitionPath += `+${repair.variant}`;
            const candidates = await recognizeWithGoogle(repair.strokes);
            const repairGroup = {
              source: "google",
              variant: repair.variant,
              penalty: repair.penalty,
              strokeStats: repair.strokeStats,
              transform: repair.transform,
              candidates,
            };
            repairCandidateGroups.push(repairGroup);
            if (candidates.length > 0) {
              sourceGroups.push(repairGroup);
              ensembleEvaluation = evaluateCandidateEnsemble(sourceGroups, strokeStats);
            }
            if (isCandidateEvaluationDecisive(ensembleEvaluation)) {
              break;
            }
          }
        }

        text = ensembleEvaluation?.text || "";
        state.lastCandidateEvaluation = {
          fingerprint,
          strokeStats,
          native: nativeEvaluation,
          ensemble: ensembleEvaluation,
          sourceGroups,
          recognitionPath,
          selectedText: text,
        };

        if (text) {
          state.recognitionCache = { fingerprint, text };
        }
      }

      if (serial !== state.recognitionSerial || !hasMeaningfulInk()) {
        return;
      }

      recordRecognitionAttempt({
        fingerprint,
        strokeStats,
        nativeCandidates,
        googleRawCandidates,
        googleNormalizedCandidates,
        repairCandidateGroups,
        nativeEvaluation,
        ensembleEvaluation,
        recognitionPath,
        selectedText: text,
      });

      const decision = getStableCandidateDecision(text, strokeStats);

      if (decision.pending) {
        state.needsRecognition = true;
        state.nextRecognitionDelay = decision.delay;
        return;
      }

      if (decision.text) {
        setResult(decision.text, "result");
      } else {
        setResult(
          state.googleFailed ? messages.networkUnavailable : messages.noCandidate,
          "message",
        );
      }
    } finally {
      state.isRecognizing = false;

      if (state.needsRecognition) {
        const delay = state.nextRecognitionDelay || RECOGNITION_RETRY_DELAY_MS;
        state.needsRecognition = false;
        state.nextRecognitionDelay = RECOGNITION_RETRY_DELAY_MS;
        scheduleRecognition(delay);
      } else if (serial === state.recognitionSerial) {
        setBusy(false);
      }
    }
  }


  function resetNativeDrawing() {
    if (state.nativeDrawing) {
      state.nativeDrawing.clear();
      state.nativeDrawing = null;
    }
  }

  function resetPointerState() {
    state.activePointerId = null;
    state.pendingPointerId = null;
    state.pendingStartPoint = null;
    state.pendingPointerType = "";
    state.activeStrokePoints = null;
    state.lastPoint = null;
  }

  function activateCurrentInput({ recognizeIfNeeded = true } = {}) {
    window.clearTimeout(state.recognitionTimer);
    cancelGoogleRecognition(state);
    state.recognitionSerial += 1;
    resetPointerState();
    resetNativeDrawing();
    resetCandidateStability();
    refreshActiveStrokesReference();
    drawAllStrokes();
    renderResultArea();
    updateActionButtons();
    window.requestAnimationFrame(() => scrollActiveSlotIntoView({ behavior: "auto" }));
    setBusy(false);

    if (recognizeIfNeeded && hasMeaningfulInk() && !getActiveInputRecord().text) {
      setBusy(true);
      scheduleRecognition(RECOGNITION_FINISH_DELAY_MS);
    }
  }

  function moveSlot(delta) {
    const count = getVisibleSlotCount();
    const nextIndex = Math.max(0, Math.min(count - 1, state.activeSlotIndex + delta));

    if (nextIndex === state.activeSlotIndex) {
      return;
    }

    state.activeSlotIndex = nextIndex;
    const item = state.session[state.currentQuestionIndex];
    if (item) {
      item.activeSlotIndex = nextIndex;
    }
    activateCurrentInput();
  }

  function undoLastStroke() {
    if (state.strokes.length === 0) {
      return;
    }

    window.clearTimeout(state.recognitionTimer);
    cancelGoogleRecognition(state);
    state.recognitionSerial += 1;
    resetPointerState();
    resetNativeDrawing();
    resetCandidateStability();
    state.strokes.pop();
    clearActiveRecognition();
    drawAllStrokes();
    updateActionButtons();

    if (hasMeaningfulInk()) {
      setBusy(true);
      scheduleRecognition(RECOGNITION_FINISH_DELAY_MS);
    } else {
      setBusy(false);
      setResult(hasInk() ? messages.noCandidate : messages.empty, "message");
    }
  }

  function clearPad() {
    window.clearTimeout(state.recognitionTimer);
    cancelGoogleRecognition(state);
    state.recognitionSerial += 1;
    resetPointerState();
    resetNativeDrawing();
    resetCandidateStability();
    const record = getActiveInputRecord();
    record.strokes.length = 0;
    record.text = "";
    record.message = "";
    record.state = "message";
    record.acceptedText = "";
    record.acceptedRawCount = 0;
    refreshActiveStrokesReference();

    clearCanvas();
    updateActionButtons();
    setBusy(false);
    setResult(messages.empty, "message");
  }

  function updateActionButtons() {
    const count = getVisibleSlotCount();
    undoButton.disabled = state.strokes.length === 0;
    slotPosition.textContent = `${state.activeSlotIndex + 1} / ${count}`;
    slotPosition.dataset.atStart = state.activeSlotIndex <= 0 ? "true" : "false";
    slotPosition.dataset.atEnd = state.activeSlotIndex >= count - 1 ? "true" : "false";
  }

  function stripDuplicatedAnswerSuffix(answer, back) {
    let normalized = String(answer || "").trim();
    const suffixTarget = String(back || "").trimStart();
    const duplicatedMarks = new Set(["。", "、", "！", "？", "!", "?"]);

    while (normalized && suffixTarget) {
      const lastChar = Array.from(normalized).at(-1);
      const firstBackChar = Array.from(suffixTarget)[0];
      if (lastChar !== firstBackChar || !duplicatedMarks.has(lastChar)) {
        break;
      }
      normalized = Array.from(normalized).slice(0, -1).join("").trimEnd();
    }

    return normalized;
  }

  function normalizeComparableText(text) {
    return String(text || "")
      .normalize("NFKC")
      .replace(/[\s\u3000]/g, "")
      .trim();
  }

  const crossScriptVisualEquivalenceCache = new Map();

  function getAnswerCharacterScriptClass(char) {
    const value = String(char || "");
    if (/^\p{Script=Han}$/u.test(value)) return "han";
    if (/^\p{Script=Katakana}$/u.test(value) || value === "ー") return "katakana";
    return "other";
  }

  function evaluateCrossScriptVisualEquivalence(actual, expected) {
    const fontKey = resolvedEducationalFontName || EDUCATIONAL_FONT_CANDIDATES[0] || "fallback";
    const key = `${fontKey}:${[actual, expected].sort().join("\u241f")}`;
    if (crossScriptVisualEquivalenceCache.has(key)) {
      return crossScriptVisualEquivalenceCache.get(key);
    }
    const actualClass = getAnswerCharacterScriptClass(actual);
    const expectedClass = getAnswerCharacterScriptClass(expected);
    const eligible = new Set([actualClass, expectedClass]);
    if (!(eligible.has("han") && eligible.has("katakana")) || eligible.size !== 2) {
      const decision = { equivalent: false, reason: "ineligible-script-pair" };
      crossScriptVisualEquivalenceCache.set(key, decision);
      return decision;
    }

    const actualRange = getCandidateStrokeCountRange(actual);
    const expectedRange = getCandidateStrokeCountRange(expected);
    if (!actualRange || !expectedRange || actualRange.max !== expectedRange.max) {
      const decision = { equivalent: false, reason: "different-stroke-count" };
      crossScriptVisualEquivalenceCache.set(key, decision);
      return decision;
    }

    const actualModel = getCandidateGlyphShapeModel(actual);
    const expectedModel = getCandidateGlyphShapeModel(expected);
    const comparison = compareGlyphShapeModels(actualModel, expectedModel);
    if (!comparison) {
      const decision = { equivalent: false, reason: "glyph-unavailable" };
      crossScriptVisualEquivalenceCache.set(key, decision);
      return decision;
    }
    const equivalent =
      comparison.score <= CROSS_SCRIPT_EQUIVALENCE_MAX_SCORE &&
      comparison.inkCoverage >= CROSS_SCRIPT_EQUIVALENCE_MIN_COVERAGE &&
      comparison.glyphCoverage >= CROSS_SCRIPT_EQUIVALENCE_MIN_COVERAGE &&
      comparison.coarseDifference <= CROSS_SCRIPT_EQUIVALENCE_MAX_COARSE_DIFFERENCE &&
      comparison.projectionDifference <= CROSS_SCRIPT_EQUIVALENCE_MAX_PROJECTION_DIFFERENCE;
    const decision = {
      equivalent,
      reason: equivalent ? "rendered-glyphs-indistinguishable" : "rendered-glyphs-distinguishable",
      comparison,
    };
    crossScriptVisualEquivalenceCache.set(key, decision);
    return decision;
  }

  function areAnswerCharactersVisuallyEquivalent(actual, expected) {
    if (actual === expected) {
      return true;
    }
    const knownEquivalent = ANSWER_VISUAL_EQUIVALENCE_GROUPS.some((group) =>
      group.includes(actual) && group.includes(expected)
    );
    return knownEquivalent || evaluateCrossScriptVisualEquivalence(actual, expected).equivalent;
  }

  function areAnswersEquivalent(actualText, expectedText) {
    const actual = Array.from(normalizeComparableText(actualText));
    const expected = Array.from(normalizeComparableText(expectedText));
    return actual.length === expected.length && actual.every((char, index) =>
      areAnswerCharactersVisuallyEquivalent(char, expected[index])
    );
  }

  function hashString(value) {
    let hash = 2166136261;
    for (const char of String(value)) {
      hash ^= char.codePointAt(0);
      hash = Math.imul(hash, 16777619);
    }
    return (hash >>> 0).toString(36);
  }

  function createQuestion(row, sourceIndex) {
    const source = row && typeof row === "object" ? row : {};
    const front = source.front ?? source["前部"] ?? "";
    const prompt = source.prompt ?? source["問部"] ?? "";
    const back = source.back ?? source["後部"] ?? "";
    const rawAnswer = source.answer ?? source["解答"] ?? "";
    const explanation = source.explanation ?? source["解説"] ?? "";
    const cleanPrompt = String(prompt).trim();
    const cleanRawAnswer = String(rawAnswer).trim();
    const answer = stripDuplicatedAnswerSuffix(cleanRawAnswer, back);

    if (!cleanPrompt || !answer) {
      return null;
    }

    const identity = [front, cleanPrompt, back, cleanRawAnswer, explanation].join("\u241f");
    const key = `q_${hashString(identity)}`;
    const saved = state.stats[key] || {};

    return {
      key,
      sourceIndex,
      front: String(front),
      prompt: cleanPrompt,
      back: String(back),
      rawAnswer: cleanRawAnswer,
      answer,
      inputMode: "slots",
      responseKind: isHiraganaOnlyText(answer) ? "reading" : "writing",
      explanation: String(explanation).trim() || "解説は登録されていません。",
      totalAttempts: Math.max(0, Number(saved.totalAttempts) || 0),
      correctCount: Math.max(0, Number(saved.correctCount) || 0),
    };
  }

  function getQuestionPriorityWeight(question) {
    const attempts = question.totalAttempts;
    const accuracy = attempts > 0 ? question.correctCount / attempts : 0;
    const errorPriority = 1 + (1 - accuracy) * 5;
    const newQuestionPriority = attempts === 0 ? 2.25 : 0;
    const lowExposurePriority = 1.4 / Math.sqrt(attempts + 1);
    return errorPriority + newQuestionPriority + lowExposurePriority;
  }

  function selectSessionQuestions(questions) {
    return questions
      .map((question) => {
        const weight = getQuestionPriorityWeight(question);
        const random = Math.max(Number.EPSILON, Math.random());
        return { question, key: Math.pow(random, 1 / weight) };
      })
      .sort((a, b) => b.key - a.key)
      .slice(0, Math.min(MAX_SESSION_QUESTIONS, questions.length))
      .map((entry) => entry.question);
  }

  function createSessionItem(question) {
    return {
      question,
      inputMode: "slots",
      slots: Array.from({ length: ANSWER_SLOT_COUNT }, createInputRecord),
      activeSlotIndex: 0,
      answerText: "",
      isCorrect: false,
    };
  }

  function getItemAnswer(item, placeholder = false) {
    if (placeholder) {
      return item.slots.map((record) => record.text || "□").join("");
    }
    // 先頭や途中の未入力枠は位置情報として扱わず、入力済み文字を左詰めして採点する。
    return item.slots
      .map((record) => String(record.text || ""))
      .filter(Boolean)
      .join("");
  }

  function saveCurrentSessionState() {
    const item = state.session[state.currentQuestionIndex];
    if (!item) {
      return;
    }
    item.activeSlotIndex = state.activeSlotIndex;
    item.answerText = getItemAnswer(item);
  }

  function renderQuestionText(question) {
    questionText.replaceChildren();
    const front = document.createElement("span");
    front.className = "question-part question-front";
    front.textContent = question.front;
    const prompt = document.createElement("span");
    prompt.className = "question-part question-prompt";
    prompt.textContent = question.prompt;
    const back = document.createElement("span");
    back.className = "question-part question-back";
    back.textContent = question.back;
    questionText.append(front, prompt, back);
    questionText.setAttribute("aria-label", `${question.front}${question.prompt}${question.back}`);
    fitQuestionText();
  }

  function fitQuestionText() {
    questionText.style.removeProperty("font-size");
    window.requestAnimationFrame(() => {
      const maxHeight = questionText.clientHeight;
      const maxWidth = questionText.clientWidth;
      if (!maxHeight || !maxWidth) {
        return;
      }

      let size = Number.parseFloat(getComputedStyle(questionText).fontSize) || 22;
      let attempts = 0;
      while (
        attempts < 12 &&
        (questionText.scrollHeight > maxHeight + 1 || questionText.scrollWidth > maxWidth + 1) &&
        size > 12
      ) {
        size -= 1;
        questionText.style.fontSize = `${size}px`;
        attempts += 1;
      }
    });
  }

  function renderProgress() {
    const total = Math.max(1, state.session.length);
    const current = Math.min(total, state.currentQuestionIndex + 1);
    const isFinalQuestion = state.currentQuestionIndex === total - 1;
    progressText.textContent = `${current} / ${total}`;
    progressBar.style.width = `${(current / total) * 100}%`;
    advanceButton.textContent = isFinalQuestion ? "回答" : "進む";
    advanceButton.classList.toggle("is-final-answer", isFinalQuestion);
    advanceButton.setAttribute(
      "aria-label",
      isFinalQuestion ? "回答して答え合わせへ進む" : "次の問題へ進む",
    );
  }

  function updateReviewMenu() {
    reviewMenu.replaceChildren();
    reviewMenu.style.setProperty("--review-count", String(Math.max(1, state.session.length)));
    state.session.forEach((item, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "review-item";
      if (index === state.currentQuestionIndex) {
        button.classList.add("is-current");
      }
      button.dataset.index = String(index);

      const number = document.createElement("span");
      number.className = "review-number";
      number.textContent = index === 9 ? "10（0）" : `${index + 1}`;
      const preview = document.createElement("span");
      preview.className = "review-preview";
      preview.textContent = `${item.question.front}${item.question.prompt}${item.question.back}`;
      const status = document.createElement("span");
      status.className = "review-status";
      status.textContent = item.slots.some((record) => record.text) ? "入力済み" : "—";
      button.append(number, preview, status);
      reviewMenu.append(button);
    });
  }

  function setReviewMenuOpen(isOpen) {
    reviewMenu.hidden = !isOpen;
    reviewButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
  }

  function goToProblem(index, { recognizeIfNeeded = true } = {}) {
    if (!state.session[index]) {
      return;
    }

    saveCurrentSessionState();
    state.currentQuestionIndex = index;
    const item = state.session[index];
    state.slots = item.slots;
    state.slotMode = item.slots.length;
    state.activeSlotIndex = Math.max(0, Math.min(item.slots.length - 1, item.activeSlotIndex || 0));
    refreshActiveStrokesReference();
    renderQuestionText(item.question);
    renderProgress();
    updateReviewMenu();
    activateCurrentInput({ recognizeIfNeeded });
    setReviewMenuOpen(false);
  }

  function clearResultTimers() {
    state.resultTimers.forEach((timer) => window.clearTimeout(timer));
    state.resultTimers.length = 0;
  }

  function startSession() {
    clearResultTimers();
    if (state.questions.length === 0) {
      questionText.textContent = "問題データが同梱されていません。";
      return;
    }

    const selected = selectSessionQuestions(state.questions);
    state.session = selected.map(createSessionItem);
    state.currentQuestionIndex = 0;
    state.resultsCommitted = false;
    learningScreen.hidden = false;
    resultScreen.hidden = true;
    retryButton.hidden = true;
    scoreSummary.className = "score-summary";
    resultList.replaceChildren();
    goToProblem(0, { recognizeIfNeeded: false });
    setResult(state.nativeRecognizer === null ? messages.loading : messages.empty, "message");
    scheduleLayoutFit();
  }

  function handleAdvance() {
    saveCurrentSessionState();
    if (state.currentQuestionIndex < state.session.length - 1) {
      goToProblem(state.currentQuestionIndex + 1);
      return;
    }
    showResults();
  }

  function commitSessionStats() {
    if (state.resultsCommitted) {
      return;
    }

    state.session.forEach((item) => {
      item.answerText = getItemAnswer(item);
      item.isCorrect = areAnswersEquivalent(item.answerText, item.question.answer);
      item.question.totalAttempts += 1;
      if (item.isCorrect) {
        item.question.correctCount += 1;
      }
      state.stats[item.question.key] = {
        totalAttempts: item.question.totalAttempts,
        correctCount: item.question.correctCount,
      };
    });

    state.resultsCommitted = true;
    try {
      localStorage.setItem(STORAGE_KEYS.stats, JSON.stringify(state.stats));
    } catch {
      // Storage may be unavailable; the current session still works.
    }
  }

  function appendSentenceParts(container, question, answerText) {
    const front = document.createTextNode(question.front);
    const answer = document.createElement("span");
    const hasAnswer = Boolean(String(answerText || "").trim());
    answer.className = `result-answer-part${hasAnswer ? "" : " is-unanswered"}`;
    answer.textContent = hasAnswer ? answerText : " ";
    if (!hasAnswer) {
      answer.setAttribute("aria-label", "未回答");
    }
    const back = document.createTextNode(question.back);
    container.append(front, answer, back);
  }

  function createResultRow(item, index) {
    const row = document.createElement("button");
    row.type = "button";
    row.className = `result-row ${item.isCorrect ? "is-correct" : "is-incorrect"}`;
    row.dataset.index = String(index);
    row.setAttribute("aria-label", `${index + 1}問目。${item.isCorrect ? "正解" : "不正解"}。クリックで解説。`);

    const sentence = document.createElement("span");
    sentence.className = "result-sentence";
    appendSentenceParts(sentence, item.question, item.answerText);
    const judgement = document.createElement("span");
    judgement.className = "result-judgement";
    judgement.textContent = item.isCorrect ? "○" : "×";
    row.append(sentence, judgement);
    return row;
  }

  function showResults() {
    window.clearTimeout(state.recognitionTimer);
    state.recognitionSerial += 1;
    setBusy(false);
    saveCurrentSessionState();
    commitSessionStats();
    clearResultTimers();
    learningScreen.hidden = true;
    resultScreen.hidden = false;
    scheduleLayoutFit();
    resultList.replaceChildren();
    scoreSummary.replaceChildren();
    scoreSummary.className = "score-summary";
    retryButton.hidden = true;

    state.session.forEach((item, index) => {
      const row = createResultRow(item, index);
      resultList.append(row);
      const revealTimer = window.setTimeout(() => {
        row.classList.add("is-visible");
        const judgeTimer = window.setTimeout(() => row.classList.add("is-judged"), 120);
        state.resultTimers.push(judgeTimer);
      }, 100 + index * RESULT_REVEAL_INTERVAL_MS);
      state.resultTimers.push(revealTimer);
    });

    scheduleResultFit();
    const summaryDelay = 180 + state.session.length * RESULT_REVEAL_INTERVAL_MS;
    const summaryTimer = window.setTimeout(() => {
      const correctCount = state.session.filter((item) => item.isCorrect).length;
      const lead = document.createElement("span");
      lead.textContent = `${state.session.length}問中`;
      const number = document.createElement("strong");
      number.className = "score-number";
      if (correctCount === state.session.length) {
        number.classList.add("is-perfect");
      }
      number.textContent = String(correctCount);
      const tail = document.createElement("span");
      tail.textContent = "問正解";
      scoreSummary.append(lead, number, tail);
      scoreSummary.classList.add("is-visible");
      retryButton.hidden = false;
      retryButton.focus({ preventScroll: true });
    }, summaryDelay);
    state.resultTimers.push(summaryTimer);
  }

  function openExplanation(index) {
    const item = state.session[index];
    if (!item) {
      return;
    }
    state.explanationIndex = index;
    explanationTitle.textContent = `正解：${item.question.answer}`;
    explanationText.textContent = item.question.explanation;
    syncExplanationLayout();
    explanationOverlay.hidden = false;
  }

  function closeExplanation() {
    explanationOverlay.hidden = true;
  }

  function renderTraceQuestion(question) {
    traceQuestionText.replaceChildren();
    const front = document.createElement("span");
    front.className = "question-part question-front";
    front.textContent = question.front;
    const prompt = document.createElement("span");
    prompt.className = "question-part question-prompt";
    prompt.textContent = question.prompt;
    const back = document.createElement("span");
    back.className = "question-part question-back";
    back.textContent = question.back;
    traceQuestionText.append(front, prompt, back);
    traceQuestionText.setAttribute("aria-label", `${question.front}${question.prompt}${question.back}`);
  }

  function fitTraceQuestionText() {
    traceQuestionText.style.removeProperty("font-size");
    window.requestAnimationFrame(() => {
      if (traceOverlay.hidden) {
        return;
      }
      const maxHeight = traceQuestionText.clientHeight;
      const maxWidth = traceQuestionText.clientWidth;
      if (!maxHeight || !maxWidth) {
        return;
      }
      let size = Number.parseFloat(getComputedStyle(traceQuestionText).fontSize) || 22;
      let attempts = 0;
      while (
        attempts < 14 &&
        (traceQuestionText.scrollHeight > maxHeight + 1 || traceQuestionText.scrollWidth > maxWidth + 1) &&
        size > 11
      ) {
        size -= 1;
        traceQuestionText.style.fontSize = `${size}px`;
        attempts += 1;
      }
    });
  }

  function isTraceVerticalLayout() {
    return traceOverlay.dataset.layout !== "horizontal";
  }

  function isTracePortableRotated() {
    return traceOverlay.dataset.portableRotated === "true";
  }

  let traceLayoutFrame = 0;

  function fitTraceLayout() {
    traceLayoutFrame = 0;
    if (traceOverlay.hidden) {
      return;
    }

    const dialogRect = traceDialog.getBoundingClientRect();
    const shouldRotate =
      traceOverlay.dataset.layout === "vertical-portable" &&
      dialogRect.height > dialogRect.width &&
      dialogRect.width > 0;

    traceOverlay.dataset.portableRotated = shouldRotate ? "true" : "false";
    if (shouldRotate) {
      traceSurface.style.width = `${dialogRect.height}px`;
      traceSurface.style.height = `${dialogRect.width}px`;
    } else {
      traceSurface.style.removeProperty("width");
      traceSurface.style.removeProperty("height");
    }

    tracePadStage.style.removeProperty("width");
    tracePadStage.style.removeProperty("height");
    tracePadStage.style.removeProperty("place-self");

    if (traceOverlay.dataset.layout === "horizontal") {
      tracePadStage.style.width = "100%";
      tracePadStage.style.height = "100%";
      tracePadStage.style.placeSelf = "stretch";
      const available = tracePadStage.getBoundingClientRect();
      const side = Math.max(1, Math.min(available.width, available.height));
      tracePadStage.style.width = `${side}px`;
      tracePadStage.style.height = `${side}px`;
      tracePadStage.style.placeSelf = "center";
    }

    fitTraceQuestionText();
    resizeTraceCanvas();
  }

  function scheduleTraceLayoutFit() {
    if (traceLayoutFrame) {
      window.cancelAnimationFrame(traceLayoutFrame);
    }
    traceLayoutFrame = window.requestAnimationFrame(fitTraceLayout);
  }

  function getTraceCanvasSize() {
    return {
      width: Math.max(1, traceCanvas.clientWidth),
      height: Math.max(1, traceCanvas.clientHeight),
    };
  }

  function scaleTraceInk(fromSize, toSize) {
    const scaleX = toSize.width / Math.max(1, fromSize.width);
    const scaleY = toSize.height / Math.max(1, fromSize.height);
    if (Math.abs(scaleX - 1) < 0.005 && Math.abs(scaleY - 1) < 0.005) {
      return;
    }
    state.trace.strokes.forEach((stroke) => {
      stroke.forEach((point) => {
        point.x *= scaleX;
        point.y *= scaleY;
      });
    });
  }

  function resizeTraceCanvas() {
    if (traceOverlay.hidden) {
      return;
    }
    const size = getTraceCanvasSize();
    const ratio = window.devicePixelRatio || 1;
    const previous = state.trace.canvasCssSize;
    if (previous.width > 0 && previous.height > 0) {
      scaleTraceInk(previous, size);
    }
    state.trace.canvasCssSize = size;
    traceCanvas.width = Math.max(1, Math.round(size.width * ratio));
    traceCanvas.height = Math.max(1, Math.round(size.height * ratio));
    traceContext.setTransform(ratio, 0, 0, ratio, 0, 0);
    drawTraceCanvas();
  }

  function getTraceLineWidth() {
    const size = getTraceCanvasSize();
    const shorterSide = Math.min(size.width, size.height);
    return Math.max(MIN_LINE_WIDTH, Math.min(MAX_LINE_WIDTH, shorterSide * LINE_WIDTH_RATIO));
  }

  function getTraceTemplateGrid(count, width, height, vertical) {
    const usableWidth = width * 0.9;
    const usableHeight = height * 0.9;
    let best = { rows: count, columns: 1, cellSize: 0, score: -Infinity };

    for (let columns = 1; columns <= count; columns += 1) {
      const rows = Math.ceil(count / columns);
      const cellWidth = usableWidth / columns;
      const cellHeight = usableHeight / rows;
      const cellSize = Math.min(cellWidth, cellHeight);
      const unused = rows * columns - count;
      const orientationFit = vertical
        ? (rows >= columns ? 1.035 : 0.97)
        : (columns >= rows ? 1.035 : 0.97);
      const score = cellSize * orientationFit - unused * cellSize * 0.035;
      if (score > best.score) {
        best = { rows, columns, cellSize, score };
      }
    }

    return {
      ...best,
      cellWidth: usableWidth / best.columns,
      cellHeight: usableHeight / best.rows,
      startX: (width - usableWidth) / 2,
      startY: (height - usableHeight) / 2,
    };
  }

  function drawEducationalKanaPath(context, char, centerX, centerY, size, color) {
    const paths = EDUCATIONAL_KANA_PATHS[char];
    if (!paths) {
      return false;
    }

    const pathSize = size * 0.86;
    context.save();
    context.translate(centerX - pathSize / 2, centerY - pathSize / 2);
    context.scale(pathSize / 100, pathSize / 100);
    context.strokeStyle = color;
    context.lineWidth = 10;
    context.lineCap = "round";
    context.lineJoin = "round";
    paths.forEach((pathData) => context.stroke(new Path2D(pathData)));
    context.restore();
    return true;
  }

  function createEducationalKanaSvg(char) {
    const paths = EDUCATIONAL_KANA_PATHS[char];
    if (!paths) {
      return null;
    }

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 100 100");
    svg.setAttribute("aria-label", char);
    svg.classList.add("educational-kana-svg");
    paths.forEach((pathData) => {
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", pathData);
      svg.append(path);
    });
    return svg;
  }

  function renderEducationalKanaText(element, text) {
    element.replaceChildren();
    for (const char of Array.from(String(text || ""))) {
      const svg = createEducationalKanaSvg(char);
      if (svg) {
        element.append(svg);
      } else {
        element.append(document.createTextNode(char));
      }
    }
  }

  function drawTraceTemplate() {
    const answerChars = Array.from(String(state.trace.answer || ""));
    if (answerChars.length === 0) {
      return;
    }

    const { width, height } = getTraceCanvasSize();
    const vertical = isTraceVerticalLayout();
    const grid = getTraceTemplateGrid(answerChars.length, width, height, vertical);
    const fontSize = Math.max(30, Math.min(grid.cellWidth, grid.cellHeight) * 0.82);

    traceContext.save();
    traceContext.fillStyle = "rgba(244, 240, 223, 0.19)";
    traceContext.textAlign = "center";
    traceContext.textBaseline = "middle";
    traceContext.font = getEducationalCanvasFont(fontSize, 400);
    traceContext.fontKerning = "none";

    answerChars.forEach((char, index) => {
      let row;
      let column;
      if (vertical) {
        row = index % grid.rows;
        column = grid.columns - 1 - Math.floor(index / grid.rows);
      } else {
        row = Math.floor(index / grid.columns);
        column = index % grid.columns;
      }
      const x = grid.startX + grid.cellWidth * (column + 0.5);
      const y = grid.startY + grid.cellHeight * (row + 0.52);
      const vectorDrawn = drawEducationalKanaPath(
        traceContext,
        char,
        x,
        y,
        Math.min(grid.cellWidth, grid.cellHeight) * 0.9,
        "rgba(244, 240, 223, 0.19)",
      );
      if (!vectorDrawn) {
        traceContext.fillText(char, x, y);
      }
    });
    traceContext.restore();
  }

  function drawTraceStrokePoint(point, previousPoint) {
    const lineWidth = getTraceLineWidth();
    traceContext.lineCap = "round";
    traceContext.lineJoin = "round";
    traceContext.strokeStyle = INK_COLOR;
    traceContext.fillStyle = INK_COLOR;
    traceContext.lineWidth = lineWidth;
    if (!previousPoint) {
      traceContext.beginPath();
      traceContext.arc(point.x, point.y, lineWidth / 2, 0, Math.PI * 2);
      traceContext.fill();
      return;
    }
    traceContext.beginPath();
    traceContext.moveTo(previousPoint.x, previousPoint.y);
    traceContext.lineTo(point.x, point.y);
    traceContext.stroke();
  }

  function drawTraceCanvas() {
    const { width, height } = getTraceCanvasSize();
    traceContext.clearRect(0, 0, width, height);
    drawTraceTemplate();
    state.trace.strokes.forEach((stroke) => {
      stroke.forEach((point, index) => {
        drawTraceStrokePoint(point, index === 0 ? null : stroke[index - 1]);
      });
    });
    traceUndoButton.disabled = state.trace.strokes.length === 0;
  }

  function getTraceCanvasCoordinates(event) {
    return mapViewportPointToCanvas(
      traceCanvas,
      event,
      isTracePortableRotated(),
    );
  }

  function getTraceInkBounds() {
    const points = state.trace.strokes.flat().filter(Boolean);
    if (points.length === 0) {
      return null;
    }
    const xs = points.map((point) => point.x);
    const ys = points.map((point) => point.y);
    const left = Math.min(...xs);
    const right = Math.max(...xs);
    const top = Math.min(...ys);
    const bottom = Math.max(...ys);
    return {
      left,
      right,
      top,
      bottom,
      width: Math.max(1, right - left),
      height: Math.max(1, bottom - top),
    };
  }

  function hasMeaningfulTraceInk() {
    const bounds = getTraceInkBounds();
    if (!bounds) {
      return false;
    }
    const totalLength = state.trace.strokes.reduce(
      (total, stroke) => total + getStrokeLength(stroke),
      0,
    );
    return totalLength >= MIN_RECOGNITION_INK_LENGTH &&
      Math.max(bounds.width, bounds.height) >= MIN_RECOGNITION_INK_LENGTH * 0.55;
  }

  function setTraceRecognition(text = "フリー", visualState = "idle", status = "") {
    state.trace.recognizedText = visualState === "correct" || visualState === "incorrect" ? text : "";
    renderEducationalKanaText(traceRecognitionText, text);
    traceRecognitionStatus.textContent = status;
    traceResultBox.dataset.state = visualState;
  }

  function resetTraceNativeDrawing() {
    if (state.trace.nativeDrawing) {
      state.trace.nativeDrawing.clear?.();
      state.trace.nativeDrawing = null;
    }
  }

  function cancelTraceRecognition() {
    window.clearTimeout(state.trace.recognitionTimer);
    state.trace.recognitionSerial += 1;
    state.trace.needsRecognition = false;
    cancelGoogleRecognition(state.trace);
    resetTraceNativeDrawing();
  }

  function ensureTraceNativeDrawing() {
    if (!state.nativeRecognizer || state.nativeFailed) {
      return null;
    }
    if (!state.trace.nativeDrawing) {
      const hints = {
        recognitionType: "text",
        inputType: SUPPORTED_POINTER_TYPES.has(state.trace.pointerType)
          ? state.trace.pointerType
          : undefined,
        alternatives: 5,
      };
      Object.keys(hints).forEach((key) => {
        if (hints[key] === undefined) {
          delete hints[key];
        }
      });
      try {
        state.trace.nativeDrawing = state.nativeRecognizer.startDrawing(hints);
      } catch {
        state.trace.nativeDrawing = state.nativeRecognizer.startDrawing({
          recognitionType: "text",
          alternatives: 5,
        });
      }
    }

    state.trace.nativeDrawing.clear();
    for (const stroke of state.trace.strokes) {
      const recognitionStroke = compressStrokeForRecognition(stroke);
      if (recognitionStroke.length === 0) {
        continue;
      }
      const nativeStroke = new HandwritingStroke();
      recognitionStroke.forEach((point) => {
        nativeStroke.addPoint({ x: point.x, y: point.y, t: point.t || 0 });
      });
      state.trace.nativeDrawing.addStroke(nativeStroke);
    }
    return state.trace.nativeDrawing;
  }

  async function recognizeTraceWithNative() {
    const drawing = ensureTraceNativeDrawing();
    if (!drawing) {
      return [];
    }
    try {
      const predictions = await drawing.getPrediction();
      return normalizeCandidates(predictions?.map((prediction) => prediction?.text) || []);
    } catch {
      resetTraceNativeDrawing();
      return [];
    }
  }

  async function recognizeTraceWithGoogle(strokes = state.trace.strokes) {
    const guide = getTraceCanvasSize();
    const payload = {
      device: navigator.userAgent,
      options: "enable_pre_space",
      requests: [
        {
          writing_guide: {
            writing_area_width: Math.max(1, Math.round(guide.width)),
            writing_area_height: Math.max(1, Math.round(guide.height)),
          },
          ink: buildGoogleInk(strokes),
          language: "ja",
        },
      ],
    };

    cancelGoogleRecognition(state.trace);
    const controller = new AbortController();
    state.trace.googleAbortController = controller;
    try {
      for (const transport of getGoogleTransports()) {
        if (controller.signal.aborted) {
          return [];
        }
        try {
          const data = await postGooglePayload(
            transport.url,
            payload,
            transport.contentType,
            controller.signal,
          );
          const candidates = extractCandidatesFromGoogleResponse(data);
          if (candidates.length > 0) {
            preferredGoogleTransport = transport;
            state.trace.googleFailed = false;
            return candidates;
          }
        } catch (error) {
          if (controller.signal.aborted || error?.name === "AbortError") {
            return [];
          }
        }
      }
    } finally {
      if (state.trace.googleAbortController === controller) {
        state.trace.googleAbortController = null;
      }
    }
    state.trace.googleFailed = true;
    return [];
  }

  function normalizeTraceCandidates(candidates) {
    const answerIsHiragana = isHiraganaOnlyText(state.trace.answer);
    const seen = new Set();
    const normalized = [];
    (Array.isArray(candidates) ? candidates : []).forEach((candidate) => {
      let text = String(candidate || "").normalize("NFKC").trim();
      if (answerIsHiragana) {
        text = katakanaToHiragana(text);
      } else if (getCharacterLength(text) === 1) {
        text = EDUCATIONAL_GLYPH_NORMALIZATION[text] || text;
      }
      if (text && !seen.has(text)) {
        seen.add(text);
        normalized.push(text);
      }
    });
    return normalized;
  }

  function selectTraceCandidate(candidates) {
    const target = normalizeComparableText(state.trace.answer);
    const usable = normalizeTraceCandidates(candidates)
      .filter(isJapaneseCandidate)
      .map((text, index) => ({
        text,
        index,
        normalized: normalizeComparableText(text),
      }));
    const exact = usable.find((entry) => entry.normalized === target);
    if (exact) {
      return exact.text;
    }
    usable.sort((a, b) => {
      const aDistance = Math.abs(getCharacterLength(a.normalized) - getCharacterLength(target));
      const bDistance = Math.abs(getCharacterLength(b.normalized) - getCharacterLength(target));
      return aDistance - bDistance || a.index - b.index;
    });
    return usable[0]?.text || "";
  }

  function traceCandidatesContainTarget(candidates) {
    const target = normalizeComparableText(state.trace.answer);
    return normalizeTraceCandidates(candidates).some((text) =>
      normalizeComparableText(text) === target
    );
  }

  function scheduleTraceRecognition(delay = TRACE_RECOGNITION_DELAY_MS) {
    window.clearTimeout(state.trace.recognitionTimer);
    if (!hasMeaningfulTraceInk()) {
      setTraceRecognition(
        state.trace.strokes.length > 0 ? "候補なし" : "フリー",
        "idle",
        state.trace.strokes.length > 0 ? "もう少し大きく書いてください" : "",
      );
      return;
    }
    setTraceRecognition("認識中…", "recognizing", "");
    state.trace.recognitionTimer = window.setTimeout(runTraceRecognition, delay);
  }

  async function runTraceRecognition() {
    if (!hasMeaningfulTraceInk() || traceOverlay.hidden) {
      return;
    }
    if (state.trace.isRecognizing) {
      state.trace.needsRecognition = true;
      return;
    }

    state.trace.isRecognizing = true;
    const serial = ++state.trace.recognitionSerial;
    try {
      const fingerprint = `${normalizeComparableText(state.trace.answer)}:${getStrokesFingerprint(state.trace.strokes)}`;
      let text = "";
      if (state.trace.recognitionCache.fingerprint === fingerprint) {
        text = state.trace.recognitionCache.text;
      } else {
        const nativeCandidates = await recognizeTraceWithNative();
        const combinedCandidates = [...nativeCandidates];

        if (!traceCandidatesContainTarget(combinedCandidates)) {
          const googleRawCandidates = await recognizeTraceWithGoogle(state.trace.strokes);
          combinedCandidates.push(...googleRawCandidates);
        }

        const guide = getTraceCanvasSize();
        if (!traceCandidatesContainTarget(combinedCandidates)) {
          const normalizedStrokes = normalizeStrokesToGuide(state.trace.strokes, guide);
          const googleNormalizedCandidates = await recognizeTraceWithGoogle(normalizedStrokes);
          combinedCandidates.push(...googleNormalizedCandidates);
        }

        if (!traceCandidatesContainTarget(combinedCandidates)) {
          const repairVariants = createRecognitionRepairVariants(
            state.trace.strokes,
            guide,
            {
              freeMode: isKanaOnly(state.trace.answer) ||
                getCharacterLength(state.trace.answer) > 1,
            },
          );
          for (const repair of repairVariants) {
            const repairCandidates = await recognizeTraceWithGoogle(repair.strokes);
            combinedCandidates.push(...repairCandidates);
            if (traceCandidatesContainTarget(combinedCandidates)) {
              break;
            }
          }
        }

        text = selectTraceCandidate(combinedCandidates);
        if (text) {
          state.trace.recognitionCache = { fingerprint, text };
        }
      }

      if (serial !== state.trace.recognitionSerial || traceOverlay.hidden || !hasMeaningfulTraceInk()) {
        return;
      }

      if (!text) {
        setTraceRecognition(
          state.trace.googleFailed ? "接続できません" : "候補なし",
          "idle",
          state.trace.googleFailed ? "認識サービスに接続できません" : "書き直して確認してください",
        );
        return;
      }

      const correct = normalizeComparableText(text) === normalizeComparableText(state.trace.answer);
      setTraceRecognition(
        text,
        correct ? "correct" : "incorrect",
        correct ? "模範解答と一致しています" : "模範解答と異なります",
      );
    } finally {
      state.trace.isRecognizing = false;
      if (state.trace.needsRecognition && !traceOverlay.hidden) {
        state.trace.needsRecognition = false;
        scheduleTraceRecognition(TRACE_RECOGNITION_DELAY_MS);
      }
    }
  }

  function beginTraceStroke(event) {
    event.preventDefault();
    cancelTraceRecognition();
    state.trace.pointerType = event.pointerType || "";
    state.trace.strokeStartTime = performance.now();
    state.trace.activePointerId = event.pointerId;
    state.trace.activeStroke = [];
    state.trace.lastPoint = null;
    state.trace.strokes.push(state.trace.activeStroke);
    traceCanvas.setPointerCapture?.(event.pointerId);
    addTracePoint(event);
    traceUndoButton.disabled = false;
  }

  function addTracePoint(event) {
    if (event.pointerId !== state.trace.activePointerId || !state.trace.activeStroke) {
      return;
    }
    const point = {
      ...getTraceCanvasCoordinates(event),
      t: Math.round(performance.now() - state.trace.strokeStartTime),
    };
    state.trace.activeStroke.push(point);
    drawTraceStrokePoint(point, state.trace.lastPoint);
    state.trace.lastPoint = point;
  }

  function continueTraceStroke(event) {
    if (event.pointerId !== state.trace.activePointerId) {
      return;
    }
    event.preventDefault();
    const samples = typeof event.getCoalescedEvents === "function"
      ? event.getCoalescedEvents()
      : [event];
    samples.forEach(addTracePoint);
  }

  function finishTraceStroke(event) {
    if (event.pointerId !== state.trace.activePointerId) {
      return;
    }
    event.preventDefault();
    if (state.trace.activeStroke && state.trace.activeStroke.length === 1) {
      const first = state.trace.activeStroke[0];
      state.trace.activeStroke.push({ x: first.x + 0.01, y: first.y + 0.01 });
    }
    state.trace.activePointerId = null;
    state.trace.activeStroke = null;
    state.trace.lastPoint = null;
    drawTraceCanvas();
    scheduleTraceRecognition();
  }

  function undoTraceStroke() {
    if (state.trace.strokes.length === 0) {
      return;
    }
    cancelTraceRecognition();
    state.trace.strokes.pop();
    drawTraceCanvas();
    scheduleTraceRecognition();
  }

  function clearTracePad() {
    cancelTraceRecognition();
    state.trace.strokes.length = 0;
    state.trace.activePointerId = null;
    state.trace.activeStroke = null;
    state.trace.lastPoint = null;
    drawTraceCanvas();
    setTraceRecognition("フリー", "idle", "");
  }

  function openTracePractice() {
    const item = state.session[state.explanationIndex];
    if (!item) {
      return;
    }
    cancelTraceRecognition();
    state.trace.itemIndex = state.explanationIndex;
    state.trace.answer = item.question.answer;
    state.trace.strokes = [];
    state.trace.activePointerId = null;
    state.trace.activeStroke = null;
    state.trace.lastPoint = null;
    state.trace.canvasCssSize = { width: 0, height: 0 };
    state.trace.recognizedText = "";
    state.trace.recognitionCache = { fingerprint: "", text: "" };
    state.trace.googleFailed = false;
    setTraceRecognition("フリー", "idle", "");
    traceOverlay.dataset.layout = state.settings.layout;
    traceOverlay.dataset.handedness = state.settings.handedness;
    traceOverlay.dataset.portableRotated = "false";
    renderTraceQuestion(item.question);
    explanationOverlay.hidden = true;
    traceOverlay.hidden = false;
    scheduleTraceLayoutFit();
    window.requestAnimationFrame(() => traceOkButton.focus({ preventScroll: true }));
  }

  function closeTracePractice() {
    if (traceOverlay.hidden) {
      return;
    }
    cancelTraceRecognition();
    traceOverlay.hidden = true;
    state.trace.activePointerId = null;
    state.trace.activeStroke = null;
    state.trace.lastPoint = null;
    traceSurface.style.removeProperty("width");
    traceSurface.style.removeProperty("height");
    scheduleLayoutFit();
    const row = resultList.querySelector(`.result-row[data-index="${state.trace.itemIndex}"]`);
    row?.focus?.({ preventScroll: true });
  }

  function applySettings(nextSettings = state.settings) {
    state.settings = {
      layout: ["horizontal", "vertical-wide", "vertical-portable"].includes(nextSettings.layout)
        ? nextSettings.layout
        : "horizontal",
      handedness: nextSettings.handedness === "left" ? "left" : "right",
    };
    app.dataset.layout = state.settings.layout;
    app.dataset.handedness = state.settings.handedness;
    layoutSelect.value = state.settings.layout;
    document.querySelectorAll('input[name="handedness"]').forEach((radio) => {
      radio.checked = radio.value === state.settings.handedness;
    });
    try {
      localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(state.settings));
    } catch {
      // Keep the in-memory setting when storage is unavailable.
    }
    traceOverlay.dataset.layout = state.settings.layout;
    traceOverlay.dataset.handedness = state.settings.handedness;
    syncExplanationLayout();
    scheduleLayoutFit();
    if (!traceOverlay.hidden) {
      scheduleTraceLayoutFit();
    }
  }

  function setSettingsOpen(isOpen) {
    settingsOverlay.hidden = !isOpen;
    if (isOpen) {
      settingsCloseButton.focus({ preventScroll: true });
    } else {
      settingsButton.focus({ preventScroll: true });
    }
  }

  async function init() {
    applyEducationalFontChoice();
    const title = String(quizPackage.title || "DigiCanji").trim() || "DigiCanji";
    document.title = title;
    appTitle.textContent = title;
    state.questions = embeddedQuestionRows
      .map((row, index) => createQuestion(row, index))
      .filter(Boolean);

    applySettings(initialSettings);
    updateRecognitionDiagnosticsUi();
    startSession();
    state.nativeRecognizer = await createNativeRecognizer();
    updateActionButtons();
    setBusy(false);
    const record = getActiveInputRecord();
    if (!record.text && record.strokes.length === 0) {
      setResult(messages.empty, "message");
    }
    scheduleLayoutFit();
    if (document.fonts?.ready) {
      document.fonts.ready.then(() => {
        applyEducationalFontChoice();
        renderResultArea();
        scheduleLayoutFit();
        if (!traceOverlay.hidden) {
          drawTraceCanvas();
          scheduleTraceLayoutFit();
        }
      }).catch(() => {});
    }
  }

  function preventCanvasGesture(event) {
    event.preventDefault();
  }

  function isEditableTarget(target) {
    if (!(target instanceof Element)) {
      return false;
    }
    return Boolean(target.closest('input, textarea, select, [contenteditable="true"]'));
  }

  function handleKeyboardReviewToggle() {
    setReviewMenuOpen(reviewMenu.hidden);
    if (!reviewMenu.hidden) {
      const currentItem = reviewMenu.querySelector(`.review-item[data-index="${state.currentQuestionIndex}"]`);
      currentItem?.focus?.({ preventScroll: true });
    }
  }

  function getQuestionIndexFromNumberKey(key) {
    if (!/^[0-9]$/.test(key)) {
      return -1;
    }
    return key === "0" ? 9 : Number(key) - 1;
  }

  function handleKeyDown(event) {
    if (event.key === "Escape") {
      if (!traceOverlay.hidden) {
        closeTracePractice();
      } else if (!explanationOverlay.hidden) {
        closeExplanation();
      } else if (!settingsOverlay.hidden) {
        setSettingsOpen(false);
      } else if (!reviewMenu.hidden) {
        setReviewMenuOpen(false);
      }
      return;
    }

    if (event.isComposing || isEditableTarget(event.target)) {
      return;
    }

    if (!traceOverlay.hidden) {
      if (event.key.toLowerCase() === "z") {
        event.preventDefault();
        undoTraceStroke();
      } else if (event.key === "Enter") {
        event.preventDefault();
        closeTracePractice();
      }
      return;
    }

    if (learningScreen.hidden || !explanationOverlay.hidden || !settingsOverlay.hidden) {
      return;
    }

    const questionIndex = getQuestionIndexFromNumberKey(event.key);
    if (questionIndex >= 0 && questionIndex < state.session.length) {
      event.preventDefault();
      goToProblem(questionIndex);
      return;
    }

    if (event.key.toLowerCase() === "z") {
      event.preventDefault();
      undoLastStroke();
      return;
    }

    if (!isVerticalLayout()) {
      if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
        event.preventDefault();
        moveSlot(event.key === "ArrowLeft" ? -1 : 1);
        return;
      }
      if (event.key === "ArrowUp") {
        event.preventDefault();
        handleKeyboardReviewToggle();
        return;
      }
      if (event.key === "ArrowDown") {
        event.preventDefault();
        setReviewMenuOpen(false);
        handleAdvance();
      }
      return;
    }

    if (event.key === "ArrowUp" || event.key === "ArrowDown") {
      event.preventDefault();
      moveSlot(event.key === "ArrowUp" ? -1 : 1);
      return;
    }

    const advanceKey = state.settings.handedness === "left" ? "ArrowRight" : "ArrowLeft";
    const reviewKey = state.settings.handedness === "left" ? "ArrowLeft" : "ArrowRight";

    if (event.key === advanceKey) {
      event.preventDefault();
      setReviewMenuOpen(false);
      handleAdvance();
      return;
    }

    if (event.key === reviewKey) {
      event.preventDefault();
      handleKeyboardReviewToggle();
    }
  }

  canvas.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    prepareStroke(event);
  });
  canvas.addEventListener("pointermove", continueStroke);
  canvas.addEventListener("pointerup", finishStroke);
  canvas.addEventListener("pointercancel", finishStroke);
  canvas.addEventListener("dblclick", preventCanvasGesture);
  canvas.addEventListener("contextmenu", preventCanvasGesture);
  canvas.addEventListener("selectstart", preventCanvasGesture);
  canvas.addEventListener("dragstart", preventCanvasGesture);
  ["touchstart", "touchmove", "touchend", "touchcancel"].forEach((type) => {
    canvas.addEventListener(type, preventCanvasGesture, { passive: false });
  });

  undoButton.addEventListener("click", undoLastStroke);
  clearButton.addEventListener("click", clearPad);
  advanceButton.addEventListener("click", handleAdvance);
  resultBox.addEventListener("click", (event) => {
    const slot = event.target.closest(".character-slot");
    if (!slot) {
      return;
    }
    const index = Number(slot.dataset.index);
    if (Number.isInteger(index)) {
      const delta = index - state.activeSlotIndex;
      moveSlot(delta);
    }
  });
  resultBox.addEventListener("keydown", (event) => {
    const slot = event.target.closest(".character-slot");
    if (!slot || !["Enter", " "].includes(event.key)) {
      return;
    }
    event.preventDefault();
    const index = Number(slot.dataset.index);
    if (Number.isInteger(index)) {
      moveSlot(index - state.activeSlotIndex);
    }
  });

  reviewButton.addEventListener("click", () => setReviewMenuOpen(reviewMenu.hidden));
  reviewMenu.addEventListener("click", (event) => {
    const item = event.target.closest(".review-item");
    if (!item) {
      return;
    }
    goToProblem(Number(item.dataset.index));
  });

  settingsButton.addEventListener("click", () => setSettingsOpen(true));
  settingsCloseButton.addEventListener("click", () => setSettingsOpen(false));
  settingsOverlay.addEventListener("click", (event) => {
    if (event.target === settingsOverlay) {
      setSettingsOpen(false);
    }
  });
  layoutSelect.addEventListener("change", () => {
    applySettings({ ...state.settings, layout: layoutSelect.value });
  });
  document.querySelectorAll('input[name="handedness"]').forEach((radio) => {
    radio.addEventListener("change", () => {
      if (radio.checked) {
        applySettings({ ...state.settings, handedness: radio.value });
      }
    });
  });

  clearStatsButton.addEventListener("click", () => {
    if (!window.confirm("累計出題回数と正解数を消去しますか？")) {
      return;
    }
    state.stats = {};
    state.questions.forEach((question) => {
      question.totalAttempts = 0;
      question.correctCount = 0;
    });
    try {
      localStorage.removeItem(STORAGE_KEYS.stats);
    } catch {
      // Ignore storage failures.
    }
    setSettingsOpen(false);
    startSession();
  });

  exportRecognitionDiagnosticsButton?.addEventListener("click", downloadRecognitionCorpus);
  clearRecognitionDiagnosticsButton?.addEventListener("click", () => {
    if (!window.confirm("端末内の認識診断記録を消去しますか？")) {
      return;
    }
    clearRecognitionCorpus();
  });
  importRecognitionCorpusButton?.addEventListener("click", () => {
    recognitionCorpusFileInput?.click();
  });
  recognitionCorpusFileInput?.addEventListener("change", () => {
    importRecognitionCorpusFile(recognitionCorpusFileInput.files?.[0]);
  });
  replayRecognitionCorpusButton?.addEventListener("click", replayImportedRecognitionCorpus);

  resultList.addEventListener("click", (event) => {
    const row = event.target.closest(".result-row");
    if (row) {
      openExplanation(Number(row.dataset.index));
    }
  });
  traceNowButton.addEventListener("click", (event) => {
    event.stopPropagation();
    openTracePractice();
  });
  explanationCloseButton.addEventListener("click", (event) => {
    event.stopPropagation();
    closeExplanation();
  });
  explanationOverlay.addEventListener("click", closeExplanation);

  traceCanvas.addEventListener("pointerdown", beginTraceStroke);
  traceCanvas.addEventListener("pointermove", continueTraceStroke);
  traceCanvas.addEventListener("pointerup", finishTraceStroke);
  traceCanvas.addEventListener("pointercancel", finishTraceStroke);
  traceCanvas.addEventListener("dblclick", preventCanvasGesture);
  traceCanvas.addEventListener("contextmenu", preventCanvasGesture);
  traceCanvas.addEventListener("selectstart", preventCanvasGesture);
  traceCanvas.addEventListener("dragstart", preventCanvasGesture);
  ["touchstart", "touchmove", "touchend", "touchcancel"].forEach((type) => {
    traceCanvas.addEventListener(type, preventCanvasGesture, { passive: false });
  });
  traceUndoButton.addEventListener("click", undoTraceStroke);
  traceClearButton.addEventListener("click", clearTracePad);
  traceOkButton.addEventListener("click", closeTracePractice);

  retryButton.addEventListener("click", startSession);
  document.addEventListener("pointerdown", (event) => {
    if (!reviewMenu.hidden && !event.target.closest(".review-control")) {
      setReviewMenuOpen(false);
    }
  });
  window.addEventListener("keydown", handleKeyDown);
  window.addEventListener("resize", scheduleLayoutFit);
  window.addEventListener("resize", scheduleTraceLayoutFit);
  window.addEventListener("pagehide", () => {
    cancelGoogleRecognition(state);
    cancelTraceRecognition();
    state.nativeRecognizer?.finish?.();
  });

  new ResizeObserver(scheduleLayoutFit).observe(screenShell);
  new ResizeObserver(scheduleTraceLayoutFit).observe(traceDialog);
  init();
})();

</script>
</body>
</html>
