<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DigiCanji Editor v1.9.0</title>
<meta name="application-version" content="1.9.0">
<style>
:root{
  color-scheme:light;
  --bg:#f4f6f8;--surface:#fff;--surface-soft:#f8fafb;--ink:#24282c;--muted:#6f7882;
  --line:#dbe1e7;--line-strong:#bec8d2;--accent:#d98d35;--accent-soft:#fff5e8;
  --good:#3b8d52;--good-soft:#edf8f0;--bad:#b34343;--bad-soft:#fff0f0;
  --shadow:0 18px 48px rgba(31,45,61,.09);--radius:18px;
  font-family:"BIZ UDPGothic","Yu Gothic UI","Meiryo",system-ui,sans-serif;
}
*{box-sizing:border-box} html,body{height:100%} body{margin:0;background:linear-gradient(#fafbfc,var(--bg));color:var(--ink);overflow:hidden}
button,input{font:inherit} button{border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);padding:.65rem .9rem;cursor:pointer;font-weight:700}
button:hover{border-color:var(--line-strong);box-shadow:0 8px 20px rgba(31,45,61,.08)} button:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
button.primary{background:linear-gradient(#eda958,#d98d35);border-color:#cf7f23;color:#fff;box-shadow:0 10px 24px rgba(217,141,53,.24)}
.app{height:100%;display:grid;grid-template-rows:auto minmax(0,1fr)}
.header{padding:14px clamp(14px,2.5vw,28px);border-bottom:1px solid var(--line);background:rgba(255,255,255,.9);backdrop-filter:blur(10px);z-index:5}
.header-top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:center}
h1{margin:0;font-size:clamp(1.25rem,2.4vw,1.8rem)} .sub{margin:.15rem 0 0;color:var(--muted);font-size:.86rem}
.version{color:var(--muted);font-size:.78rem;white-space:nowrap}.toolbar{margin-top:12px;display:grid;grid-template-columns:minmax(260px,1fr) minmax(180px,.5fr) auto;gap:10px;align-items:end}
.field{display:grid;gap:4px}.field label{font-size:.74rem;color:var(--muted);font-weight:700}.field input{width:100%;border:1px solid var(--line);border-radius:12px;padding:.66rem .78rem;background:#fff;outline:none}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(217,141,53,.15)}.actions{display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}.status{margin-top:9px;display:flex;gap:7px;flex-wrap:wrap}
.badge{padding:.28rem .58rem;border-radius:999px;border:1px solid var(--line);background:var(--surface-soft);color:var(--muted);font-size:.77rem;font-weight:700}.badge.good{background:var(--good-soft);border-color:#cde7d4;color:var(--good)}.badge.bad{background:var(--bad-soft);border-color:#efcaca;color:var(--bad)}
.workarea{min-height:0;display:grid;grid-template-columns:minmax(0,1fr) minmax(280px,360px);gap:14px;padding:14px clamp(12px,2vw,22px) 18px}.panel{min-height:0;border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.94);box-shadow:var(--shadow);overflow:hidden}.table-panel{display:grid;grid-template-rows:auto minmax(0,1fr)}
.panel-head{padding:11px 13px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px;align-items:center}.panel-head h2{margin:0;font-size:.95rem}.hint{color:var(--muted);font-size:.75rem}.table-wrap{min-height:0;overflow:auto;background:#fff}
table{border-collapse:separate;border-spacing:0;min-width:1080px;width:100%;table-layout:fixed;font-size:.86rem}th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}thead th{position:sticky;top:0;z-index:3;background:#f0f3f6;color:#4f5964;text-align:left;padding:.48rem .5rem}.row-head{position:sticky;left:0;z-index:2;width:48px;background:#f0f3f6;color:#78828c;text-align:center;font-variant-numeric:tabular-nums}.row-head button{width:24px;height:24px;padding:0;border:0;background:transparent;color:#a5acb4;box-shadow:none}.row-head button:hover{color:var(--bad);background:var(--bad-soft)}
td[contenteditable]{height:39px;padding:.38rem .5rem;vertical-align:top;outline:none;white-space:pre-wrap;overflow-wrap:anywhere;background:#fff}td[contenteditable]:empty{background:#fafbfc}td[contenteditable]:focus{box-shadow:inset 0 0 0 2px var(--accent);z-index:1;position:relative}tr.is-selected td{background-color:#fffcf6}tr.has-error .row-head{background:var(--bad-soft);color:var(--bad)}td.is-error{background:var(--bad-soft)!important;box-shadow:inset 0 0 0 1px #e6a4a4}
.col-front{width:170px}.col-prompt{width:145px}.col-back{width:220px}.col-answer{width:170px}.col-explanation{width:325px}
.preview-panel{display:grid;grid-template-rows:auto minmax(0,1fr) auto}.preview-body{min-height:0;overflow:auto;padding:16px}.preview-card{min-height:260px;border:1px solid var(--line);border-radius:18px;padding:18px;background:linear-gradient(#fff,#fbfcfd);display:grid;align-content:center;gap:18px}.preview-question{text-align:center;font-size:clamp(1.15rem,2.4vw,1.55rem);font-weight:800;line-height:1.7}.preview-prompt{border-bottom:3px solid #e0b34f;font-family:"Yu Mincho",serif;font-weight:900;letter-spacing:.08em}.preview-answer{display:flex;justify-content:center;gap:5px;min-height:64px}.preview-slot{width:54px;height:64px;border:1px solid var(--line-strong);border-radius:10px;display:grid;place-items:center;color:#344;font-size:1.6rem;font-weight:800;background:#f8faf9}.preview-explanation{color:var(--muted);font-size:.85rem;line-height:1.65;border-top:1px solid var(--line);padding-top:12px}.preview-errors{display:grid;gap:6px;padding:10px 12px;border:1px solid #efcaca;border-radius:12px;background:var(--bad-soft);color:var(--bad);font-size:.8rem;font-weight:700;line-height:1.5}.preview-free{min-width:180px;width:auto;padding:0 18px;position:relative}.preview-free::after{content:"フリー";position:absolute;right:8px;bottom:5px;color:var(--muted);font-size:.62rem;letter-spacing:.08em}.empty{color:var(--muted);text-align:center;padding:40px 8px}.preview-foot{border-top:1px solid var(--line);padding:10px 13px;color:var(--muted);font-size:.76rem;line-height:1.55}
.toast{position:fixed;right:18px;bottom:18px;z-index:30;padding:.75rem 1rem;border-radius:12px;background:#24282c;color:#fff;box-shadow:0 14px 36px rgba(0,0,0,.22);opacity:0;transform:translateY(8px);pointer-events:none;transition:.18s}.toast.show{opacity:1;transform:translateY(0)}
input[type=file]{display:none}
@media(max-width:880px){body{overflow:auto}.app{height:auto;min-height:100%}.toolbar{grid-template-columns:1fr 1fr}.actions{grid-column:1/-1;justify-content:flex-start}.workarea{grid-template-columns:1fr}.panel{min-height:420px}.preview-panel{min-height:430px}}
</style>
</head>
<body>
<div class="app">
<header class="header">
  <div class="header-top"><div><h1>DigiCanji Editor</h1><p class="sub">問題データを編集し、配布用の単一HTMLを生成します。</p></div><div class="version">Editor v1.9.0 / Player v1.9.0</div></div>
  <div class="toolbar">
    <div class="field"><label for="quizTitle">クイズタイトル</label><input id="quizTitle" value="DigiCanji" maxlength="80"></div>
    <div class="field"><label for="quizId">クイズID（学習記録の識別用）</label><input id="quizId" value="digicanji-demo-v1" maxlength="80"></div>
    <div class="actions">
      <button id="btnProjectLoad">プロジェクト読込</button><button id="btnProjectSave">プロジェクト保存</button>
      <button id="btnCsvLoad">CSV読込</button><button id="btnCsvSave">CSV保存</button>
      <button id="btnGenerate" class="primary">HTML生成</button>
    </div>
  </div>
  <div class="status"><span id="statusRows" class="badge">0問</span><span id="statusValid" class="badge good">有効 0問</span><span id="statusErrors" class="badge">エラー 0件</span><span class="badge">最大1000問</span><span class="badge">列順：前部／問部／後部／解答／解説</span></div>
</header>
<main class="workarea">
  <section class="panel table-panel"><div class="panel-head"><h2>問題一覧</h2><span class="hint">表計算ソフトから複数セルを貼り付けできます。Enterで次の行へ移動します。</span></div><div class="table-wrap"><table id="grid"><thead><tr><th class="row-head">#</th><th class="col-front">前部</th><th class="col-prompt">問部</th><th class="col-back">後部</th><th class="col-answer">解答</th><th class="col-explanation">解説</th></tr></thead><tbody></tbody></table></div></section>
  <aside class="panel preview-panel"><div class="panel-head"><h2>プレビュー</h2><span id="previewNumber" class="hint">—</span></div><div id="previewBody" class="preview-body"></div><div class="preview-foot">解答には、ひらがなと漢字だけを使用します。解答がひらがなのみの場合、プレイヤーでは認識枠が「フリー」になります。</div></aside>
</main>
</div>
<input id="projectFile" type="file" accept=".json,.digicanji.json,application/json"><input id="csvFile" type="file" accept=".csv,text/csv">
<div id="toast" class="toast"></div>

const KEYS=['front','prompt','back','answer','explanation'];
const ROW_COUNT=1000;
const SAMPLE=[
 {front:'改善を',prompt:'ハカル',back:'。',answer:'図る',explanation:'しようと考えること'},
 {front:'',prompt:'アツイ',back:'本を読む。',answer:'厚い',explanation:'物を横から見たときの幅がある'},
 {front:'選手の',prompt:'コウタイ',back:'を知らせる。',answer:'交代',explanation:'人の役割などを入れ替えること'}
];

function clean(v){return String(v??'').replace(/\r/g,'').trim()}
function normalized(v){return clean(v).normalize('NFKC').replace(/[\s\u3000]+/g,'')}
function isHiraganaOnly(v){return /^[\u3041-\u3096\u309d\u309e]+$/u.test(normalized(v))}
function isAllowedAnswer(v){return /^[\u3041-\u3096\u309d\u309e\u3400-\u4dbf\u4e00-\u9fff\uf900-\ufaff]+$/u.test(normalized(v))}
function rowHasData(r){return KEYS.some(k=>clean(r[k]))}
function rowIssues(r){
 const issues=[]; if(!rowHasData(r)) return issues;
 const prompt=clean(r.prompt),answer=clean(r.answer);
 if(!prompt) issues.push({fields:['prompt'],message:'問部を入力してください。'});
 if(!answer) issues.push({fields:['answer'],message:'解答を入力してください。'});
 if(answer&&!isAllowedAnswer(answer)) issues.push({fields:['answer'],message:'解答には、ひらがなと漢字だけを使用してください。'});
 if(prompt&&answer&&normalized(prompt)===normalized(answer)) issues.push({fields:['prompt','answer'],message:'問部と解答が同じです。'});
 return issues;
}
function rowErrors(r){return rowIssues(r).map(issue=>issue.message)}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function onCellKeyDown(e){const td=e.currentTarget;const i=+td.dataset.row;const c=KEYS.indexOf(td.dataset.key);if(e.key==='Enter'&&!e.altKey){e.preventDefault();focusCell(Math.max(0,Math.min(ROW_COUNT-1,i+(e.shiftKey?-1:1))),c)}else if((e.key==='Delete'||e.key==='Backspace')&&e.metaKey){e.preventDefault();clearRow(i)}}

function selectRow(i){selectedRow=i;tbody.querySelectorAll('tr').forEach((tr,n)=>tr.classList.toggle('is-selected',n===i));renderPreview()}
function clearRow(i){rows[i]={};renderGrid();selectRow(i);saveAutosave()}
function validateAndRender(){let active=0,valid=0,errors=0;tbody.querySelectorAll('tr').forEach((tr,i)=>{const issues=rowIssues(rows[i]);const has=rowHasData(rows[i]);if(has)active++;if(has&&!issues.length)valid++;errors+=issues.length;tr.classList.toggle('has-error',issues.length>0);KEYS.forEach(k=>{const td=tr.querySelector(`td[data-key="${k}"]`);const fieldIssues=issues.filter(issue=>issue.fields.includes(k));td?.classList.toggle('is-error',fieldIssues.length>0);if(td)td.title=fieldIssues.map(issue=>issue.message).join('\n')})});$('statusRows').textContent=`入力 ${active}問`;$('statusValid').textContent=`有効 ${valid}問`;$('statusErrors').textContent=`エラー ${errors}件`;$('statusErrors').className=`badge ${errors?'bad':''}`;$('btnGenerate').disabled=!valid||errors>0||!clean($('quizTitle').value);renderPreview()}
function renderPreview(){const r=rows[selectedRow]||{};$('previewNumber').textContent=`${selectedRow+1}行目`;if(!rowHasData(r)){$('previewBody').innerHTML='<div class="empty">この行は空です。</div>';return}const issues=rowIssues(r);const answerText=clean(r.answer);const free=isHiraganaOnly(answerText);const answer=Array.from(answerText);const errorHtml=issues.length?`<div class="preview-errors">${issues.map(issue=>`<div>${escapeHtml(issue.message)}</div>`).join('')}</div>`:'';const answerHtml=free?`<span class="preview-slot preview-free">${escapeHtml(answerText)}</span>`:(answer.length?answer:['']).map(ch=>`<span class="preview-slot">${escapeHtml(ch)}</span>`).join('');$('previewBody').innerHTML=`<div class="preview-card">${errorHtml}<div class="preview-question">${escapeHtml(r.front||'')}<span class="preview-prompt">${escapeHtml(r.prompt||'（問部未入力）')}</span>${escapeHtml(r.back||'')}</div><div class="preview-answer">${answerHtml}</div><div class="preview-explanation">${escapeHtml(r.explanation||'解説未入力')}</div></div>`}
function validQuestions(){return rows.filter(r=>rowHasData(r)&&!rowIssues(r).length).map(r=>Object.fromEntries(KEYS.map(k=>[k,clean(r[k])]))) }
function csvEscape(v){const s=String(v??'');return /[",\n\r]/.test(s)?`"${s.replace(/"/g,'""')}"`:s}
function toCsv(){return '\uFEFF'+[['前部','問部','後部','解答','解説'],...validQuestions().map(r=>KEYS.map(k=>r[k]))].map(a=>a.map(csvEscape).join(',')).join('\r\n')}
function parseCsv(text){const s=String(text).replace(/^\uFEFF/,'');let out=[],row=[],cell='',q=false;for(let i=0;i<s.length;i++){const ch=s[i],n=s[i+1];if(q){if(ch==='"'&&n==='"'){cell+='"';i++}else if(ch==='"')q=false;else cell+=ch}else if(ch==='"')q=true;else if(ch===','){row.push(cell);cell=''}else if(ch==='\n'){row.push(cell.replace(/\r$/,''));out.push(row);row=[];cell=''}else cell+=ch}if(cell||row.length){row.push(cell.replace(/\r$/,''));out.push(row)}const head=out[0]?.slice(0,5).map(clean);if(head?.join('|')==='前部|問部|後部|解答|解説')out.shift();return out.filter(a=>a.some(v=>clean(v))).map(a=>Object.fromEntries(KEYS.map((k,i)=>[k,a[i]||''])))}
function download(name,content,type='text/plain;charset=utf-8'){const url=URL.createObjectURL(new Blob([content],{type}));const a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
function safeName(s){return clean(s).replace(/[\\/:*?"<>|]/g,'_').slice(0,60)||'DigiCanji'}
function decodeTemplate(){const bin=atob(PLAYER_TEMPLATE_B64);const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));return new TextDecoder().decode(bytes)}
function autoQuizId(title,questions){let h=2166136261;for(const ch of title+JSON.stringify(questions)){h^=ch.codePointAt(0);h=Math.imul(h,16777619)}return `digicanji-${(h>>>0).toString(36)}`}
function generateHtml(){validateAndRender();if($('btnGenerate').disabled){toast('入力エラーとタイトルを確認してください。');return}const title=clean($('quizTitle').value);const questions=validQuestions();const data={quizId:clean($('quizId').value)||autoQuizId(title,questions),title,questions};let html=decodeTemplate();const json=JSON.stringify(data,null,2).replace(/<\/script/gi,'<\\/script');html=html.replace(/(<script id="digicanji-quiz-data" type="application\/json">)[\s\S]*?(<\/script>)/,`$1\n${json}\n    $2`);html=html.replace(/<title>[\s\S]*?<\/title>/,`<title>${escapeHtml(title)}</title>`);html=html.replace(/(<h1 id="app-title" class="app-title">)[\s\S]*?(<\/h1>)/,`$1${escapeHtml(title)}$2`);download(`${safeName(title)}.html`,html,'text/html;charset=utf-8');toast(`${questions.length}問のHTMLを生成しました。`)}
function saveProject(){const obj={format:'digicanji-project',version:1,title:clean($('quizTitle').value),quizId:clean($('quizId').value),questions:rows.filter(rowHasData)};download(`${safeName(obj.title)}.digicanji.json`,JSON.stringify(obj,null,2),'application/json;charset=utf-8');toast('編集用プロジェクトを保存しました。')}
function loadProjectFile(file){file.text().then(t=>{const o=JSON.parse(t);if(!Array.isArray(o.questions))throw new Error();$('quizTitle').value=o.title||'DigiCanji';$('quizId').value=o.quizId||'';rows=Array.from({length:ROW_COUNT},(_,i)=>({...o.questions[i]}));renderGrid();saveAutosave();toast(`${Math.min(o.questions.length,ROW_COUNT)}問を読み込みました。${o.questions.length>ROW_COUNT?' 1000問を超えた分は省略しました。':''}`)}).catch(()=>toast('プロジェクトを読み込めませんでした。'))}
function loadCsvFile(file){file.text().then(t=>{const qs=parseCsv(t);rows=Array.from({length:ROW_COUNT},(_,i)=>({...qs[i]}));renderGrid();saveAutosave();toast(`${Math.min(qs.length,ROW_COUNT)}問を読み込みました。${qs.length>ROW_COUNT?' 1000問を超えた分は省略しました。':''}`)}).catch(()=>toast('CSVを読み込めませんでした。'))}
function saveAutosave(){clearTimeout(saveAutosave.t);saveAutosave.t=setTimeout(()=>{try{localStorage.setItem('digicanji.editor.autosave.v1',JSON.stringify({title:$('quizTitle').value,quizId:$('quizId').value,rows:rows.filter(rowHasData)}))}catch{}},200)}
function restoreAutosave(){try{const o=JSON.parse(localStorage.getItem('digicanji.editor.autosave.v1')||'null');if(o?.rows?.length){$('quizTitle').value=o.title||'DigiCanji';$('quizId').value=o.quizId||'';rows=Array.from({length:ROW_COUNT},(_,i)=>({...o.rows[i]}))}}catch{}}
function toast(msg){$('toast').textContent=msg;$('toast').classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>$('toast').classList.remove('show'),2200)}
$('btnGenerate').addEventListener('click',generateHtml);$('btnProjectSave').addEventListener('click',saveProject);$('btnProjectLoad').addEventListener('click',()=>$('projectFile').click());$('btnCsvLoad').addEventListener('click',()=>$('csvFile').click());$('btnCsvSave').addEventListener('click',()=>{download(`${safeName($('quizTitle').value)}.csv`,toCsv(),'text/csv;charset=utf-8');toast('CSVを保存しました。')});$('projectFile').addEventListener('change',e=>{const f=e.target.files[0];if(f)loadProjectFile(f);e.target.value=''});$('csvFile').addEventListener('change',e=>{const f=e.target.files[0];if(f)loadCsvFile(f);e.target.value=''});$('quizTitle').addEventListener('input',()=>{validateAndRender();saveAutosave()});$('quizId').addEventListener('input',saveAutosave);
restoreAutosave();renderGrid();
</script>
</body></html>
